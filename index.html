    if(state.turnUndoStack && state.turnUndoStack.length>0){
      html += `<button class="btn secondary full" id="undoBtn" style="margin-bottom:8px;">Undo Last Trade</button>`;
    }
    html += `<button class="btn full" id="endTurnBtn">${state.turnStage==='start' ? 'Draw Closing Card' : 'End Turn'}</button>`;
  }
  html += `</div>`;

  // holdings — collect every row first so we can sort by value, biggest first
  const glCell = (gl)=> `<td style="color:${gl>=0?'var(--up)':'var(--down)'};">${gl>=0?'+':'-'}$${Math.abs(Math.round(gl))}</td>`;
  const holdingRows = [];
  STOCK_IDS.forEach(id=>{
    if(p.shares[id]>0){
      const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
      const value = p.shares[id]*price(id);
      holdingRows.push({ value, html: `<tr><td>${id} (${sectorLabel})</td><td>${p.shares[id]}</td><td>$${value}</td>${glCell(longGainLoss(p,id,false))}</tr>` });
    }
  });
  if(p.spShares>0){
    const value = p.spShares*spPrice();
    holdingRows.push({ value, html: `<tr><td>SP8</td><td>${p.spShares}</td><td>$${value}</td>${glCell(longGainLoss(p,'SP',true))}</tr>` });
  }
  STOCK_IDS.forEach(id=>{
    if((p.shorts[id]||0)>0){
      const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
      const value = -(p.shorts[id]*price(id));
      holdingRows.push({ value, html: `<tr><td>${id} (${sectorLabel}, short)</td><td>${p.shorts[id]}</td><td style="color:var(--down);">-$${Math.abs(value)}</td>${glCell(shortGainLoss(p,id))}</tr>` });
    }
  });
  holdingRows.sort((a,b)=>b.value-a.value);

  html += `<div class="panel"><h3 style="color:${p.color};">${p.name}'s Holdings</h3>
    <table class="holdings-table"><tr><th>Ticker</th><th>Shares</th><th>Value</th><th>Gain/Loss</th></tr>`;
  holdingRows.forEach(r=>{ html += r.html; });
  html += `</table></div>`;

  // log — moved to an on-demand modal instead of always-on-screen
  html += `<button class="btn secondary full" id="openLogBtn">Market Log (${state.log.length})</button>`;

  html += `</div>`;
  return html;
}

function renderLogModal(){
  if(!state.showLog) return '';
  return `<div class="overlay" id="logOverlay">
    <div class="modal">
      <h2>Market Log</h2>
      <div class="sub">Everything that's happened this game, most recent first.</div>
      <div class="log" style="max-height:60vh;">
        ${state.log.slice().reverse().map(l=>`<div class="log-entry ${l.event?'event':''}">${l.text}</div>`).join('')}
      </div>
      <button class="btn full" id="closeLogBtn" style="margin-top:14px;">Close</button>
    </div>
  </div>`;
}

function renderCardModal(){
  if(!state.pendingCard || !isMyTurn()) return ''; // only the acting player's own device gets the popup
  const card = state.pendingCard;
  const p = state.players[state.current];

  if(state.cardMinimized) return ''; // tucked away so the player can check their holdings first

  const minimizeBtn = `<button class="btn secondary full" id="minimizeCardBtn" style="margin-top:8px;">Minimize — check my holdings</button>`;

  if(card.type==='peek' && state.pendingChoice && state.pendingChoice.kind==='info'){
    return `<div class="overlay"><div class="modal">
      <div class="card-face"><div class="card-kind">Insider Info</div><div class="card-text">${card.text}</div></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Next up in the deck:</div>
      ${state.pendingChoice.lines.map(l=>`<div class="log-entry" style="margin-bottom:6px;">${l}</div>`).join('')}
      <button class="btn full" id="ackBtn" style="margin-top:10px;">Got it</button>
      ${minimizeBtn}
    </div></div>`;
  }

  if(needsChoice(card)){
    return `<div class="overlay"><div class="modal">
      <div class="card-face"><div class="card-kind">${p.name}'s turn</div><div class="card-text">${card.text}</div></div>
      ${state.choiceError ? `<div class="choice-error">${state.choiceError}</div>` : ''}
      ${renderChoiceUI(card)}
      ${minimizeBtn}
    </div></div>`;
  }

  return `<div class="overlay"><div class="modal">
    <div class="card-face"><div class="card-kind">${p.name}'s turn</div><div class="card-text">${card.text}</div></div>
    <button class="btn full" id="ackBtn">Continue</button>
    ${minimizeBtn}
  </div></div>`;
}

function renderResumeCardBanner(){
  if(!state.pendingCard || !state.cardMinimized || !isMyTurn()) return '';
  const p = state.players[state.current];
  return `<div class="resume-card-banner">
    <div>
      <div class="resume-card-label">Card paused</div>
      <div class="resume-card-sub">${p.name} still needs to resolve a card</div>
    </div>
    <button class="btn" id="resumeCardBtn">Resume Card</button>
  </div>`;
}

function renderChoiceUI(card){
  const p = state.players[state.current];
  switch(card.type){
    case 'sched_swing':
      return `
        <div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Swing Up</button>
          <button class="btn secondary" id="c_down">Swing Down</button>
        </div>`;
    case 'split': {
      const owned = STOCK_IDS.filter(id=>p.shares[id]>0);
      if(owned.length===0) return `<div class="hint">You own no shares — this card has no effect.</div><button class="btn full" id="ackBtn">Continue</button>`;
      return `<div class="trade-row"><select id="c_stock">${owned.map(id=>`<option value="${id}">${id} (${p.shares[id]} shares)</option>`).join('')}</select></div>
        <button class="btn full" id="c_split">Split</button>`;
    }
    case 'choose_stock_move':
      return `
        <div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Move Up</button>
          <button class="btn secondary" id="c_down">Move Down</button>
        </div>`;
    case 'choose_sector_move':
      return `
        <div class="trade-row"><select id="c_sector">${Object.keys(SECTORS).map(s=>`<option value="${s}">${SECTORS[s].label||s}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Move Up</button>
          <button class="btn secondary" id="c_down">Move Down</button>
        </div>`;
    case 'whale':
      return `
        <div class="trade-row">
          <select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id} — $${price(id)}</option>`).join('')}</select>
          <input type="number" id="c_qty" min="1" value="1">
        </div>
        <div class="choice-grid">
          <button class="btn buy" id="c_buy">Buy (pushes price up)</button>
          <button class="btn sell" id="c_sell">Sell (pushes price down)</button>
          <button class="btn short" id="c_short">Short (pushes price down)</button>
          <button class="btn secondary" id="c_hold">Hold — no trade</button>
        </div>`;
    case 'freeze':
      return `<div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <button class="btn full" id="c_freeze">Freeze</button>`;
    default: return '';
  }
}

function wireChoiceHandlers(card){
  const byId = x=>document.getElementById(x);
  const done = (choice)=>{
    const ok = resolveChoice(card, choice);
    if(ok===false){ render(); return; } // keep the card open so they can adjust and retry
    finishCardResolution();
  };
  switch(card.type){
    case 'sched_swing':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ stock: byId('c_stock').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ stock: byId('c_stock').value, dir:-1 });
      break;
    case 'split':
      if(byId('c_split')) byId('c_split').onclick = ()=>done({ stock: byId('c_stock').value });
      if(byId('ackBtn')) byId('ackBtn').onclick = ()=>finishCardResolution();
      break;
    case 'choose_stock_move':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ stock: byId('c_stock').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ stock: byId('c_stock').value, dir:-1 });
      break;
    case 'choose_sector_move':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ sector: byId('c_sector').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ sector: byId('c_sector').value, dir:-1 });
      break;
    case 'whale':
      if(byId('c_buy')) byId('c_buy').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'buy' });
      if(byId('c_sell')) byId('c_sell').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'sell' });
      if(byId('c_short')) byId('c_short').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'short' });
      if(byId('c_hold')) byId('c_hold').onclick = ()=>done({ side:'hold' });
      break;
    case 'freeze':
      if(byId('c_freeze')) byId('c_freeze').onclick = ()=>done({ stock: byId('c_stock').value });
      break;
  }
}

function render(){
  if(!state || state.phase==='lobby' || myPlayerIndex===null){ renderSetup(); return; }
  repairCollections(state); // belt-and-suspenders: guarantee these exist no matter how state got here
  const p = state.players[state.current];
  app.innerHTML = `
    <div class="topbar">
      <div class="title">
        <svg class="logo-mark" width="28" height="22" viewBox="0 0 28 22" xmlns="http://www.w3.org/2000/svg" fill="none">
          <polyline points="2,19 9,12 13,15 19,6" stroke="var(--up)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14,5 L20,4.3 L20.7,10.3" stroke="var(--up)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><span class="word-up">Up</span><span class="word-trend">Trend</span></span>
      </div>
      <div class="meta">
        <div class="item"><div class="label">S&amp;P 8</div><div class="value mono">$${spPrice()}</div></div>
        <div class="item"><div class="label">Turn</div><div class="value" style="color:${p.color};">${p.name}</div></div>
        <div class="item"><div class="label">Deck</div><div class="value mono">${state.deck.length} left</div></div>
        <button class="btn secondary" id="restartBtn" style="padding:8px 12px;font-size:12px;">Restart</button>
      </div>
    </div>
    <div class="layout">
      <div>${renderBoard()}</div>
      ${renderSidebar()}
    </div>
    ${renderCardModal()}
    ${renderLogModal()}
    ${renderEndTurnConfirm()}
    ${renderResumeCardBanner()}
    ${renderRestartConfirm()}
    ${renderExpandedChartModal()}
  `;

  // wire buttons
  const byId = x=>document.getElementById(x);
  if(byId('drawBtn')) byId('drawBtn').onclick = drawCard;
  if(byId('endTurnBtn')) byId('endTurnBtn').onclick = requestEndTurn;
  if(byId('eliminatedContinueBtn')) byId('eliminatedContinueBtn').onclick = ()=>{ if(isMyTurn()) endTurn(); };
  if(byId('newGameBtn')) byId('newGameBtn').onclick = wipeGame;
  if(byId('buyBtn')) byId('buyBtn').onclick = ()=>buyShares(state.tradeSelection, 1);
  if(byId('sellBtn')) byId('sellBtn').onclick = ()=>sellShares(state.tradeSelection, 1);
  if(byId('shortBtn')) byId('shortBtn').onclick = ()=>openShort(state.tradeSelection, 1);
  if(byId('coverBtn')) byId('coverBtn').onclick = ()=>coverShort(state.tradeSelection, 1);
  if(byId('undoBtn')) byId('undoBtn').onclick = undoLastTrade;
  if(byId('openLogBtn')) byId('openLogBtn').onclick = ()=>{ state.showLog = true; render(); };
  if(byId('closeLogBtn')) byId('closeLogBtn').onclick = ()=>{ state.showLog = false; render(); };
  if(byId('confirmEndTurnBtn')) byId('confirmEndTurnBtn').onclick = proceedPastTrade;
  if(byId('cancelEndTurnBtn')) byId('cancelEndTurnBtn').onclick = ()=>{ state.confirmEndTurn=false; render(); };
  if(byId('restartBtn')) byId('restartBtn').onclick = ()=>{ state.confirmRestart=true; render(); };
  if(byId('confirmRestartBtn')) byId('confirmRestartBtn').onclick = wipeGame;
  if(byId('cancelRestartBtn')) byId('cancelRestartBtn').onclick = ()=>{ state.confirmRestart=false; render(); };
  if(byId('minimizeCardBtn')) byId('minimizeCardBtn').onclick = ()=>{ state.cardMinimized=true; render(); };
  if(byId('resumeCardBtn')) byId('resumeCardBtn').onclick = ()=>{ state.cardMinimized=false; render(); };
  document.querySelectorAll('[data-trade-id]').forEach(el=>{
    el.onclick = ()=>{ state.tradeSelection = el.getAttribute('data-trade-id'); render(); };
  });
  document.querySelectorAll('[data-chart-id]').forEach(el=>{
    el.onclick = (ev)=>{ ev.stopPropagation(); state.expandedChart = el.getAttribute('data-chart-id'); render(); };
  });
  if(byId('closeChartBtn')) byId('closeChartBtn').onclick = ()=>{ state.expandedChart = null; render(); };
  if(byId('ackBtn')) byId('ackBtn').onclick = ()=>{
    if(state.pendingCard && state.pendingCard.type==='peek'){ finishCardResolution(); }
    else finishCardResolution();
  };
  if(state.pendingCard && needsChoice(state.pendingCard)) wireChoiceHandlers(state.pendingCard);
}

render();
</script>
</body>
</html>
