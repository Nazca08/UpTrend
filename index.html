    dividendRateModifier: null, // {multiplier, turnsLeft} — Rate Hike/Rate Cut, applies to every stock's dividend zone
    dividendLeaches: [], // active Dividend Leach cards: {thiefIndex, victimIndex, turnsLeft}
    netWorthHistory: [{ values: players.map(()=>START_CASH) }], // one point per turn taken, all players together — for the Net Worth Graph
    showLog: false,
    cardMinimized: false,
    choiceError: null,
    cardsPerTurn: 1, // exactly one draw to open the turn, and one more to close it
    cardsDrawnThisTurn: 0,
    turnStage: 'start', // 'start' = the opening draw(s), 'end' = the mandatory draw that closes the turn
  };
}

function isMyTurn(){ return state && myPlayerIndex!==null && myPlayerIndex===state.current; }

const TURN_TIME_LIMIT = 120; // seconds — 2 minutes; enforced by the timeout-enforcement logic below once it expires
function turnTimerSecondsLeft(){
  if(!state || !state.turnStartedAt || state.gameOver) return TURN_TIME_LIMIT;
  const elapsed = Math.floor((Date.now()-state.turnStartedAt)/1000);
  return Math.max(0, TURN_TIME_LIMIT-elapsed);
}
function formatTurnTimer(secs){
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${s<10?'0':''}${s}`;
}
function gameTimeLeftSecs(){
  if(!state || !state.winCondition || state.winCondition.mode!=='timer') return 0;
  return Math.max(0, Math.floor((state.winCondition.endsAt - Date.now())/1000));
}
function formatGameTimeLeft(){
  const s = gameTimeLeftSecs();
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${sec<10?'0':''}${sec}`;
}
/* Updates just the timer's text/color every second, without a full
   re-render — avoids disrupting anything else on screen (like someone mid-
   type in a name field) purely to tick a clock. */
setInterval(()=>{
  const el = document.getElementById('turnTimerValue');
  if(!el || !state || state.gameOver || state.phase==='lobby') return;
  const secs = turnTimerSecondsLeft();
  el.textContent = formatTurnTimer(secs);
  el.style.color = secs<=0 ? 'var(--down)' : (secs<=10 ? 'var(--amber)' : '');

  if(state.winCondition && state.winCondition.mode==='timer'){
    const gEl = document.getElementById('gameLengthValue');
    if(gEl){
      const gSecs = gameTimeLeftSecs();
      gEl.textContent = formatGameTimeLeft();
      gEl.style.color = gSecs<=0 ? 'var(--down)' : (gSecs<=60 ? 'var(--amber)' : '');
    }
  }
}, 1000);

/* ============================= TURN TIMEOUT ENFORCEMENT ============================= */
/* A card that still needs a choice protects the turn from being force-ended
   regardless of the clock — an auto-resolved card just sitting in its
   "Continue" acknowledgment modal does NOT protect it, since its effect
   already happened and nothing is left to decide. */
function isTurnProtectedFromTimeout(){
  return !!(state && state.pendingCard && needsChoice(state.pendingCard));
}

/* Any connected browser can notice a stalled turn, but only one of them
   should actually act on it. Firebase's transaction API gives us that for
   free: every client tries to atomically move the lock from the previous
   turn's timestamp to the current one, but only the first to reach the
   server actually succeeds — everyone else's transaction sees the lock
   already matches state.turnStartedAt and aborts without writing. */
async function claimTimeoutLock(turnStartedAt){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(lockRef(), (current)=>{
      if(current === turnStartedAt) return; // already claimed for this turn — abort
      return turnStartedAt;
    });
    return result.committed;
  }catch(e){
    console.error('UpTrend: timeout lock claim failed', e);
    return false;
  }
}

/* Pushes a stalled player's turn forward using neutral, no-op choices —
   drawing whatever card comes up, auto-acknowledging anything that doesn't
   need a decision, and skipping trading — until either their turn actually
   ends or a real choice-needing card appears (at which point they're
   protected and enforcement backs off). Stops after a bounded number of
   steps as a safety net against ever looping forever. */
function forceAdvanceStalledTurn(){
  if(!state || state.gameOver) return;
  const stalledIndex = state.current;
  const stalledName = state.players[stalledIndex].name;
  let steps = 0;
  while(steps < 12 && state.current===stalledIndex && !state.gameOver){
    steps++;
    if(isTurnProtectedFromTimeout()) break; // a real choice is pending — back off
    const before = JSON.stringify({ phase:state.phase, turnStage:state.turnStage, cardsDrawnThisTurn:state.cardsDrawnThisTurn, pendingCard: state.pendingCard && state.pendingCard._id });
    if(state.phase==='draw'){
      drawCard(true);
    } else if(state.phase==='resolve'){
      finishCardResolution(); // only reached when the pending card doesn't need a choice
    } else if(state.phase==='trade'){
      proceedPastTrade();
    } else {
      break;
    }
    const after = JSON.stringify({ phase:state.phase, turnStage:state.turnStage, cardsDrawnThisTurn:state.cardsDrawnThisTurn, pendingCard: state.pendingCard && state.pendingCard._id });
    if(before===after) break; // no progress possible (e.g. stuck on negative cash) — stop rather than spin
  }
  if(state.current!==stalledIndex || state.gameOver){
    logEvent(`${stalledName} ran out of time — turn auto-advanced.`, true);
  }
  persist(); render();
}

/* Runs every tick alongside the visible countdown: once time's up and the
   turn isn't protected by a pending choice card, try to claim the lock and
   push the stalled player's turn forward. */
let timeoutCheckInFlight = false;
setInterval(async ()=>{
  if(timeoutCheckInFlight || !roomCode || !state || state.gameOver || state.phase==='lobby') return;
  if(turnTimerSecondsLeft() > 0) return;
  if(isTurnProtectedFromTimeout()) return;
  timeoutCheckInFlight = true;
  try{
    const won = await claimTimeoutLock(state.turnStartedAt);
    if(won) forceAdvanceStalledTurn();
  } finally {
    timeoutCheckInFlight = false;
  }
}, 1000);

/* Timer-mode games need to end right on schedule even if nobody happens to
   be mid-action when the clock runs out — checkGameOver() alone only fires
   from actual gameplay actions, so this is the fallback that catches "time
   ran out while everyone was just staring at the board." Same one-client-
   acts guarantee as the other locks above. */
let gameEndCheckInFlight = false;
async function claimGameEndLock(){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(gameEndLockRef(), (current)=>{
      if(current===true) return; // already claimed — abort
      return true;
    });
    return result.committed;
  }catch(e){ console.error('UpTrend: game-end lock claim failed', e); return false; }
}
setInterval(async ()=>{
  if(gameEndCheckInFlight || !roomCode || !state || state.gameOver || state.phase==='lobby') return;
  const wc = state.winCondition;
  if(!wc || wc.mode!=='timer' || Date.now()<wc.endsAt) return;
  gameEndCheckInFlight = true;
  try{
    const won = await claimGameEndLock();
    if(won){ finalizeTimerGameOver(); persist(); render(); }
  } finally {
    gameEndCheckInFlight = false;
  }
}, 1000);

function price(stockId){ return state.stocks[stockId].track[state.stocks[stockId].idx]; }
function spPrice(){ return state.sp.track[state.sp.idx]; }
function spxPrice(){ return state.spx.track[state.spx.idx]; }
function priceOf(id){ return id==='SP' ? spPrice() : id==='SPX' ? spxPrice() : price(id); }
function objFor(id){ return id==='SP' ? state.sp : id==='SPX' ? state.spx : state.stocks[id]; }

function lockedCash(p){
  return STOCK_IDS.reduce((sum,id)=> sum + (p.shorts[id]||0)*price(id), 0);
}
function freeCash(p){ return p.cash - lockedCash(p); }

function netWorth(p){
  let v = p.cash;
  STOCK_IDS.forEach(id=>{
    v += p.shares[id]*price(id);
    v -= (p.shorts[id]||0)*price(id);
  });
  v += p.spShares*spPrice();
  v += p.spxShares*spxPrice();
  return v;
}

/* Cost-basis bookkeeping so we can show unrealized gain/loss per holding.
   Longs: costBasis[id] is the total $ currently invested in open shares
   (average-cost method — selling removes a proportional slice, not FIFO).
   Shorts: shortBasis[id] is the total $ received when the open short
   position(s) were opened; gain = basis received − current buy-back cost.
   'SP' and 'SPX' (the two index funds) keep their own dedicated fields
   instead of living in the STOCK_IDS-keyed objects, since they're not
   part of STOCK_IDS — every function below branches on the id/key to
   route to the right one. */
function addCostBasis(p, key, amount){
  if(key==='SP') p.spCostBasis = (p.spCostBasis||0) + amount;
  else if(key==='SPX') p.spxCostBasis = (p.spxCostBasis||0) + amount;
  else p.costBasis[key] = (p.costBasis[key]||0) + amount;
}
function reduceCostBasisOnSell(p, key, qty){
  const held = key==='SP' ? p.spShares : key==='SPX' ? p.spxShares : p.shares[key];
  if(held<=0) return;
  const total = key==='SP' ? (p.spCostBasis||0) : key==='SPX' ? (p.spxCostBasis||0) : (p.costBasis[key]||0);
  const avg = total/held;
  const reduceBy = avg*qty;
  if(key==='SP') p.spCostBasis = Math.max(0, total - reduceBy);
  else if(key==='SPX') p.spxCostBasis = Math.max(0, total - reduceBy);
  else p.costBasis[key] = Math.max(0, total - reduceBy);
}
function addShortBasis(p, id, amount){ p.shortBasis[id] = (p.shortBasis[id]||0) + amount; }
function reduceShortBasisOnCover(p, id, qty){
  const held = p.shorts[id]||0;
  if(held<=0) return;
  const total = p.shortBasis[id]||0;
  const avg = total/held;
  p.shortBasis[id] = Math.max(0, total - avg*qty);
}
function longGainLoss(p, key){
  const held = key==='SP' ? p.spShares : key==='SPX' ? p.spxShares : p.shares[key];
  const val = held * priceOf(key);
  const basis = key==='SP' ? (p.spCostBasis||0) : key==='SPX' ? (p.spxCostBasis||0) : (p.costBasis[key]||0);
  return val - basis;
}
function shortGainLoss(p, id){
  const held = p.shorts[id]||0;
  const buyBackCost = held * price(id);
  const basis = p.shortBasis[id]||0;
  return basis - buyBackCost;
}

const TURN_CAP = 12; // total buy+short shares allowed per turn (across all stocks)
function capRemaining(){ return TURN_CAP - state.turnUsage.total; }
function capRemainingForStock(id){ return 4 - (state.turnUsage.perStock[id]||0); }

function canBuyOne(id){
  if(!id || state.gameOver) return false;
  if(id!=='SP' && id!=='SPX' && state.stocks[id].worthless) return false;
  if(capRemaining()<=0 || capRemainingForStock(id)<=0) return false;
  const p = state.players[state.current];
  if(id==='SP') return priceOf(id) <= freeCash(p); // flat price, no walk, no fee
  const priorFilled = state.turnFills.up[id]||0;
  const walk = walkOrderDetailed(id, 1, +1, priorFilled);
  return (walk.total+walk.fee) <= freeCash(p);
}
function canSellOne(id){
  if(!id || state.gameOver) return false;
  const p = state.players[state.current];
  const held = id==='SP' ? p.spShares : id==='SPX' ? p.spxShares : p.shares[id];
  return held>0;
}
function canShortOne(id){
  if(!id || id==='SP' || id==='SPX' || state.gameOver) return false;
  if(state.stocks[id].worthless) return false;
  if(capRemaining()<=0 || capRemainingForStock(id)<=0) return false;
  const p = state.players[state.current];
  return price(id) <= freeCash(p);
}
function canCoverOne(id){
  if(!id || state.gameOver) return false;
  const p = state.players[state.current];
  const held = p.shorts[id]||0;
  if(held<=0) return false;
  const priorFilled = state.turnFills.up[id]||0;
  const walk = walkOrderDetailed(id, 1, +1, priorFilled);
  return (walk.total+walk.fee) <= p.cash;
}

/* Walks the order book in groups of 4 shares — matching the 4-per-stock
   turn cap. `priorFilled` is how many shares have already been bought/
   sold/shorted/covered of this stock THIS TURN (across any number of
   earlier clicks), so separate 1-share clicks chain together correctly.
   1-3 shares in a group fill flat at the current price with no fee at all.
   Only when a full group of 4 completes does the price step 1 dot and a
   20% fee get charged — on that completing group only, not the whole
   order. A big enough sell/cover order (uncapped) can cross this boundary
   more than once, walking and getting fee'd once per complete group of 4. */
function walkOrderDetailed(id, qty, direction, priorFilled){
  const GROUP = 4, FEE_RATE = 0.20;
  const obj = objFor(id);
  let idx = obj.idx;
  const chunks = [];
  let curChunkIdx = -1, curPrice = 0, curQty = 0, curSubtotal = 0, curWalked = false;
  for(let i=0;i<qty;i++){
    const position = priorFilled + i;
    const chunkIdx = Math.floor(position/GROUP);
    const posInGroup = position%GROUP;
    if(chunkIdx!==curChunkIdx){
      if(curChunkIdx!==-1) chunks.push({ chunkIdx: curChunkIdx, qty: curQty, price: curPrice, subtotal: curSubtotal, walked: curWalked });
      curChunkIdx = chunkIdx; curPrice = obj.track[idx]; curQty = 0; curSubtotal = 0; curWalked = false;
    }
    const p = obj.track[idx];
    curQty += 1; curSubtotal += p;
    if(posInGroup===GROUP-1){
      idx = Math.max(0, Math.min(obj.track.length-1, idx+direction)); // group just completed — walk now
      curWalked = true; // this call is the one that completed the group, so it eats the fee
    }
  }
  if(curChunkIdx!==-1) chunks.push({ chunkIdx: curChunkIdx, qty: curQty, price: curPrice, subtotal: curSubtotal, walked: curWalked });
  const total = chunks.reduce((s,c)=>s+c.subtotal, 0);
  const fee = chunks.filter(c=>c.walked).reduce((s,c)=>s+Math.ceil(c.subtotal*FEE_RATE), 0);
  return { chunks, total, fee, finalIdx: idx };
}

const BANKRUPTCY_RESET_CASH = 20000;

/* True if a player's cash is negative AND selling every long position they
   own — everything, all at once — still wouldn't be enough to bring it
   back to $0+. Shorts don't help here (covering spends cash, it never
   raises it — see checkMarginCalls below), so only long holdings count.
   This is the genuine, un-recoverable dead end: they can't draw, and
   there's no card-based or trade-based way out on their own. */
function isBankrupt(p){
  if(p.cash>=0) return false;
  let sellableValue = p.spShares*spPrice() + p.spxShares*spxPrice();
  STOCK_IDS.forEach(id=>{ sellableValue += (p.shares[id]||0)*price(id); });
  return sellableValue < Math.abs(p.cash);
}

/* Wipes a bankrupt player's positions and gives them a reduced fresh
   stake instead of leaving them stuck forever (or, for the bot, retrying
   forever). Everyone else's game — cash, holdings, everything — is
   completely untouched; only this one player resets. */
function resetBankruptPlayer(p){
  STOCK_IDS.forEach(id=>{
    p.shares[id]=0; p.shorts[id]=0; p.costBasis[id]=0; p.shortBasis[id]=0; p.holdStreak[id]=0;
  });
  p.spShares = 0; p.spCostBasis = 0;
  p.spxShares = 0; p.spxCostBasis = 0;
  p.cash = BANKRUPTCY_RESET_CASH;
  p.goldenGeese = [];
  p.marginShield = false;
  p.publicOffering = null;
  logEvent(`${p.name} went bankrupt — positions wiped, restarting with $${BANKRUPTCY_RESET_CASH.toLocaleString()}. Everyone else keeps playing.`, true);
}

function humanBankruptcyReset(){
  if(!isMyTurn() || state.gameOver) return;
  const p = state.players[state.current];
  if(!isBankrupt(p)) return; // button shouldn't even be visible otherwise, but don't trust the DOM
  resetBankruptPlayer(p);
  checkGameOver();
  schedulePersist(); render();
}

function checkMarginCalls(){
  state.players.forEach(p=>{
    let locked = lockedCash(p);
    if(locked > p.cash && p.marginShield){
      p.marginShield = false;
      logEvent(`${p.name}'s Margin Call Forgiveness absorbed a margin call this turn — no forced liquidation.`, true);
      return;
    }
    let guard = 0;
    while(locked > p.cash && guard < STOCK_IDS.length+1){
      guard++;
      let target = null, maxLiab = -1;
      STOCK_IDS.forEach(id=>{
        const liab = (p.shorts[id]||0)*price(id);
        if(liab>maxLiab){ maxLiab = liab; target = id; }
      });
      if(!target || maxLiab<=0) break;
      const qty = p.shorts[target];
      const cost = qty*price(target);
      p.cash -= cost;
      p.shorts[target] = 0;
      logEvent(`Margin call: ${p.name}'s ${target} short was auto-covered at $${price(target)}.`, true);
      locked = lockedCash(p);
    }
  });
}


const MAX_LOG_ENTRIES = 150;
function logEvent(text, isEvent){
  state.log.push({ text, event: !!isEvent });
  if(state.log.length > MAX_LOG_ENTRIES) state.log = state.log.slice(-MAX_LOG_ENTRIES);
}

function moveStock(id, dir, respectFreeze){
  const s = state.stocks[id];
  if(s.worthless) return; // dead stocks never move again
  if(respectFreeze && s.frozen){
    s.frozen = false;
    logEvent(`${id} was frozen — movement ignored.`, true);
    return;
  }
  s.prevIdx = s.idx;
  s.idx = Math.max(0, Math.min(s.track.length-1, s.idx + dir));
}
function moveSP(dir){
  state.sp.prevIdx = state.sp.idx;
  state.sp.idx = Math.max(0, Math.min(state.sp.track.length-1, state.sp.idx + dir));
  state.spx.prevIdx = state.spx.idx;
  state.spx.idx = Math.max(0, Math.min(state.spx.track.length-1, state.spx.idx + dir));
}

/* Trading SP8 is the only thing that can move either index's price — Mini
   SP8 never has its own price impact (see buyShares/sellShares), so
   whenever SP8 walks from a completed group-of-4, Mini SP8 has to walk the
   exact same number of steps right alongside it, or "they always move
   together" stops being true the moment anyone actually trades. */
function mirrorOntoMiniSP8(delta){
  if(!delta) return;
  state.sp.prevIdx = state.sp.idx;
  state.sp.idx = Math.max(0, Math.min(state.sp.track.length-1, state.sp.idx + delta));
}

/* Applies a dictated multi-step move to one stock, checking Freeze once for
   the whole card (not once per step) so a frozen stock ignores the entire
   card's movement rather than just its first step. */
function applyDictatedSteps(id, dir, steps){
  const s = state.stocks[id];
  if(s.frozen){
    s.frozen = false;
    logEvent(`${id} was frozen — movement ignored.`, true);
    return;
  }
  for(let i=0;i<steps;i++) moveStock(id, dir, false);
}

/* Reversion: pulls a stock back toward its own center price by up to
   `amount` steps, never overshooting the center. Stocks already at center
   are unaffected — nothing to revert. */
function revertStock(id, amount){
  const s = state.stocks[id];
  const centerIdx = (s.track.length-1)/2;
  const dist = centerIdx - s.idx;
  if(dist===0){ logEvent(`${id} is already at its center price — no reversion needed.`); return; }
  const dir = dist>0 ? 1 : -1;
  const steps = Math.min(amount, Math.abs(dist));
  applyDictatedSteps(id, dir, steps);
  logEvent(`${id} reverted ${steps} step(s) toward the middle — now $${price(id)}.`, true);
}
function revertSector(sector, amount){
  SECTORS[sector].stocks.forEach(id=>revertStock(id, amount));
}

/* A stock that hits exactly $0 (only possible for Tech/Energy, whose tracks
   bottom out at $0 — Health/Consumer never go below their floor) goes
   permanently worthless: every player's shares are erased, any open shorts
   on it are auto-covered for free (max profit — the price can't be beat),
   and it's frozen forever so it can never be bought, shorted, or moved again. */
function checkWorthless(){
  STOCK_IDS.forEach(id=>{
    const s = state.stocks[id];
    if(s.worthless || price(id)!==0) return;
    s.worthless = true;
    s.frozen = false;
    state.players.forEach(pl=>{
      if(pl.shares[id]>0){
        logEvent(`${pl.name}'s ${pl.shares[id]} shares of ${id} were wiped out — worthless.`, true);
        pl.shares[id] = 0;
        pl.costBasis[id] = 0;
      }
      if((pl.shorts[id]||0)>0){
        logEvent(`${pl.name}'s short on ${id} was auto-covered for free — max profit as it went to $0.`, true);
        pl.shorts[id] = 0;
        pl.shortBasis[id] = 0;
      }
    });
    logEvent(`${id} has crashed to $0 and is now worthless — delisted, can never be traded again.`, true);
  });
}

/* A player whose net worth is negative can never dig out — even selling
   every last share can't bring their cash back to $0, since shorts/fees
   already account for that in netWorth. Rather than soft-locking their
   turn forever, they're knocked out of the game entirely. */
function checkEliminations(){
  if(state.gameOver) return;
  state.players.forEach(p=>{
    if(!p.eliminated && p.cash<0 && netWorth(p)<0){
      p.eliminated = true;
      logEvent(`${p.name} is eliminated — net worth went negative with no way to recover.`, true);
    }
  });
  const active = state.players.filter(p=>!p.eliminated);
  if(state.players.length>1 && active.length<=1 && !state.gameOver){
    state.gameOver = true;
    state.winner = active[0] || state.players.reduce((best,p)=> (!best||netWorth(p)>netWorth(best))?p:best, null);
    logEvent(active.length===1 ? `${active[0].name} is the last player standing — wins!` : 'All players were eliminated — game over.', true);
  }
}

/* Appends the current price to each stock's (and SP8's) history whenever it
   has actually changed since the last recorded point — used to draw the
   little line chart next to each price track. */
const MAX_HISTORY_POINTS = 150;
function recordHistory(){
  STOCK_IDS.forEach(id=>{
    const s = state.stocks[id];
    const cur = price(id);
    if(s.history[s.history.length-1]!==cur){
      s.history.push(cur);
      if(s.history.length > MAX_HISTORY_POINTS) s.history = s.history.slice(-MAX_HISTORY_POINTS);
    }
  });
  const spCur = spPrice();
  if(state.sp.history[state.sp.history.length-1]!==spCur){
    state.sp.history.push(spCur);
    if(state.sp.history.length > MAX_HISTORY_POINTS) state.sp.history = state.sp.history.slice(-MAX_HISTORY_POINTS);
  }
  const spxCur = spxPrice();
  if(state.spx.history[state.spx.history.length-1]!==spxCur){
    state.spx.history.push(spxCur);
    if(state.spx.history.length > MAX_HISTORY_POINTS) state.spx.history = state.spx.history.slice(-MAX_HISTORY_POINTS);
  }
}

/* One point per turn TAKEN (called from endTurn, not per-trade) — every
   player's net worth together at that moment, so the Net Worth Graph shows
   how the whole table's fortunes moved relative to each other over the
   course of the game, not noisy per-trade fluctuations. */
const MAX_NETWORTH_POINTS = 150;
function recordNetWorthHistory(){
  state.netWorthHistory.push({ values: state.players.map(p=>Math.round(netWorth(p))) });
  if(state.netWorthHistory.length > MAX_NETWORTH_POINTS) state.netWorthHistory = state.netWorthHistory.slice(-MAX_NETWORTH_POINTS);
}

function checkGameOver(){
  recordHistory();
  checkWorthless();
  checkEliminations();
  if(state.gameOver) return;

  // 1. SP8 reaches the far right bubble (its ceiling)
  if(state.sp.idx === state.sp.track.length-1){
    state.gameOver = true;
    let best=null;
    state.players.forEach(p=>{ if(!best || netWorth(p)>netWorth(best)) best=p; });
    state.winner = best;
    logEvent(`Mini SP8 hit its ceiling — game over!`, true);
    return;
  }

  // 2. Every Tech and Energy stock has gone worthless
  const techEnergyIds = [...SECTORS.Tech.stocks, ...SECTORS.Energy.stocks];
  if(techEnergyIds.every(id=>state.stocks[id].worthless)){
    state.gameOver = true;
    let best=null;
    state.players.forEach(p=>{ if(!best || netWorth(p)>netWorth(best)) best=p; });
    state.winner = best;
    logEvent(`Every Tech and Energy stock is worthless — game over!`, true);
    return;
  }

  // 3. Win condition: either a target net worth, or a fixed game-length timer
  const wc = state.winCondition || { mode:'networth', target:500000 };
  if(wc.mode==='networth'){
    const bigWinner = state.players.find(p=>!p.eliminated && netWorth(p)>=wc.target);
    if(bigWinner){
      state.gameOver = true;
      state.winner = bigWinner;
      logEvent(`${bigWinner.name} reached $${wc.target.toLocaleString()} net worth — game over!`, true);
      return;
    }
  } else if(wc.mode==='timer' && Date.now()>=wc.endsAt){
    finalizeTimerGameOver();
    return;
  }
}

/* Timer-mode games don't end on a specific in-game event — they just stop
   when the clock runs out, whoever's turn it happens to be. Highest net
   worth at that instant wins (eliminated players never qualify, since
   elimination requires negative net worth in the first place). */
function finalizeTimerGameOver(){
  if(state.gameOver) return;
  let best = null, bestNW = -Infinity;
  state.players.forEach(p=>{
    const nw = netWorth(p);
    if(nw>bestNW){ bestNW = nw; best = p; }
  });
  state.gameOver = true;
  state.winner = best;
  logEvent(`Time's up! ${best.name} wins with $${Math.round(bestNW).toLocaleString()} net worth.`, true);
}

/* ============================= CARD RESOLUTION ============================= */
/* How many draws the CURRENT stage of the turn requires. The opening stage
   draws cardsPerTurn (1, or 2 in a heads-up game); the closing stage that
   ends the turn is always exactly 1 draw, regardless of player count. */
function drawsNeededThisStage(){
  return state.turnStage==='start' ? state.cardsPerTurn : 1;
}

function drawCard(force){
  if(!force && !isMyTurn()) return;
  const p = state.players[state.current];
  if(p.eliminated) return;
  if(p.cash<0) return; // must raise cash back to $0+ first — see the forced-liquidation Action panel
  // Tick this player's own Insider Info countdowns BEFORE drawing — so "1 turn"
  // means "the next time it's my turn," not "immediately," and a card drawn
  // this turn doesn't get ticked down on the very turn it was set up. This
  // only happens once per whole turn (the very first draw), not once per
  // individual card — starting AND ending draws together are one turn.
  if(state.turnStage==='start' && state.cardsDrawnThisTurn===0){
    tickScheduled(state.current);
    tickRecurringEffects(state.current);
    tickHoldStreaks(state.current);
    tickShortFeesAndDividends(state.current);
    tickDividendRateModifier();
    checkMarginCalls(); // fees/payouts above can push cash negative — same safety net as any other cash event
    checkGameOver();
    if(state.gameOver){ persist(); render(); return; } // a scheduled prediction landing just ended the game
  }
  if(state.deck.length===0){ state.deck = shuffle(state.discard); state.discard=[]; }
  const card = state.deck.shift();
  state.pendingCard = card;
  state.phase = 'resolve';
  state.choiceError = null;
  state.cardsDrawnThisTurn += 1;
  // Auto-resolving cards (anything that doesn't need a player choice) apply
  // their effect right here, exactly once. The modal that follows is purely
  // a display of what already happened — it must NEVER re-trigger the
  // effect, or minimizing/resuming the card (or any other re-render while
  // it's open) would re-apply it every single time.
  if(!needsChoice(card)){
    resolveAuto(card);
  }
  persist(); render();
}

function finishCardResolution(){
  state.discard.push(state.pendingCard);
  state.pendingCard = null;
  state.pendingChoice = null;
  state.cardMinimized = false;
  state.choiceError = null;
  checkMarginCalls();
  checkGameOver();
  if(state.gameOver){ state.phase = 'trade'; persist(); render(); return; }
  if(state.cardsDrawnThisTurn < drawsNeededThisStage()){
    state.phase = 'draw'; // more draws needed for this stage (not currently used, but kept for flexibility)
  } else if(state.turnStage==='start'){
    state.phase = 'trade'; // opening draw is done — into the trading phase
  } else {
    endTurn(); // the closing card has been seen and resolved — the turn ends right here, no extra trading
    return;
  }
  persist(); render();
}

/* Only ticks down scheduled items belonging to `ownerIndex` — each player's
   Insider Info countdown advances only on that same player's own turns,
   so "in 1 turn" always means "the next time it comes back around to me." */
function tickScheduled(ownerIndex){
  const remaining = [];
  state.scheduled.forEach(item=>{
    if(item.ownerIndex!==ownerIndex){ remaining.push(item); return; }
    item.turnsLeft -= 1;
    if(item.turnsLeft<=0){ resolveScheduledItem(item); }
    else remaining.push(item);
  });
  state.scheduled = remaining;
}

/* Scheduled items store plain data (never functions — Firebase can't sync
   those) and get dispatched here by `kind` once their countdown hits 0. */
/* Lets a player pay cash for a tip instead of hoping to draw one — always
   genuine (never one of the fake tips a card draw might hand you), since
   you're paying a real informant, not just hearing a rumor. Same
   randomized roll and same private treatment as a drawn Scheduled Price
   card; the only difference is how it got set up. */
const INSIDER_INFO_PRICE = 5000;
function buyInsiderInfo(force){
  if((!force && !isMyTurn()) || state.gameOver || state.phase!=='trade') return;
  const p = state.players[state.current];
  if(p.cash < INSIDER_INFO_PRICE){ logEvent(`${p.name} can't afford to buy Insider Info — needs $${INSIDER_INFO_PRICE}.`); render(); return; }
  const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
  if(eligible.length===0){ logEvent(`${p.name} tried to buy Insider Info, but no stocks are left to get a tip on.`); render(); return; }
  p.cash -= INSIDER_INFO_PRICE;
  const stock = eligible[Math.floor(Math.random()*eligible.length)];
  const track = state.stocks[stock].track;
  const targetIdx = Math.floor(Math.random()*track.length);
  const snappedPrice = track[targetIdx];
  const turns = 1 + Math.floor(Math.random()*12);
  state.scheduled.push({ turnsLeft: turns, ownerIndex: state.current, kind:'sched_price', stock, targetIdx, snappedPrice, description: `${stock} will hit $${snappedPrice}` });
  logEvent(`${p.name} paid $${INSIDER_INFO_PRICE} for Insider Info — details stay hidden until it plays out.`, true);
  schedulePersist(); render();
}

function resolveScheduledItem(item){
  if(item.kind==='sched_price'){
    if(state.stocks[item.stock].worthless){ logEvent(`${item.stock} went worthless before its price target could land.`, true); return; }
    if(item.fake){
      logEvent(`Insider Info turned out to be false — ${item.stock} never hit $${item.snappedPrice} as "predicted."`, true);
      return;
    }
    state.stocks[item.stock].prevIdx = state.stocks[item.stock].idx;
    state.stocks[item.stock].idx = item.targetIdx;
    logEvent(`Insider Info came true: ${item.stock} hit $${item.snappedPrice} as predicted.`, true);
  } else if(item.kind==='sched_swing'){
    const dir = item.dir;
    moveStock(item.stock, dir*2>0?1:-1, false); moveStock(item.stock, dir*2>0?1:-1, false);
    logEvent(`Scheduled Swing triggered: ${item.stock} moved 2 steps ${dir>0?'up':'down'}.`, true);
  }
}

/* Advances active Earnings Report drips owned by `ownerIndex` by one step —
   same "only the drawer's own turns" rule as tickScheduled. Each tick moves
   the stock `bubblesPerTurn` steps and counts down; a drip whose stock has
   gone worthless in the meantime just quietly ends instead of moving. */
function tickRecurringEffects(ownerIndex){
  const remaining = [];
  state.recurringEffects.forEach(eff=>{
    if(eff.ownerIndex!==ownerIndex){ remaining.push(eff); return; }
    if(state.stocks[eff.stock].worthless){
      logEvent(`${eff.stock}'s earnings drift ended — the stock went worthless.`, true);
      return;
    }
    applyDictatedSteps(eff.stock, eff.dir, eff.bubblesPerTurn);
    eff.turnsLeft -= 1;
    logEvent(`${eff.stock} drifted ${eff.bubblesPerTurn} bubble${eff.bubblesPerTurn===1?'':'s'} ${eff.dir>0?'up':'down'} on earnings — now $${price(eff.stock)}${eff.turnsLeft>0?` (${eff.turnsLeft} more turn${eff.turnsLeft===1?'':'s'})`:' — drift complete.'}`, true);
    if(eff.turnsLeft>0) remaining.push(eff);
  });
  state.recurringEffects = remaining;
}

/* True while a stock currently sits in its own dividend zone (the top N
   bubbles of its track) — worthless stocks never qualify. */
function inDividendZone(id){
  const zone = DIVIDEND_ZONES[id];
  if(!zone) return false;
  const s = state.stocks[id];
  if(s.worthless) return false;
  return s.idx >= s.track.length - zone.dots;
}

/* Runs once at the start of each player's own turn: every open short pays
   a flat 1% carrying fee on its current liability, and any stock currently
   sitting in its dividend zone pays longs the zone's full rate — while
   shorts in that same zone pay an extra HALF the zone's rate on top of
   their normal carrying fee, since being short into a company that's
   paying out is a real cost, just half of what a long holder actually
   earns. */
function tickShortFeesAndDividends(ownerIndex){
  const p = state.players[ownerIndex];
  let totalFee = 0, totalDiv = 0;
  // These are the only cash deductions in the whole game that happen
  // automatically, with no affordability check (every trade already checks
  // freeCash/cash before allowing itself). Clamping each one to the cash
  // actually available at that moment means a passive fee can drain someone
  // to exactly $0, but never leave them stuck below it with nothing they
  // can sell to recover — that dead end is what actually blocks drawCard().
  const takeClamped = (amount)=> Math.min(amount, Math.max(0, p.cash));
  STOCK_IDS.forEach(id=>{
    const heldLong = p.shares[id]||0;
    const heldShort = p.shorts[id]||0;
    const pr = price(id);
    if(heldShort>0){
      const carry = takeClamped(Math.round(heldShort*pr*SHORT_CARRY_FEE_RATE));
      if(carry>0){ p.cash -= carry; totalFee += carry; }
    }
    if(inDividendZone(id)){
      const rate = dividendZoneRateAt(id, state.stocks[id].idx);
      if(heldLong>0){
        const pay = Math.round(heldLong*pr*rate);
        if(pay>0){ p.cash += pay; totalDiv += pay; }
      }
      if(heldShort>0){
        const penalty = takeClamped(Math.round(heldShort*pr*rate*0.5));
        if(penalty>0){ p.cash -= penalty; totalFee += penalty; }
      }
    }
  });

  // Golden Goose: a permanent personal dividend right on a specific stock,
  // won from a card — pays every turn regardless of zone, exclusively to
  // whoever drew it, and stacks on top of any normal zone payout above.
  (p.goldenGeese||[]).forEach(id=>{
    const heldLong = p.shares[id]||0;
    if(heldLong>0 && !state.stocks[id].worthless){
      const pay = Math.round(heldLong*price(id)*0.10);
      if(pay>0){ p.cash += pay; totalDiv += pay; }
    }
  });

  if(totalDiv>0) logEvent(`${p.name} collected $${totalDiv} in dividend payouts.`, true);
  if(totalFee>0) logEvent(`${p.name} paid $${totalFee} in short fees.`, true);

  // Dividend Leach: redirects 10% of whatever THIS player just collected
  // above to whoever's leaching them — a real skim out of the payout, not
  // money created from nothing. Also clamped for the same reason as above.
  if(totalDiv>0 && state.dividendLeaches && state.dividendLeaches.length){
    state.dividendLeaches.forEach(leach=>{
      if(leach.victimIndex!==ownerIndex) return;
      const cut = takeClamped(Math.round(totalDiv*0.10));
      if(cut>0){
        p.cash -= cut;
        state.players[leach.thiefIndex].cash += cut;
        logEvent(`${state.players[leach.thiefIndex].name}'s Dividend Leach skimmed $${cut} from ${p.name}.`, true);
      }
    });
    state.dividendLeaches.forEach(leach=>{ if(leach.victimIndex===ownerIndex) leach.turnsLeft -= 1; });
    state.dividendLeaches = state.dividendLeaches.filter(l=>l.turnsLeft>0);
  }
}

/* Consecutive-own-turns-held counter per stock, for Loyalty Bonus — resets
   to 0 the moment a stock isn't held (sold down to 0), so it only ever
   reflects an unbroken streak, not cumulative lifetime ownership. */
function tickHoldStreaks(ownerIndex){
  const p = state.players[ownerIndex];
  STOCK_IDS.forEach(id=>{
    p.holdStreak[id] = (p.shares[id]||0)>0 ? (p.holdStreak[id]||0)+1 : 0;
  });
}

/* Rate Hike/Rate Cut wear off after a fixed number of TOTAL turns (any
   player's), not per-owner — it's a market-wide event, not a personal one. */
function tickDividendRateModifier(){
  if(!state.dividendRateModifier) return;
  state.dividendRateModifier.turnsLeft -= 1;
  if(state.dividendRateModifier.turnsLeft<=0){
    logEvent(`The ${state.dividendRateModifier.multiplier>1?'Rate Hike':'Rate Cut'} on dividend zones has worn off.`, true);
    state.dividendRateModifier = null;
  }
}

function resolveAuto(card){
  const p = state.players[state.current];
  switch(card.type){
    case 'stock_move': {
      const steps = card.steps || 1;
      applyDictatedSteps(card.stock, card.dir, steps);
      logEvent(`${card.stock} ${card.dir>0?'rose':'fell'} ${steps} step${steps===1?'':'s'} to $${price(card.stock)}.`);
      break;
    }
    case 'sector_move': {
      const steps = card.steps || 1;
      SECTORS[card.sector].stocks.forEach(id=>applyDictatedSteps(id, card.dir, steps));
      logEvent(`${SECTORS[card.sector].label||card.sector} sector moved ${steps} step${steps===1?'':'s'} ${card.dir>0?'up':'down'}.`);
      break;
    }
    case 'stock_revert':
      revertStock(card.stock, card.amount);
      break;
    case 'sector_revert':
      revertSector(card.sector, card.amount);
      logEvent(`${SECTORS[card.sector].label||card.sector} sector reverted toward the middle.`, true);
      break;
    case 'sched_price': {
      const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
      if(eligible.length===0){ logEvent('Insider Info fizzled — no stocks left to predict.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const track = state.stocks[stock].track;
      const targetIdx = Math.floor(Math.random()*track.length); // anywhere on the row, ends included
      const snappedPrice = track[targetIdx];
      const turns = 1 + Math.floor(Math.random()*12); // 1-12 inclusive
      // Rewrite the card's own text with what actually got rolled, so the
      // modal (seen only in this private moment) shows the real prediction
      // instead of the generic "a random stock..." placeholder.
      card.text = `Insider Info: ${stock} will be $${snappedPrice} in ${turns} turn${turns===1?'':'s'} — no matter what happens in between.`;
      state.scheduled.push({ turnsLeft: turns, ownerIndex: state.current, kind:'sched_price', stock, targetIdx, snappedPrice, description: `${stock} will hit $${snappedPrice}` });
      logEvent(`Insider Info was set up by ${p.name} — details stay hidden until it plays out.`);
      break;
    }
    case 'sched_price_fake': {
      // A bad tip, worded identically to a real one — same roll, same
      // private modal, same "X will hit $Y in Z turns" phrasing. The only
      // difference lives in `fake:true` on the scheduled item itself, which
      // never surfaces anywhere the drawer (or anyone else) can see it
      // until the countdown actually runs out.
      const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
      if(eligible.length===0){ logEvent('Insider Info fizzled — no stocks left to predict.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const track = state.stocks[stock].track;
      const targetIdx = Math.floor(Math.random()*track.length);
      const snappedPrice = track[targetIdx];
      const turns = 1 + Math.floor(Math.random()*12);
      card.text = `Insider Info: ${stock} will be $${snappedPrice} in ${turns} turn${turns===1?'':'s'} — no matter what happens in between.`;
      state.scheduled.push({ turnsLeft: turns, ownerIndex: state.current, kind:'sched_price', stock, targetIdx, snappedPrice, fake:true, description: `${stock} will hit $${snappedPrice}` });
      logEvent(`Insider Info was set up by ${p.name} — details stay hidden until it plays out.`);
      break;
    }
    case 'earnings_report': {
      const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
      if(eligible.length===0){ logEvent('Earnings Report fizzled — no stocks left to report on.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const beat = Math.random()<0.5;
      const dir = beat ? 1 : -1;
      const bubblesPerTurn = 1 + Math.floor(Math.random()*4); // 1-4
      const maxTurns = Math.max(1, Math.min(12, Math.floor(24/bubblesPerTurn))); // bubbles*turns capped at 24
      const turns = 1 + Math.floor(Math.random()*maxTurns);
      card.text = `${stock} Earnings Report! — ${stock} ${beat?'beats':'misses'} earnings and will ${beat?'rise':'fall'} ${bubblesPerTurn} bubble${bubblesPerTurn===1?'':'s'} ${beat?'right':'left'} every turn for ${turns} turn${turns===1?'':'s'}.`;
      // A new report on a stock that already has an active drip overrides it —
      // no stacking.
      const existingIdx = state.recurringEffects.findIndex(e=>e.stock===stock);
      if(existingIdx>=0){
        logEvent(`${stock}'s earlier earnings drift was overridden by a new report.`, true);
        state.recurringEffects.splice(existingIdx,1);
      }
      state.recurringEffects.push({ stock, dir, bubblesPerTurn, turnsLeft: turns, ownerIndex: state.current });
      // Earnings Report is public market news, not secret like Insider Info —
      // shown to everyone in full, not redacted in the log.
      logEvent(card.text, true);
      break;
    }
    case 'peek': {
      const next3 = state.deck.slice(0,3).map(c=>c.text);
      state.pendingChoice = { kind:'info', lines: next3.length?next3:['Deck is empty.'] };
      break;
    }
    case 'covid':
      STOCK_IDS.forEach(id=>moveStock(id,-6,false));
      moveSP(-6);
      logEvent('COVID-19 crash hit every stock and both S&P 8 indexes.', true);
      break;
    case 'recession':
      STOCK_IDS.forEach(id=>moveStock(id,-3,false));
      moveSP(-3);
      logEvent('Recession: all stocks and both S&P 8 indexes dipped.', true);
      break;
    case 'bull':
      STOCK_IDS.forEach(id=>moveStock(id,1,false));
      moveSP(1);
      logEvent('Bull Market: all stocks and both S&P 8 indexes climbed.', true);
      break;
    case 'sp_up':
      moveSP(1);
      logEvent(`Both S&P 8 indexes rose — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'sp_up2':
      moveSP(2);
      logEvent(`Both S&P 8 indexes rose 2 steps — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'sp_down':
      moveSP(-1);
      logEvent(`Both S&P 8 indexes fell — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'cash':
      p.cash += card.amount;
      logEvent(`${p.name} received $${card.amount} cash bonus.`);
      break;
    case 'gift':
      if(state.stocks[card.stock].worthless){
        logEvent(`${card.stock} is worthless and delisted — the stock gift has no effect.`);
      } else {
        p.shares[card.stock] += 1; // free share — no cost basis added, shows as pure gain
        logEvent(`${p.name} received 1 free share of ${card.stock}.`);
      }
      break;
    case 'parachute':
      if(netWorth(p) < START_CASH){ p.cash += 20000; logEvent(`${p.name} was below starting capital ($${START_CASH}) — Golden Parachute pays $20,000.`, true); }
      else logEvent(`${p.name}'s net worth is healthy — Golden Parachute has no effect.`);
      break;
    case 'steady': {
      const heldCount = STOCK_IDS.filter(id=>p.shares[id]>0).length;
      const gain = heldCount*250;
      p.cash += gain;
      logEvent(`${p.name} holds ${heldCount} stock(s) — Steady Hand pays $${gain}.`);
      break;
    }
    case 'dividend': {
      const ids = SECTORS[card.sector].stocks;
      state.players.forEach(pl=>{
        const isDrawer = pl===p;
        let shares = 0; ids.forEach(id=>shares+=pl.shares[id]);
        const rate = isDrawer?100:50;
        const pay = shares*rate;
        pl.cash += pay;
      });
      logEvent(`Dividend Day — ${SECTORS[card.sector].label||card.sector}: ${p.name} collects $100/share, others $50/share.`, true);
      break;
    }
    case 'loyalty_bonus': {
      let bestStock = null, bestStreak = 0;
      STOCK_IDS.forEach(id=>{
        if((p.shares[id]||0)>0 && (p.holdStreak[id]||0)>bestStreak){ bestStreak = p.holdStreak[id]; bestStock = id; }
      });
      if(!bestStock){
        logEvent(`${p.name} hasn't held any stock long enough yet — Loyalty Bonus has no effect.`);
      } else {
        const pay = Math.round(p.shares[bestStock]*price(bestStock)*0.02*bestStreak);
        p.cash += pay;
        logEvent(`${p.name} has held ${bestStock} for ${bestStreak} straight turn${bestStreak===1?'':'s'} — Loyalty Bonus pays $${pay}.`, true);
      }
      break;
    }
    case 'golden_goose': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Golden Goose fizzled — no stocks left to bless.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      if(!p.goldenGeese) p.goldenGeese = [];
      p.goldenGeese.push(stock);
      card.text = `Golden Goose: ${stock} now permanently pays YOU an extra 10% dividend on your holdings, every one of your turns, for the rest of the game.`;
      logEvent(`${p.name} drew a Golden Goose on ${stock} — a permanent personal 10% dividend, for the rest of the game.`, true);
      break;
    }
    case 'rate_hike':
      state.dividendRateModifier = { multiplier: 1.5, turnsLeft: 6 };
      logEvent(`Rate Hike! Every stock's dividend zone rate is boosted 50% for the next 6 turns.`, true);
      break;
    case 'rate_cut':
      state.dividendRateModifier = { multiplier: 0.5, turnsLeft: 6 };
      logEvent(`Rate Cut! Every stock's dividend zone rate is cut in half for the next 6 turns.`, true);
      break;
    case 'public_offering':
      p.publicOffering = { active:true, usedStocks:[] };
      logEvent(`${p.name} drew a Public Offering — up to 4 shares each on up to 3 different stocks this turn, no group fee, no price impact.`, true);
      break;
    case 'dividend_leach': {
      const others = state.players.map((pl,i)=>i).filter(i=>i!==state.current && !state.players[i].eliminated);
      if(others.length===0){ logEvent(`${p.name} has no one to leach — Dividend Leach fizzles.`); break; }
      const victimIndex = others[Math.floor(Math.random()*others.length)];
      const turns = 2 + Math.floor(Math.random()*4); // 2-5 inclusive
      if(!state.dividendLeaches) state.dividendLeaches = [];
      state.dividendLeaches.push({ thiefIndex: state.current, victimIndex, turnsLeft: turns });
      card.text = `Dividend Leach: you'll skim 10% of ${state.players[victimIndex].name}'s dividend earnings for their next ${turns} turn${turns===1?'':'s'}.`;
      logEvent(`${p.name} attached a Dividend Leach to ${state.players[victimIndex].name} for ${turns} turn${turns===1?'':'s'}.`, true);
      break;
    }
    case 'margin_forgiveness':
      p.marginShield = true;
      logEvent(`${p.name} is now protected from their next margin call.`, true);
      break;
    case 'buyout': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Buyout fizzled — no stocks left to acquire.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const s = state.stocks[stock];
      const trackLen = s.track.length;
      const curIdx = s.idx;
      const wantsPremium = Math.random() < (2/3); // 66% premium, 33% lowball
      let targetIdx;
      if(wantsPremium && curIdx < trackLen-1){
        targetIdx = curIdx + 1 + Math.floor(Math.random()*(trackLen-1-curIdx));
      } else if(!wantsPremium && curIdx > 0){
        targetIdx = Math.floor(Math.random()*curIdx);
      } else if(curIdx < trackLen-1){
        targetIdx = curIdx + 1 + Math.floor(Math.random()*(trackLen-1-curIdx)); // no room the intended way — take the other side
      } else {
        targetIdx = Math.max(0, curIdx-1);
      }
      const buyoutPrice = s.track[targetIdx];
      const isPremium = targetIdx > curIdx;

      state.players.forEach(pl=>{
        const heldLong = pl.shares[stock]||0;
        if(heldLong>0){
          const proceeds = heldLong*buyoutPrice;
          pl.cash += proceeds;
          pl.shares[stock] = 0;
          pl.costBasis[stock] = 0;
          pl.holdStreak[stock] = 0;
          logEvent(`${pl.name}'s ${heldLong} shares of ${stock} were bought out for $${proceeds}.`, true);
        }
        const heldShort = pl.shorts[stock]||0;
        if(heldShort>0){
          const cost = heldShort*buyoutPrice;
          pl.cash -= cost;
          reduceShortBasisOnCover(pl, stock, heldShort);
          pl.shorts[stock] = 0;
          logEvent(`${pl.name}'s ${heldShort}-share ${stock} short was forcibly covered in the buyout for $${cost}.`, true);
        }
      });

      s.prevIdx = s.idx;
      s.idx = targetIdx;
      checkMarginCalls(); checkGameOver();
      card.text = `Buyout: ${stock} has been bought out at $${buyoutPrice}/share${isPremium?' — a premium buyout':' — a lowball buyout'}. Every position in it was instantly settled; it reopens and trades normally from here.`;
      logEvent(`Buyout! ${stock} was acquired at $${buyoutPrice}/share${isPremium?' (premium)':' (lowball)'} — every position in it was closed out.`, true);
      break;
    }
    case 'short_squeeze': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Short Squeeze fizzled — no stocks left to squeeze.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      applyDictatedSteps(stock, 1, 7); // forced hard move up — bigger than any normal card
      let coveredCount = 0;
      state.players.forEach(pl=>{
        const qty = pl.shorts[stock]||0;
        if(qty>0){
          const cost = qty*price(stock);
          pl.cash -= cost;
          reduceShortBasisOnCover(pl, stock, qty);
          pl.shorts[stock] = 0;
          coveredCount++;
          logEvent(`${pl.name}'s ${stock} short was forcibly covered in the squeeze for $${cost}.`, true);
        }
      });
      checkMarginCalls(); checkGameOver();
      card.text = `Short Squeeze: ${stock} surged to $${price(stock)}${coveredCount>0?`, forcing ${coveredCount} short${coveredCount===1?'':'s'} to cover`:''}.`;
      logEvent(`Short Squeeze hit ${stock} — it surged to $${price(stock)}${coveredCount>0?`, forcing ${coveredCount} short${coveredCount===1?'':'s'} to cover`:''}.`, true);
      break;
    }
    default:
      break;
  }
}

function needsChoice(card){
  return ['sched_swing','split','choose_stock_move','choose_sector_move','whale','freeze'].includes(card.type);
}

/* choice resolvers, called from UI */
function resolveChoice(card, choice){
  const p = state.players[state.current];
  state.choiceError = null;
  switch(card.type){
    case 'sched_swing': {
      const { stock, dir } = choice;
      state.scheduled.push({ turnsLeft:2, ownerIndex: state.current, kind:'sched_swing', stock, dir, description: `${stock} will swing 2 steps ${dir>0?'up':'down'}` });
      logEvent(`Insider Info was set up by ${p.name} — details stay hidden until it plays out.`);
      break;
    }
    case 'split': {
      const { stock } = choice;
      if(p.shares[stock]<=0){ state.choiceError = `You don't own any ${stock} — pick a stock you hold shares in.`; return false; }
      p.shares[stock]*=2; // cost basis total is unchanged by design — a split just halves avg cost/share
      logEvent(`${p.name}'s ${stock} shares split — now ${p.shares[stock]}.`);
      break;
    }
    case 'choose_stock_move': {
      const { stock, dir } = choice;
      moveStock(stock, dir, false);
      logEvent(`${p.name} moved ${stock} ${dir>0?'up':'down'} to $${price(stock)}.`);
      break;
    }
    case 'choose_sector_move': {
      const { sector, dir } = choice;
      SECTORS[sector].stocks.forEach(id=>moveStock(id, dir, false));
      logEvent(`${p.name} moved the ${SECTORS[sector].label||sector} sector ${dir>0?'up':'down'}.`);
      break;
    }
    case 'whale': {
      const { stock, side, qty } = choice;
      if(side==='buy'){
        const cost = price(stock)*qty;
        if(cost>p.cash){ state.choiceError = `Not enough cash — whale-buying ${qty} ${stock} costs $${cost}, you have $${p.cash}.`; return false; }
        p.cash -= cost; addCostBasis(p, stock, cost); p.shares[stock]+=qty;
        moveStock(stock,1,false); moveStock(stock,1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'up', qty);
        logEvent(`${p.name} whale-bought ${qty} ${stock} for $${cost} — price surged.`);
      } else if(side==='sell'){
        if(p.shares[stock]<qty){ state.choiceError = `You only hold ${p.shares[stock]} ${stock} — can't whale-sell ${qty}.`; return false; }
        reduceCostBasisOnSell(p, stock, qty);
        p.shares[stock]-=qty; p.cash += price(stock)*qty;
        moveStock(stock,-1,false); moveStock(stock,-1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'down', qty);
        logEvent(`${p.name} whale-sold ${qty} ${stock} for $${price(stock)*qty} — price dropped.`);
      } else if(side==='short'){
        const margin = price(stock)*qty;
        if(margin>freeCash(p)){ state.choiceError = `Not enough free cash — shorting ${qty} ${stock} needs $${margin} collateral, you have $${freeCash(p)} free.`; return false; }
        const proceeds = price(stock)*qty;
        p.cash += proceeds; addShortBasis(p, stock, proceeds); p.shorts[stock] = (p.shorts[stock]||0) + qty;
        moveStock(stock,-1,false); moveStock(stock,-1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'down', qty);
        checkMarginCalls();
        logEvent(`${p.name} whale-shorted ${qty} ${stock} for $${proceeds} — price dropped, collateral locked.`, true);
      } else {
        logEvent(`${p.name} held off — no whale trade made.`);
      }
      break;
    }
    case 'freeze': {
      const { stock } = choice;
      state.stocks[stock].frozen = true;
      logEvent(`${p.name} froze ${stock} against the next dictated move.`);
      break;
    }
  }
  return true;
}

/* ============================= TRADING ============================= */
function tickerLabel(id){ return id==='SP' ? 'Mini SP8' : id==='SPX' ? 'SP8' : id; }

function snapshotForUndo(){
  return JSON.parse(JSON.stringify({
    stocks: state.stocks, sp: state.sp, spx: state.spx, players: state.players,
    turnUsage: state.turnUsage, turnFills: state.turnFills,
    log: state.log, gameOver: state.gameOver, winner: state.winner,
  }));
}
function pushUndoSnapshot(){
  state.turnUndoStack.push(snapshotForUndo());
}
function undoLastTrade(){
  if(!isMyTurn() || !state.turnUndoStack || state.turnUndoStack.length===0) return;
  const snap = state.turnUndoStack.pop();
  state.stocks = snap.stocks; state.sp = snap.sp; state.spx = snap.spx; state.players = snap.players;
  state.turnUsage = snap.turnUsage; state.turnFills = snap.turnFills;
  state.log = snap.log; state.gameOver = snap.gameOver; state.winner = snap.winner;
  logEvent('Last trade undone.');
  persist(); render();
}

/* Records a volume marker on the stock's price-history timeline — buys and
   covers (buy-pressure) stack as bars from the bottom; sells and shorts
   (sell-pressure) stack as bars from the top. Colored per player. */
const MAX_TRADE_MARKERS = 150;
function recordTradeMarker(id, color, side, qty){
  const obj = objFor(id);
  obj.tradeMarkers.push({ historyIdx: obj.history.length-1, color, side, qty });
  if(obj.tradeMarkers.length > MAX_TRADE_MARKERS) obj.tradeMarkers = obj.tradeMarkers.slice(-MAX_TRADE_MARKERS);
}

function buyShares(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  if(id!=='SP' && id!=='SPX' && state.stocks[id].worthless) return;
  const p = state.players[state.current];
  const qty = Math.min(qtyRequested||0, capRemaining(), capRemainingForStock(id));
  if(qty<=0){ logEvent(`No cap left this turn to buy ${tickerLabel(id)}.`); render(); return; }
  const offer = p.publicOffering;
  const offerEligible = id!=='SP' && id!=='SPX' && offer && offer.active && (offer.usedStocks.includes(id) || offer.usedStocks.length<3);
  const priorFilled = state.turnFills.up[id]||0;
  const walk = (id==='SP' || offerEligible)
    ? { total: priceOf(id)*qty, fee: 0, finalIdx: objFor(id).idx } // Mini SP8 never has its own price impact; Public Offering waives it for stocks
    : walkOrderDetailed(id, qty, +1, priorFilled);
  const totalCost = walk.total + walk.fee;
  if(totalCost > freeCash(p)){ logEvent(`${p.name} doesn't have enough free cash to buy ${qty} ${tickerLabel(id)}.`); render(); return; }
  pushUndoSnapshot();
  p.cash -= totalCost;
  addCostBasis(p, id, totalCost);
  if(id==='SP'){ p.spShares += qty; } else if(id==='SPX'){ p.spxShares += qty; } else { p.shares[id] += qty; }
  const obj = objFor(id);
  const priorIdx = obj.idx;
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  if(id==='SPX') mirrorOntoMiniSP8(walk.finalIdx - priorIdx); // SP8 and Mini SP8 always move together
  state.turnUsage.total += qty;
  state.turnUsage.perStock[id] = (state.turnUsage.perStock[id]||0) + qty;
  if(offerEligible){
    if(!offer.usedStocks.includes(id)) offer.usedStocks.push(id);
  } else if(id!=='SP') {
    state.turnFills.up[id] = priorFilled + qty;
  }
  const feeNote = walk.fee>0 ? ` (incl. $${walk.fee} fee)` : (id==='SP' ? ' (no price impact)' : offerEligible ? ' (Public Offering — no fee, no price impact)' : '');
  logEvent(`${p.name} bought ${qty} ${tickerLabel(id)} for $${totalCost}${feeNote} — now $${obj.track[obj.idx]}.`);
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'up', qty); schedulePersist(); render();
}

function sellShares(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  const p = state.players[state.current];
  const held = id==='SP' ? p.spShares : id==='SPX' ? p.spxShares : p.shares[id];
  const qty = Math.min(qtyRequested||0, held);
  if(qty<=0){ render(); return; }
  const priorFilled = state.turnFills.down[id]||0;
  const walk = id==='SP'
    ? { total: priceOf(id)*qty, fee: 0, finalIdx: objFor(id).idx } // Mini SP8 never has its own price impact
    : walkOrderDetailed(id, qty, -1, priorFilled);
  const proceeds = walk.total - walk.fee;
  pushUndoSnapshot();
  p.cash += proceeds;
  reduceCostBasisOnSell(p, id, qty);
  if(id==='SP'){ p.spShares -= qty; } else if(id==='SPX'){ p.spxShares -= qty; } else { p.shares[id] -= qty; }
  const obj = objFor(id);
  const priorIdx = obj.idx;
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  if(id==='SPX') mirrorOntoMiniSP8(walk.finalIdx - priorIdx); // SP8 and Mini SP8 always move together
  if(id!=='SP') state.turnFills.down[id] = priorFilled + qty;
  const feeNote = walk.fee>0 ? ` (after $${walk.fee} fee)` : (id==='SP' ? ' (no price impact)' : '');
  logEvent(`${p.name} sold ${qty} ${tickerLabel(id)} for $${proceeds}${feeNote} — now $${obj.track[obj.idx]}.`);
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'down', qty); schedulePersist(); render();
}

function openShort(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || id==='SP' || id==='SPX' || state.gameOver) return; // neither index fund can be shorted
  if(state.stocks[id].worthless) return;
  const p = state.players[state.current];
  const qty = Math.min(qtyRequested||0, capRemaining(), capRemainingForStock(id));
  if(qty<=0){ logEvent(`No cap left this turn to short ${id}.`); render(); return; }
  const requiredMargin = qty*price(id);
  if(requiredMargin > freeCash(p)){ logEvent(`${p.name} doesn't have enough free cash to short ${qty} ${id}.`); render(); return; }
  const priorFilled = state.turnFills.down[id]||0;
  const walk = walkOrderDetailed(id, qty, -1, priorFilled); // shorting is sell pressure — walks down
  const proceeds = walk.total - walk.fee;
  pushUndoSnapshot();
  p.cash += proceeds;
  addShortBasis(p, id, proceeds);
  p.shorts[id] = (p.shorts[id]||0) + qty;
  const obj = state.stocks[id];
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  state.turnUsage.total += qty;
  state.turnUsage.perStock[id] = (state.turnUsage.perStock[id]||0) + qty;
  state.turnFills.down[id] = priorFilled + qty;
  const feeNote = walk.fee>0 ? ` (after $${walk.fee} fee)` : '';
  logEvent(`${p.name} opened a short on ${qty} ${id} for $${proceeds}${feeNote} — collateral locked, now $${obj.track[obj.idx]}.`, true);
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'down', qty); schedulePersist(); render();
}

function coverShort(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  const p = state.players[state.current];
  const held = p.shorts[id]||0;
  const qty = Math.min(qtyRequested||0, held);
  if(qty<=0){ render(); return; }
  const priorFilled = state.turnFills.up[id]||0; // covering is buy-pressure — shares the "up" channel with Buy
  const walk = walkOrderDetailed(id, qty, +1, priorFilled);
  const totalCost = walk.total + walk.fee;
  if(totalCost > p.cash){ logEvent(`${p.name} doesn't have enough cash to cover ${qty} ${id}.`); render(); return; }
  pushUndoSnapshot();
  p.cash -= totalCost;
  reduceShortBasisOnCover(p, id, qty);
  p.shorts[id] -= qty;
  const obj = state.stocks[id];
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  state.turnFills.up[id] = priorFilled + qty;
  const feeNote = walk.fee>0 ? ` (incl. $${walk.fee} fee)` : '';
  logEvent(`${p.name} covered ${qty} ${id} for $${totalCost}${feeNote} — now $${obj.track[obj.idx]}.`);
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'up', qty); schedulePersist(); render();
}

function endTurn(){
  state.players[state.current].publicOffering = null; // this-turn-only perk — clear it as the turn ends
  recordNetWorthHistory();
  const wasLastPlayer = state.current === state.players.length-1;
  let next = state.current;
  do { next = (next+1)%state.players.length; } while(state.players[next].eliminated && next!==state.current);
  state.current = next;
  state.turnStartedAt = Date.now();
  state.phase = 'draw';
  state.turnStage = 'start';
  state.tradeSelection = null;
  state.turnUsage = { total: 0, perStock: {} };
  state.turnFills = { up: {}, down: {} };
  state.turnUndoStack = [];
  state.cardsDrawnThisTurn = 0;
  if(wasLastPlayer) paySP8Dividend();
  persist(); render();
}

/* Both index funds pay a 10% dividend on holdings at the end of every
   round (once every player has taken a turn) — a steady reward for
   parking cash in the "safe" indexes instead of chasing individual
   stocks. Same rate for both — SP8 just moves more dollars per share. */
function paySP8Dividend(){
  state.players.forEach(pl=>{
    if(pl.spShares>0){
      const pay = Math.round(pl.spShares*spPrice()*0.10);
      pl.cash += pay;
      logEvent(`${pl.name} collected a $${pay} Mini SP8 dividend (10% of holding value).`, true);
    }
    if(pl.spxShares>0){
      const pay = Math.round(pl.spxShares*spxPrice()*0.10);
      pl.cash += pay;
      logEvent(`${pl.name} collected a $${pay} SP8 dividend (10% of holding value).`, true);
    }
  });
}

/* The trade-phase button means different things depending on where you are
   in the turn: after the opening draw, it kicks off the mandatory closing
   draw (you still land back in trade to react to it). After THAT draw has
   already been seen and resolved, the same button actually ends the turn. */
function requestEndTurn(){
  if(!isMyTurn()) return;
  if(!state.gameOver && capRemaining()>0){
    state.confirmEndTurn = true;
    render();
  } else {
    proceedPastTrade();
  }
}

function proceedPastTrade(){
  state.confirmEndTurn = false;
  if(state.turnStage==='start'){
    beginClosingDraw();
  } else {
    endTurn();
  }
}

function beginClosingDraw(){
  state.turnStage = 'end';
  state.phase = 'draw';
  state.cardsDrawnThisTurn = 0;
  persist(); render();
}

/* ============================= BOT (1-PLAYER MODE) ============================= */
/* A bot seat is just a regular player with `bot:true`. Whenever it becomes
   the bot's turn, the human's own browser (the only one connected in a
   1-player game) drives it — drawing cards, making reasonably sensible
   choices, trading a bit, and ending its turn — using the same underlying
   functions a human's clicks would call, just invoked directly instead of
   through the UI. Runs as a short chain of setTimeout steps so it visibly
   plays out as a turn rather than jumping to the result instantly. */
const BOT_STEP_DELAY = 450;
let botTurnRunning = false;

/* -1..1 — how far a stock sits from its own track's center, negative means
   cheap relative to its own range, positive means rich. Comparable across
   stocks even though they now have very different dollar centers. */
function botRelativeIdx(id){
  const s = state.stocks[id];
  const center = (s.track.length-1)/2;
  return center>0 ? (s.idx-center)/center : 0;
}
function botCheapestStock(){
  let best=null, bestScore=Infinity;
  STOCK_IDS.forEach(id=>{
    if(state.stocks[id].worthless) return;
    const score = botRelativeIdx(id);
    if(score<bestScore){ bestScore=score; best=id; }
  });
  return best;
}
function botLargestHolding(bot){
  let best=null, bestQty=0;
  STOCK_IDS.forEach(id=>{
    if((bot.shares[id]||0)>bestQty){ bestQty=bot.shares[id]; best=id; }
  });
  return best;
}

/* Sells down the bot's biggest long holding, repeatedly, until its cash is
   back to $0+ — the same forced-liquidation a human faces after a margin
   call, just handled automatically. */
function botFixNegativeCash(){
  const bot = state.players[state.current];
  let guard = 0;
  while(bot.cash<0 && guard<20){
    guard++;
    const held = botLargestHolding(bot);
    if(!held) break; // nothing left to sell
    sellShares(held, bot.shares[held], true);
  }
  return bot.cash>=0;
}

/* Makes a sensible pick for whatever choice card is up, then resolves it —
   mirrors what a human would do via renderChoiceUI, just decided for them. */
function botResolveChoice(){
  const card = state.pendingCard;
  const bot = state.players[state.current];
  let choice = null;
  switch(card.type){
    case 'sched_swing':
      choice = { stock: botCheapestStock() || STOCK_IDS[0], dir: 1 };
      break;
    case 'split': {
      const held = botLargestHolding(bot);
      if(!held){ finishCardResolution(); return; } // owns nothing — same as the human "no effect" path
      choice = { stock: held };
      break;
    }
    case 'choose_stock_move': {
      const held = botLargestHolding(bot);
      choice = { stock: held || botCheapestStock() || STOCK_IDS[0], dir: 1 };
      break;
    }
    case 'choose_sector_move': {
      const held = botLargestHolding(bot);
      const sectorKeys = Object.keys(SECTORS);
      const sector = held ? STOCKS[held].sector : sectorKeys[Math.floor(Math.random()*sectorKeys.length)];
      choice = { sector, dir: 1 };
      break;
    }
    case 'whale': {
      const cheap = botCheapestStock();
      const qty = 2;
      if(cheap && price(cheap)*qty <= freeCash(bot)){ choice = { stock:cheap, side:'buy', qty }; }
      else { choice = { side:'hold' }; }
      break;
    }
    case 'freeze': {
      const held = botLargestHolding(bot);
      choice = { stock: held || STOCK_IDS[0] };
      break;
    }
    default:
      finishCardResolution();
      return;
  }
  const ok = resolveChoice(card, choice);
  finishCardResolution(); // resolveChoice's picks above are always valid, so this always fires next
  void ok;
}

/* One trading decision per call, checked in priority order: cover a short
   that's paid off, sell a long holding that's gotten rich, open a new short
   on something overextended, or buy into something that looks cheap —
   keeping a cash buffer in reserve throughout. Returns false once nothing
   more looks worth doing, which is the bot's signal to end its turn. */
function botTakeOneTradeAction(){
  const bot = state.players[state.current];

  // 1. Cover a short that's swung back down — lock in the profit.
  const coverable = STOCK_IDS.find(id=> (bot.shorts[id]||0)>0 && botRelativeIdx(id) < -0.3 );
  if(coverable){ coverShort(coverable, Math.min(2, bot.shorts[coverable]), true); return true; }

  // 2. Sell a long holding that's gotten rich.
  const richHeld = STOCK_IDS.find(id=> bot.shares[id]>0 && botRelativeIdx(id) > 0.5 );
  if(richHeld){ sellShares(richHeld, Math.min(2, bot.shares[richHeld]), true); return true; }

  // 3. Open a short on something clearly overextended, as long as it isn't
  // also a stock the bot is long in (no point betting both ways at once).
  if(capRemaining()>0){
    const rich = STOCK_IDS.find(id=> !state.stocks[id].worthless && bot.shares[id]<=0 && botRelativeIdx(id) > 0.6 );
    if(rich && capRemainingForStock(rich)>0){
      const qty = Math.min(2, capRemaining(), capRemainingForStock(rich));
      const buffer = freeCash(bot)*0.25;
      if(qty>0 && price(rich)*qty <= (freeCash(bot)-buffer)){
        openShort(rich, qty, true);
        return true;
      }
    }
  }

  // 4. Buy a stock that looks cheap.
  if(capRemaining()>0){
    const cheap = botCheapestStock();
    if(cheap && capRemainingForStock(cheap)>0 && botRelativeIdx(cheap) < 0.15){
      const buffer = freeCash(bot)*0.25; // keep ~25% of free cash in reserve
      const qty = Math.min(2, capRemaining(), capRemainingForStock(cheap));
      if(qty>0){
        const priorFilled = state.turnFills.up[cheap]||0;
        const walk = walkOrderDetailed(cheap, qty, +1, priorFilled);
        if((walk.total+walk.fee) <= (freeCash(bot)-buffer)){
          buyShares(cheap, qty, true);
          return true;
        }
      }
    }
  }
  return false;
}

/* Any connected human's browser could be the one to drive a bot's turn —
   in real multiplayer, several might be open at once. Firebase's
   transaction API gives the same "only one wins" guarantee we already use
   for turn-timeout enforcement: everyone who notices it's a bot's turn
   races to move the lock from the previous turn's timestamp to the
   current one, but only the first to reach the server actually succeeds. */
async function claimBotTurnLock(turnStartedAt){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(botLockRef(), (current)=>{
      if(current === turnStartedAt) return; // already claimed for this turn — abort
      return turnStartedAt;
    });
    return result.committed;
  }catch(e){
    console.error('UpTrend: bot turn lock claim failed', e);
    return false;
  }
}

/* Kicks off the bot's turn if it isn't already running. Safe to call from
   render() on every re-render — the running flag makes it a no-op once a
   chain of steps is already in flight, and the lock claim above makes it
   safe even when multiple human browsers call this for the same bot turn
   at roughly the same time. */
async function maybeStartBotTurn(){
  if(botTurnRunning || !state || state.gameOver || state.phase==='lobby') return;
  const cur = state.players[state.current];
  if(!cur || !cur.bot) return;
  botTurnRunning = true; // set immediately so this browser doesn't re-enter while its own claim is in flight
  const won = await claimBotTurnLock(state.turnStartedAt);
  if(!won){ botTurnRunning = false; return; } // another connected browser is already handling this bot's turn
  setTimeout(runBotStep, BOT_STEP_DELAY);
}

function runBotStep(){
  if(!state || state.gameOver){ botTurnRunning = false; return; }
  const cur = state.players[state.current];
  if(!cur || !cur.bot){ botTurnRunning = false; return; } // turn already moved on to a human
  if(cur.eliminated){ endTurn(); botTurnRunning = false; return; }
  if(cur.cash<0){
    const fixed = botFixNegativeCash();
    if(!fixed){
      // Genuinely nothing left to sell — a real margin call from price
      // movement left cash negative with no long holdings to recover with.
      // Rather than end the turn and hit this exact same wall again next
      // time it's the bot's turn (forever), reset it as a bankruptcy so
      // the game keeps moving for everyone.
      resetBankruptPlayer(cur);
      setTimeout(runBotStep, BOT_STEP_DELAY);
      return;
    }
    setTimeout(runBotStep, BOT_STEP_DELAY);
    return;
  }
  if(isTurnProtectedFromTimeout()){ botResolveChoice(); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
  if(state.phase==='draw'){ drawCard(true); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
  if(state.phase==='resolve'){ finishCardResolution(); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
  if(state.phase==='trade'){
    if(botTakeOneTradeAction()){ setTimeout(runBotStep, 300); return; }
    proceedPastTrade();
    setTimeout(runBotStep, BOT_STEP_DELAY);
    return;
  }
  botTurnRunning = false;
}

/* Sets up a fresh 1-player-vs-bot game directly, skipping the lobby
   entirely (there's nothing to wait on — only one human seat exists). */
const GAME_LENGTH_OPTIONS = {
  net500:  { mode:'networth', target:500000,  label:'$500,000' },
  net1m:   { mode:'networth', target:1000000, label:'$1,000,000' },
  timer30: { mode:'timer', minutes:30, label:'30 Min Timer' },
};

function startBotGame(){
  const glKey = window._setupGameLength || 'net500';
  const gameLength = GAME_LENGTH_OPTIONS[glKey] || GAME_LENGTH_OPTIONS.net500;
  state = freshState(['You', 'Bot'], gameLength);
  state.players[1].bot = true;
  state.createdAt = Date.now();
  myPlayerIndex = 0;
  saveLocalRoom(roomCode, 0, 'You');
  lastKnownSnapshot = {};
  persistFull(); render();
}

function renderEndTurnConfirm(){
  if(!state.confirmEndTurn) return '';
  const left = capRemaining();
  const isStart = state.turnStage==='start';
  return `<div class="overlay">
    <div class="modal">
      <h2>${isStart ? 'Draw your closing card?' : 'End your turn?'}</h2>
      <div class="sub">You still have ${left} buy/short action${left===1?'':'s'} left this turn. Sure you don't want to use them${isStart ? ' before drawing your closing card' : ''}?</div>
      <div class="btn-row">
        <button class="btn secondary full" id="cancelEndTurnBtn">Keep Trading</button>
        <button class="btn full" id="confirmEndTurnBtn">${isStart ? 'Draw Closing Card' : 'End Turn'}</button>
      </div>
    </div>
  </div>`;
}

function renderRestartConfirm(){
  if(!state || !state.confirmRestart) return '';
  return `<div class="overlay">

function createLobby(count){
  const glKey = window._setupGameLength || 'net500';
  const gameLength = GAME_LENGTH_OPTIONS[glKey] || GAME_LENGTH_OPTIONS.net500;
  // Empty seats use '' (not null!) — Firebase Realtime Database silently
  // strips null entries out of arrays/objects on write, which was quietly
  // collapsing a 2-seat lobby down to 1 the moment it hit the database.
  state = { phase:'lobby', lobbySeats: Array(count).fill(''), lobbyBots: Array(count).fill(false), gameLength, version:0, createdAt: Date.now(), ...localDefaults() };
  lastKnownSnapshot = {}; // this is a whole new structure — nothing to diff against yet
  persistFull(); render();
}

function claimSeat(idx){
  const input = document.getElementById('claimName'+idx);
  const name = (input && input.value.trim()) || `Player ${idx+1}`;
  if(!state || state.phase!=='lobby' || state.lobbySeats[idx]) return;
  state.lobbySeats[idx] = name;
  myPlayerIndex = idx;
  saveLocalRoom(roomCode, idx, name);
  persist(); render();
}

/* Fills an open seat with a bot instead of waiting for a human — the seat
   counts as "claimed" for start-game purposes, but nobody can pick it as
   their own identity. */
function fillSeatWithBot(idx){
  if(!state || state.phase!=='lobby' || state.lobbySeats[idx]) return;
  const botNum = state.lobbyBots.slice(0,idx).filter(Boolean).length + 1;
  state.lobbySeats[idx] = `Bot ${botNum}`;
  state.lobbyBots[idx] = true;
  persist(); render();
}

function removeBotFromSeat(idx){
  if(!state || state.phase!=='lobby' || !state.lobbyBots[idx]) return;
  state.lobbySeats[idx] = '';
  state.lobbyBots[idx] = false;
  persist(); render();
}

function startGameFromLobby(){
  if(!state || state.phase!=='lobby' || state.lobbySeats.some(s=>!s)) return;
  if(state.lobbySeats.every((s,i)=>state.lobbyBots[i])) return; // need at least one human seat
  const names = state.lobbySeats.slice();
  const bots = state.lobbyBots.slice();
  const gameLength = state.gameLength || GAME_LENGTH_OPTIONS.net500;
  const locals = localDefaults();
  const createdAt = state.createdAt || Date.now();
  state = freshState(names, gameLength);
  state.players.forEach((pl,i)=>{ if(bots[i]) pl.bot = true; });
  state.createdAt = createdAt;
  Object.assign(state, locals);
  lastKnownSnapshot = {}; // structure changed completely — full replace, not a diff
  persistFull(); render();
}
