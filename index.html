  if(p.cash < INSIDER_INFO_PRICE){ logEvent(`${p.name} can't afford to buy Insider Info — needs $${INSIDER_INFO_PRICE}.`); render(); return; }
  const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
  if(eligible.length===0){ logEvent(`${p.name} tried to buy Insider Info, but no stocks are left to get a tip on.`); render(); return; }
  p.cash -= INSIDER_INFO_PRICE;
  const stock = eligible[Math.floor(Math.random()*eligible.length)];
  const track = state.stocks[stock].track;
  const targetIdx = Math.floor(Math.random()*track.length);
  const snappedPrice = track[targetIdx];
  const turns = 1 + Math.floor(Math.random()*12);
  const csuite = INSIDER_TIERS.csuite;
  state.scheduled.push({
    turnsLeft: turns, ownerIndex: state.current, kind:'sched_price', stock, targetIdx, snappedPrice,
    fake:false, description: `${stock} will hit $${snappedPrice}`,
    tier:'bought', riskRate: BOUGHT_INSIDER_RISK_RATE, jailTurns: csuite.jailTurns, fineRate: csuite.fineRate,
    baselineLong: p.shares[stock]||0, baselineShort: p.shorts[stock]||0, actedOn:false,
  });
  logEvent(`${p.name} paid $${INSIDER_INFO_PRICE.toLocaleString()} for Insider Info — details stay hidden until it plays out.`, true);
  schedulePersist(); render();
}

function isStockInsiderBlocked(stockId){
  return !!(state.insiderBlockers && state.insiderBlockers.some(b=>b.stock===stockId && b.roundsLeft>0));
}

function resolveScheduledItem(item){
  if(item.kind==='sched_price'){
    if(state.stocks[item.stock].worthless){ logEvent(`${item.stock} went worthless before its price target could land.`, true); return; }
    if(item.fake || isStockInsiderBlocked(item.stock)){
      // A blocked tip fizzles with the EXACT same message a naturally-fake
      // one would — from the outside there's no way to tell an Insider
      // Info Blocker was ever involved, which is the whole point.
      logEvent(`Insider Info turned out to be false — ${item.stock} never hit $${item.snappedPrice} as "predicted."`, true);
      return;
    }
    state.stocks[item.stock].prevIdx = state.stocks[item.stock].idx;
    state.stocks[item.stock].idx = item.targetIdx;
    logEvent(`Insider Info came true: ${item.stock} hit $${item.snappedPrice} as predicted.`, true);
  } else if(item.kind==='sched_swing'){
    if(isStockInsiderBlocked(item.stock)){
      logEvent(`Scheduled Swing fizzled — the move never materialized.`, true);
      return;
    }
    const dir = item.dir;
    moveStock(item.stock, dir*2>0?1:-1, false); moveStock(item.stock, dir*2>0?1:-1, false);
    logEvent(`Scheduled Swing triggered: ${item.stock} moved 2 steps ${dir>0?'up':'down'}.`, true);
  }
}

/* Advances active Earnings Report drips owned by `ownerIndex` by one step —
   same "only the drawer's own turns" rule as tickScheduled. Each tick moves
   the stock `bubblesPerTurn` steps and counts down; a drip whose stock has
   gone worthless in the meantime just quietly ends instead of moving. */
function tickRecurringEffects(ownerIndex){
  const remaining = [];
  state.recurringEffects.forEach(eff=>{
    if(eff.ownerIndex!==ownerIndex){ remaining.push(eff); return; }
    if(state.stocks[eff.stock].worthless){
      logEvent(`${eff.stock}'s earnings drift ended — the stock went worthless.`, true);
      return;
    }
    applyDictatedSteps(eff.stock, eff.dir, eff.bubblesPerTurn);
    eff.turnsLeft -= 1;
    logEvent(`${eff.stock} drifted ${eff.bubblesPerTurn} bubble${eff.bubblesPerTurn===1?'':'s'} ${eff.dir>0?'up':'down'} on earnings — now $${price(eff.stock)}${eff.turnsLeft>0?` (${eff.turnsLeft} more turn${eff.turnsLeft===1?'':'s'})`:' — drift complete.'}`, true);
    if(eff.turnsLeft>0) remaining.push(eff);
  });
  state.recurringEffects = remaining;
}

/* True while a stock currently sits in its own dividend zone (the top N
   bubbles of its track) — worthless stocks never qualify. */
function inDividendZone(id){
  const zone = DIVIDEND_ZONES[id];
  if(!zone) return false;
  const s = state.stocks[id];
  if(s.worthless) return false;
  return s.idx >= s.track.length - zone.dots;
}

/* Runs once at the start of each player's own turn: pays a flat salary,
   every open short pays a flat 1% carrying fee on its current liability,
   and any stock currently sitting in its dividend zone pays longs the
   zone's full rate — while shorts in that same zone pay an extra 33% of
   the zone's rate on top of their normal carrying fee, since being short
   into a company that's paying out is a real cost, just less than what a
   long holder actually earns. */
const SALARY_PER_TURN = 4000;
function tickShortFeesAndDividends(ownerIndex){
  const p = state.players[ownerIndex];
  let totalFee = 0, totalDiv = 0;

  // Salary — a flat, unconditional payment straight from the bank, every
  // one of your own turns, regardless of holdings or performance. Fired
  // overrides everything else (no pay, no overtime, even if both are
  // somehow active at once); otherwise Overtime pays 1.5x whatever your
  // current base salary is (raised permanently by Promotion cards).
  if(p.firedRoundsLeft>0){
    logEvent(`${p.name} is out of work this turn — no salary.`);
  } else {
    const salary = p.overtimeTurnsLeft>0 ? Math.round(p.baseSalary*1.5) : p.baseSalary;
    p.cash += salary;
    logEvent(`${p.name} collected their $${salary.toLocaleString()} salary${p.overtimeTurnsLeft>0?' (overtime)':''}.`);
    if(p.overtimeTurnsLeft>0){
      p.overtimeTurnsLeft -= 1;
      if(p.overtimeTurnsLeft===0) logEvent(`${p.name}'s overtime period has ended.`);
    }
  }

  // These are the only cash deductions in the whole game that happen
  // automatically, with no affordability check (every trade already checks
  // freeCash/cash before allowing itself). Clamping each one to the cash
  // actually available at that moment means a passive fee can drain someone
  // to exactly $0, but never leave them stuck below it with nothing they
  // can sell to recover — that dead end is what actually blocks drawCard().
  const takeClamped = (amount)=> Math.min(amount, Math.max(0, p.cash));
  STOCK_IDS.forEach(id=>{
    const heldLong = p.shares[id]||0;
    const heldShort = p.shorts[id]||0;
    const pr = price(id);
    if(heldShort>0){
      const carry = takeClamped(Math.round(heldShort*pr*SHORT_CARRY_FEE_RATE));
      if(carry>0){ p.cash -= carry; totalFee += carry; }
    }
    if(inDividendZone(id)){
      const rate = dividendZoneRateAt(id, state.stocks[id].idx);
      if(heldLong>0){
        const pay = Math.round(heldLong*pr*rate);
        if(pay>0){ p.cash += pay; totalDiv += pay; }
      }
      if(heldShort>0){
        const penalty = takeClamped(Math.round(heldShort*pr*rate*0.33));
        if(penalty>0){ p.cash -= penalty; totalFee += penalty; }
      }
    }
  });

  // Golden Goose: a permanent personal dividend right on a specific stock,
  // won from a card — pays every turn regardless of zone, exclusively to
  // whoever drew it, and stacks on top of any normal zone payout above.
  (p.goldenGeese||[]).forEach(id=>{
    const heldLong = p.shares[id]||0;
    if(heldLong>0 && !state.stocks[id].worthless){
      const pay = Math.round(heldLong*price(id)*0.10);
      if(pay>0){ p.cash += pay; totalDiv += pay; }
    }
  });

  if(totalDiv>0) logEvent(`${p.name} collected $${totalDiv} in dividend payouts.`, true);
  if(totalFee>0) logEvent(`${p.name} paid $${totalFee} in short fees.`, true);

  // Dividend Leach: redirects 10% of whatever THIS player just collected
  // above to whoever's leaching them — a real skim out of the payout, not
  // money created from nothing. Also clamped for the same reason as above.
  if(totalDiv>0 && state.dividendLeaches && state.dividendLeaches.length){
    state.dividendLeaches.forEach(leach=>{
      if(leach.victimIndex!==ownerIndex) return;
      const cut = takeClamped(Math.round(totalDiv*0.10));
      if(cut>0){
        p.cash -= cut;
        state.players[leach.thiefIndex].cash += cut;
        logEvent(`${state.players[leach.thiefIndex].name}'s Dividend Leach skimmed $${cut} from ${p.name}.`, true);
      }
    });
    state.dividendLeaches.forEach(leach=>{ if(leach.victimIndex===ownerIndex && !leach.permanent) leach.turnsLeft -= 1; });
    state.dividendLeaches = state.dividendLeaches.filter(l=>l.permanent || l.turnsLeft>0);
  }
}

/* Consecutive-own-turns-held counter per stock, for Loyalty Bonus — resets
   to 0 the moment a stock isn't held (sold down to 0), so it only ever
   reflects an unbroken streak, not cumulative lifetime ownership. */
function tickHoldStreaks(ownerIndex){
  const p = state.players[ownerIndex];
  STOCK_IDS.forEach(id=>{
    p.holdStreak[id] = (p.shares[id]||0)>0 ? (p.holdStreak[id]||0)+1 : 0;
  });
}

/* Rate Hike/Rate Cut wear off after a fixed number of TOTAL turns (any
   player's), not per-owner — it's a market-wide event, not a personal one. */
function tickDividendRateModifier(){
  if(!state.dividendRateModifier) return;
  state.dividendRateModifier.turnsLeft -= 1;
  if(state.dividendRateModifier.turnsLeft<=0){
    logEvent(`The ${state.dividendRateModifier.multiplier>1?'Rate Hike':'Rate Cut'} on dividend zones has worn off.`, true);
    state.dividendRateModifier = null;
  }
}

/* Counts down each of this player's own active Portfolio Manager windows.
   When one expires, whatever's still sitting in its lots (never sold/
   covered) gets boosted at CURRENT prices — unrealized gains only, same
   rule as realized ones: losses are never boosted, only real gains — then
   the whole accumulated boost (realized-along-the-way + this final
   unrealized piece) is paid out as one lump sum. */
function tickPortfolioManagers(ownerIndex){
  const p = state.players[ownerIndex];
  if(!p.portfolioManagers || p.portfolioManagers.length===0) return;
  const remaining = [];
  p.portfolioManagers.forEach(pm=>{
    pm.turnsLeft -= 1;
    if(pm.turnsLeft>0){ remaining.push(pm); return; }
    let finalBoost = pm.accumulatedBoost||0;
    (pm.lots||[]).forEach(lot=>{
      if(state.stocks[lot.stock].worthless) return; // nothing left to value
      const curPrice = price(lot.stock);
      const gain = lot.side==='long' ? (curPrice-lot.costPerShare)*lot.qty : (lot.costPerShare-curPrice)*lot.qty;
      if(gain>0) finalBoost += gain*0.20;
    });
    const payout = Math.round(finalBoost);
    if(payout>0){
      p.cash += payout;
      logEvent(`${p.name}'s Portfolio Manager expired — $${payout} in boosted gains paid out.`, true);
    } else {
      logEvent(`${p.name}'s Portfolio Manager expired with no gains to boost.`);
    }
  });
  p.portfolioManagers = remaining;
}

/* Round-boundary effects — ticked once per full round (every player has
   taken a turn), alongside the S&P 8 dividend. Fired counts down in
   rounds, not turns, and Insider Info Blockers expire the same way. */
function tickRoundBoundaryEffects(){
  state.players.forEach(p=>{
    if(p.firedRoundsLeft>0){
      p.firedRoundsLeft -= 1;
      if(p.firedRoundsLeft===0) logEvent(`${p.name} is back on payroll.`, true);
    }
  });
  if(state.insiderBlockers && state.insiderBlockers.length){
    state.insiderBlockers.forEach(b=>{ b.roundsLeft -= 1; });
    state.insiderBlockers = state.insiderBlockers.filter(b=>b.roundsLeft>0);
  }
}

function resolveAuto(card){
  const p = state.players[state.current];
  switch(card.type){
    case 'stock_move': {
      const steps = card.steps || 1;
      applyDictatedSteps(card.stock, card.dir, steps);
      logEvent(`${card.stock} ${card.dir>0?'rose':'fell'} ${steps} step${steps===1?'':'s'} to $${price(card.stock)}.`);
      break;
    }
    case 'sector_move': {
      const steps = card.steps || 1;
      SECTORS[card.sector].stocks.forEach(id=>applyDictatedSteps(id, card.dir, steps));
      logEvent(`${SECTORS[card.sector].label||card.sector} sector moved ${steps} step${steps===1?'':'s'} ${card.dir>0?'up':'down'}.`);
      break;
    }
    case 'stock_revert':
      revertStock(card.stock, card.amount);
      break;
    case 'sector_revert':
      revertSector(card.sector, card.amount);
      logEvent(`${SECTORS[card.sector].label||card.sector} sector reverted toward the middle.`, true);
      break;
    case 'insider_tip': {
      // Same roll, same private modal, same "X will hit $Y in Z turns"
      // phrasing regardless of tier or whether it's fake — indistinguishable
      // at draw time. The tier's risk/jail/fine numbers and the fake flag
      // ride along on the scheduled item itself, invisible until it matters.
      const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
      if(eligible.length===0){ logEvent('Insider Info fizzled — no stocks left to predict.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const track = state.stocks[stock].track;
      const targetIdx = Math.floor(Math.random()*track.length); // anywhere on the row, ends included
      const snappedPrice = track[targetIdx];
      const turns = 1 + Math.floor(Math.random()*12); // 1-12 inclusive
      const tierCfg = INSIDER_TIERS[card.tier];
      card.text = `Insider Info: ${stock} will be $${snappedPrice} in ${turns} turn${turns===1?'':'s'} — no matter what happens in between.`;
      state.scheduled.push({
        turnsLeft: turns, ownerIndex: state.current, kind:'sched_price', stock, targetIdx, snappedPrice,
        fake: !!card.fake, description: `${stock} will hit $${snappedPrice}`,
        tier: card.tier, riskRate: tierCfg.riskRate, jailTurns: tierCfg.jailTurns, fineRate: tierCfg.fineRate,
        baselineLong: p.shares[stock]||0, baselineShort: p.shorts[stock]||0, actedOn:false,
      });
      logEvent(`Insider Info was set up by ${p.name} — details stay hidden until it plays out.`);
      break;
    }
    case 'earnings_report': {
      const eligible = STOCK_IDS.filter(sid=>!state.stocks[sid].worthless);
      if(eligible.length===0){ logEvent('Earnings Report fizzled — no stocks left to report on.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const beat = Math.random()<0.5;
      const dir = beat ? 1 : -1;
      const bubblesPerTurn = 1 + Math.floor(Math.random()*4); // 1-4
      const maxTurns = Math.max(1, Math.min(12, Math.floor(24/bubblesPerTurn))); // bubbles*turns capped at 24
      const turns = 1 + Math.floor(Math.random()*maxTurns);
      card.text = `${stock} Earnings Report! — ${stock} ${beat?'beats':'misses'} earnings and will ${beat?'rise':'fall'} ${bubblesPerTurn} bubble${bubblesPerTurn===1?'':'s'} ${beat?'right':'left'} every turn for ${turns} turn${turns===1?'':'s'}.`;
      // A new report on a stock that already has an active drip overrides it —
      // no stacking.
      const existingIdx = state.recurringEffects.findIndex(e=>e.stock===stock);
      if(existingIdx>=0){
        logEvent(`${stock}'s earlier earnings drift was overridden by a new report.`, true);
        state.recurringEffects.splice(existingIdx,1);
      }
      state.recurringEffects.push({ stock, dir, bubblesPerTurn, turnsLeft: turns, ownerIndex: state.current });
      // Earnings Report is public market news, not secret like Insider Info —
      // shown to everyone in full, not redacted in the log.
      logEvent(card.text, true);
      break;
    }
    case 'peek': {
      const next3 = state.deck.slice(0,3).map(c=>c.text);
      state.pendingChoice = { kind:'info', lines: next3.length?next3:['Deck is empty.'] };
      break;
    }
    case 'covid':
      STOCK_IDS.forEach(id=>moveStock(id,-6,false));
      moveSP(-6);
      logEvent('COVID-19 crash hit every stock and both S&P 8 indexes.', true);
      break;
    case 'recession':
      STOCK_IDS.forEach(id=>moveStock(id,-3,false));
      moveSP(-3);
      logEvent('Recession: all stocks and both S&P 8 indexes dipped.', true);
      break;
    case 'recession2':
      STOCK_IDS.forEach(id=>moveStock(id,-2,false));
      moveSP(-2);
      logEvent('Recession: all stocks and both S&P 8 indexes dipped 2 steps.', true);
      break;
    case 'bull':
      STOCK_IDS.forEach(id=>moveStock(id,1,false));
      moveSP(1);
      logEvent('Bull Market: all stocks and both S&P 8 indexes climbed.', true);
      break;
    case 'bull2':
      STOCK_IDS.forEach(id=>moveStock(id,2,false));
      moveSP(2);
      logEvent('Bull Market: all stocks and both S&P 8 indexes climbed 2 steps.', true);
      break;
    case 'sp_up':
      moveSP(1);
      logEvent(`Both S&P 8 indexes rose — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'sp_up2':
      moveSP(2);
      logEvent(`Both S&P 8 indexes rose 2 steps — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'sp_down':
      moveSP(-1);
      logEvent(`Both S&P 8 indexes fell — Mini SP8 to $${spPrice()}, SP8 to $${spxPrice()}.`);
      break;
    case 'cash':
      p.cash += card.amount;
      logEvent(`${p.name} received $${card.amount} cash bonus.`);
      break;
    case 'gift':
      if(state.stocks[card.stock].worthless){
        logEvent(`${card.stock} is worthless and delisted — the stock gift has no effect.`);
      } else {
        p.shares[card.stock] += 1; // free share — no cost basis added, shows as pure gain
        logEvent(`${p.name} received 1 free share of ${card.stock}.`);
      }
      break;
    case 'parachute':
      if(netWorth(p) < START_CASH){ p.cash += 20000; logEvent(`${p.name} was below starting capital ($${START_CASH}) — Golden Parachute pays $20,000.`, true); }
      else logEvent(`${p.name}'s net worth is healthy — Golden Parachute has no effect.`);
      break;
    case 'steady': {
      const heldCount = STOCK_IDS.filter(id=>p.shares[id]>0).length;
      const gain = heldCount*250;
      p.cash += gain;
      logEvent(`${p.name} holds ${heldCount} stock(s) — Steady Hand pays $${gain}.`);
      break;
    }
    case 'dividend': {
      const ids = SECTORS[card.sector].stocks;
      state.players.forEach(pl=>{
        const isDrawer = pl===p;
        let shares = 0; ids.forEach(id=>shares+=pl.shares[id]);
        const rate = isDrawer?100:50;
        const pay = shares*rate;
        pl.cash += pay;
      });
      logEvent(`Dividend Day — ${SECTORS[card.sector].label||card.sector}: ${p.name} collects $100/share, others $50/share.`, true);
      break;
    }
    case 'loyalty_bonus': {
      let bestStock = null, bestStreak = 0;
      STOCK_IDS.forEach(id=>{
        if((p.shares[id]||0)>0 && (p.holdStreak[id]||0)>bestStreak){ bestStreak = p.holdStreak[id]; bestStock = id; }
      });
      if(!bestStock){
        logEvent(`${p.name} hasn't held any stock long enough yet — Loyalty Bonus has no effect.`);
      } else {
        const pay = Math.round(p.shares[bestStock]*price(bestStock)*0.02*bestStreak);
        p.cash += pay;
        logEvent(`${p.name} has held ${bestStock} for ${bestStreak} straight turn${bestStreak===1?'':'s'} — Loyalty Bonus pays $${pay}.`, true);
      }
      break;
    }
    case 'golden_goose': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Golden Goose fizzled — no stocks left to bless.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      if(!p.goldenGeese) p.goldenGeese = [];
      p.goldenGeese.push(stock);
      card.text = `Golden Goose: ${stock} now permanently pays YOU an extra 10% dividend on your holdings, every one of your turns, for the rest of the game.`;
      logEvent(`${p.name} drew a Golden Goose on ${stock} — a permanent personal 10% dividend, for the rest of the game.`, true);
      break;
    }
    case 'rate_hike':
      state.dividendRateModifier = { multiplier: 1.5, turnsLeft: 6 };
      logEvent(`Rate Hike! Every stock's dividend zone rate is boosted 50% for the next 6 turns.`, true);
      break;
    case 'rate_cut':
      state.dividendRateModifier = { multiplier: 0.5, turnsLeft: 6 };
      logEvent(`Rate Cut! Every stock's dividend zone rate is cut in half for the next 6 turns.`, true);
      break;
    case 'public_offering':
      p.publicOffering = { active:true, usedStocks:[] };
      logEvent(`${p.name} drew a Public Offering — up to 4 shares each on up to 3 different stocks this turn, no group fee, no price impact.`, true);
      break;
    case 'dividend_leach': {
      const others = state.players.map((pl,i)=>i).filter(i=>i!==state.current && !state.players[i].eliminated);
      if(others.length===0){ logEvent(`${p.name} has no one to leach — Dividend Leach fizzles.`); break; }
      const victimIndex = others[Math.floor(Math.random()*others.length)];
      const turns = 2 + Math.floor(Math.random()*4); // 2-5 inclusive
      if(!state.dividendLeaches) state.dividendLeaches = [];
      state.dividendLeaches.push({ thiefIndex: state.current, victimIndex, turnsLeft: turns });
      card.text = `Dividend Leach: you'll skim 10% of ${state.players[victimIndex].name}'s dividend earnings for their next ${turns} turn${turns===1?'':'s'}.`;
      logEvent(`${p.name} attached a Dividend Leach to ${state.players[victimIndex].name} for ${turns} turn${turns===1?'':'s'}.`, true);
      break;
    }
    case 'perma_leach': {
      // Random opponent, no choice involved (unlike the holdable regular
      // Dividend Leach), and — unlike the timed version — this one is
      // marked `permanent:true` so tickShortFeesAndDividends below never
      // decrements or expires it. There's no card anywhere that removes it.
      const others = state.players.map((pl,i)=>i).filter(i=>i!==state.current && !state.players[i].eliminated);
      if(others.length===0){ logEvent(`${p.name} has no one to leach — Permanent Dividend Leach fizzles.`); break; }
      const victimIndex = others[Math.floor(Math.random()*others.length)];
      if(!state.dividendLeaches) state.dividendLeaches = [];
      // turnsLeft is never read for a permanent leach (every place that
      // touches it checks the `permanent` flag first) — using `null` here
      // rather than Infinity because Firebase/JSON can't represent Infinity
      // and would silently mangle it on the next sync round-trip.
      state.dividendLeaches.push({ thiefIndex: state.current, victimIndex, turnsLeft: null, permanent: true });
      card.text = `Permanent Dividend Leach: you'll skim 10% of ${state.players[victimIndex].name}'s dividend earnings for the rest of the game.`;
      logEvent(`${p.name} attached a Permanent Dividend Leach to ${state.players[victimIndex].name} — for the rest of the game.`, true);
      break;
    }
    case 'margin_forgiveness':
      p.marginShield = true;
      logEvent(`${p.name} is now protected from their next margin call.`, true);
      break;
    case 'freeze': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless && !state.stocks[id].frozen);
      if(eligible.length===0){ logEvent('Freeze fizzled — nothing left to freeze.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      state.stocks[stock].frozen = true;
      card.text = `Freeze: ${stock} now ignores the next dictated movement card that targets it.`;
      logEvent(`${p.name} drew Freeze — ${stock} is frozen against the next dictated move.`);
      break;
    }
    case 'buyout': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Buyout fizzled — no stocks left to acquire.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      const s = state.stocks[stock];
      const trackLen = s.track.length;
      const curIdx = s.idx;
      const wantsPremium = Math.random() < (2/3); // 66% premium, 33% lowball
      let targetIdx;
      if(wantsPremium && curIdx < trackLen-1){
        targetIdx = curIdx + 1 + Math.floor(Math.random()*(trackLen-1-curIdx));
      } else if(!wantsPremium && curIdx > 0){
        targetIdx = Math.floor(Math.random()*curIdx);
      } else if(curIdx < trackLen-1){
        targetIdx = curIdx + 1 + Math.floor(Math.random()*(trackLen-1-curIdx)); // no room the intended way — take the other side
      } else {
        targetIdx = Math.max(0, curIdx-1);
      }
      const buyoutPrice = s.track[targetIdx];
      const isPremium = targetIdx > curIdx;

      state.players.forEach(pl=>{
        const heldLong = pl.shares[stock]||0;
        if(heldLong>0){
          const proceeds = heldLong*buyoutPrice;
          pl.cash += proceeds;
          pl.shares[stock] = 0;
          pl.costBasis[stock] = 0;
          pl.holdStreak[stock] = 0;
          logEvent(`${pl.name}'s ${heldLong} shares of ${stock} were bought out for $${proceeds}.`, true);
        }
        const heldShort = pl.shorts[stock]||0;
        if(heldShort>0){
          const cost = heldShort*buyoutPrice;
          pl.cash -= cost;
          reduceShortBasisOnCover(pl, stock, heldShort);
          pl.shorts[stock] = 0;
          logEvent(`${pl.name}'s ${heldShort}-share ${stock} short was forcibly covered in the buyout for $${cost}.`, true);
        }
      });

      s.prevIdx = s.idx;
      s.idx = targetIdx;
      checkMarginCalls(); checkGameOver();
      card.text = `Buyout: ${stock} has been bought out at $${buyoutPrice}/share${isPremium?' — a premium buyout':' — a lowball buyout'}. Every position in it was instantly settled; it reopens and trades normally from here.`;
      logEvent(`Buyout! ${stock} was acquired at $${buyoutPrice}/share${isPremium?' (premium)':' (lowball)'} — every position in it was closed out.`, true);
      break;
    }
    case 'divorce': {
      p.cash = Math.floor(p.cash/2);
      STOCK_IDS.forEach(id=>{
        if(p.shares[id]>0){
          const nq = Math.floor(p.shares[id]/2);
          p.costBasis[id] = (p.costBasis[id]||0) * (p.shares[id]>0 ? nq/p.shares[id] : 0);
          p.shares[id] = nq;
        }
        if((p.shorts[id]||0)>0){
          const nq = Math.floor(p.shorts[id]/2);
          p.shortBasis[id] = (p.shortBasis[id]||0) * (p.shorts[id]>0 ? nq/p.shorts[id] : 0);
          p.shorts[id] = nq;
        }
      });
      if(p.spShares>0){ const nq=Math.floor(p.spShares/2); p.spCostBasis=(p.spCostBasis||0)*(nq/p.spShares); p.spShares=nq; }
      if(p.spxShares>0){ const nq=Math.floor(p.spxShares/2); p.spxCostBasis=(p.spxCostBasis||0)*(nq/p.spxShares); p.spxShares=nq; }
      logEvent(`${p.name} went through a Divorce — cash and every holding got cut in half.`, true);
      break;
    }
    case 'portfolio_manager': {
      const turns = 3 + Math.floor(Math.random()*6); // 3-8 turns
      p.portfolioManagers.push({ turnsLeft: turns, lots: [], accumulatedBoost: 0 });
      card.text = `Portfolio Manager: for your next ${turns} turns, everything you buy or short gets a 20% boost on any gain, paid out in cash when the window closes.`;
      logEvent(`${p.name} hired a Portfolio Manager for ${turns} turns.`, true);
      break;
    }
    case 'inheritance_last': {
      const active = state.players.filter(pl=>!pl.eliminated);
      const minNW = Math.min(...active.map(pl=>netWorth(pl)));
      if(netWorth(p) > minNW){
        logEvent(`${p.name} drew Inheritance — 2nd Life, but isn't in last place. No payout.`);
      } else {
        const amount = Math.round(Math.random()*250000/1000)*1000;
        p.cash += amount;
        card.text = `Inheritance — 2nd Life: you're in last place, so a distant relative left you $${amount.toLocaleString()}.`;
        logEvent(`${p.name} was in last place and inherited $${amount.toLocaleString()}.`, true);
      }
      break;
    }
    case 'inheritance_all': {
      const amounts = [];
      state.players.forEach(pl=>{
        const amount = Math.round(Math.random()*100000/1000)*1000;
        pl.cash += amount;
        amounts.push(`${pl.name} $${amount.toLocaleString()}`);
      });
      card.text = `Inheritance: everyone gets a surprise windfall — ${amounts.join(', ')}.`;
      logEvent(`Inheritance for everyone: ${amounts.join(', ')}.`, true);
      break;
    }
    case 'promotion': {
      const raise = Math.round((1000 + Math.random()*5000)/100)*100; // $1,000-$6,000, nearest $100
      p.baseSalary += raise;
      card.text = `Promotion! Your salary permanently goes up $${raise.toLocaleString()}/turn.`;
      logEvent(`${p.name} got a Promotion — salary up $${raise.toLocaleString()}/turn for good, now $${p.baseSalary.toLocaleString()}/turn.`, true);
      break;
    }
    case 'fired': {
      const rounds = 1 + Math.floor(Math.random()*50); // 1-50 rounds
      p.firedRoundsLeft = rounds;
      card.text = `Fired! No salary for the next ${rounds} round${rounds===1?'':'s'}.`;
      logEvent(`${p.name} was fired — no salary for ${rounds} round${rounds===1?'':'s'}.`, true);
      break;
    }
    case 'overtime': {
      const turns = 3 + Math.floor(Math.random()*8); // 3-10 turns
      p.overtimeTurnsLeft = turns;
      card.text = `Overtime! You'll earn 1.5x salary for your next ${turns} turns.`;
      logEvent(`${p.name} is working Overtime — 1.5x salary for ${turns} turns.`, true);
      break;
    }
    case 'short_squeeze': {
      const eligible = STOCK_IDS.filter(id=>!state.stocks[id].worthless);
      if(eligible.length===0){ logEvent('Short Squeeze fizzled — no stocks left to squeeze.'); break; }
      const stock = eligible[Math.floor(Math.random()*eligible.length)];
      applyDictatedSteps(stock, 1, 7); // forced hard move up — bigger than any normal card
      let coveredCount = 0;
      state.players.forEach(pl=>{
        const qty = pl.shorts[stock]||0;
        if(qty>0){
          const cost = qty*price(stock);
          pl.cash -= cost;
          reduceShortBasisOnCover(pl, stock, qty);
          pl.shorts[stock] = 0;
          coveredCount++;
          logEvent(`${pl.name}'s ${stock} short was forcibly covered in the squeeze for $${cost}.`, true);
        }
      });
      checkMarginCalls(); checkGameOver();
      card.text = `Short Squeeze: ${stock} surged to $${price(stock)}${coveredCount>0?`, forcing ${coveredCount} short${coveredCount===1?'':'s'} to cover`:''}.`;
      logEvent(`Short Squeeze hit ${stock} — it surged to $${price(stock)}${coveredCount>0?`, forcing ${coveredCount} short${coveredCount===1?'':'s'} to cover`:''}.`, true);
      break;
    }
    default:
      break;
  }
}

function needsChoice(card){
  if(card.type==='dividend_leach' && card.holdable) return true; // the holdable variant lets you pick your target instead of it being random
  return ['sched_swing','split','choose_stock_move','choose_sector_move','whale','insider_blocker','hunter','espionage'].includes(card.type);
}

/* All (playerIndex, stock) pairs across every opponent's currently active
   Golden Geese — the legal target list for a Hunter card. Excludes the
   acting player themselves (you can't hunt your own goose) and anyone
   already eliminated. Duplicate (index, stock) pairs are collapsed to one
   entry — Hunter only ever kills a single Golden Goose per play, so if an
   opponent stacked two on the same stock, killing "one" is enough to pick.*/
function huntableGeese(){
  const out = [];
  const seen = new Set();
  state.players.forEach((pl,i)=>{
    if(i===state.current || pl.eliminated) return;
    (pl.goldenGeese||[]).forEach(stock=>{
      const key = `${i}:${stock}`;
      if(seen.has(key)) return;
      seen.add(key);
      out.push({ targetIndex:i, stock });
    });
  });
  return out;
}

/* choice resolvers, called from UI */
function resolveChoice(card, choice){
  const p = state.players[state.current];
  state.choiceError = null;
  switch(card.type){
    case 'sched_swing': {
      const { stock, dir } = choice;
      state.scheduled.push({ turnsLeft:2, ownerIndex: state.current, kind:'sched_swing', stock, dir, description: `${stock} will swing 2 steps ${dir>0?'up':'down'}` });
      logEvent(`Insider Info was set up by ${p.name} — details stay hidden until it plays out.`);
      break;
    }
    case 'split': {
      const { stock } = choice;
      if(p.shares[stock]<=0){ state.choiceError = `You don't own any ${stock} — pick a stock you hold shares in.`; return false; }
      p.shares[stock]*=2; // cost basis total is unchanged by design — a split just halves avg cost/share
      logEvent(`${p.name}'s ${stock} shares split — now ${p.shares[stock]}.`);
      break;
    }
    case 'choose_stock_move': {
      const { stock, dir } = choice;
      moveStock(stock, dir, false);
      logEvent(`${p.name} moved ${stock} ${dir>0?'up':'down'} to $${price(stock)}.`);
      break;
    }
    case 'choose_sector_move': {
      const { sector, dir } = choice;
      SECTORS[sector].stocks.forEach(id=>moveStock(id, dir, false));
      logEvent(`${p.name} moved the ${SECTORS[sector].label||sector} sector ${dir>0?'up':'down'}.`);
      break;
    }
    case 'whale': {
      const { stock, side, qty } = choice;
      if(side==='buy'){
        const cost = price(stock)*qty;
        if(cost>p.cash){ state.choiceError = `Not enough cash — whale-buying ${qty} ${stock} costs $${cost}, you have $${p.cash}.`; return false; }
        p.cash -= cost; addCostBasis(p, stock, cost); p.shares[stock]+=qty;
        moveStock(stock,1,false); moveStock(stock,1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'up', qty);
        logEvent(`${p.name} whale-bought ${qty} ${stock} for $${cost} — price surged.`);
      } else if(side==='sell'){
        if(p.shares[stock]<qty){ state.choiceError = `You only hold ${p.shares[stock]} ${stock} — can't whale-sell ${qty}.`; return false; }
        reduceCostBasisOnSell(p, stock, qty);
        p.shares[stock]-=qty; p.cash += price(stock)*qty;
        moveStock(stock,-1,false); moveStock(stock,-1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'down', qty);
        logEvent(`${p.name} whale-sold ${qty} ${stock} for $${price(stock)*qty} — price dropped.`);
      } else if(side==='short'){
        const margin = price(stock)*qty;
        if(margin>freeCash(p)){ state.choiceError = `Not enough free cash — shorting ${qty} ${stock} needs $${margin} collateral, you have $${freeCash(p)} free.`; return false; }
        const proceeds = price(stock)*qty;
        p.cash += proceeds; addShortBasis(p, stock, proceeds); p.shorts[stock] = (p.shorts[stock]||0) + qty;
        moveStock(stock,-1,false); moveStock(stock,-1,false);
        recordHistory(); recordTradeMarker(stock, p.color, 'down', qty);
        checkMarginCalls();
        logEvent(`${p.name} whale-shorted ${qty} ${stock} for $${proceeds} — price dropped, collateral locked.`, true);
      } else {
        logEvent(`${p.name} held off — no whale trade made.`);
      }
      break;
    }
    case 'dividend_leach': {
      const victimIndex = choice.victimIndex;
      const valid = state.players.some((pl,i)=> i===victimIndex && i!==state.current && !pl.eliminated);
      if(!valid){ state.choiceError = 'Pick a valid opponent to leach.'; return false; }
      const turns = 2 + Math.floor(Math.random()*4); // 2-5 inclusive — duration still random, only the target is chosen
      if(!state.dividendLeaches) state.dividendLeaches = [];
      state.dividendLeaches.push({ thiefIndex: state.current, victimIndex, turnsLeft: turns });
      logEvent(`${p.name} attached a Dividend Leach to ${state.players[victimIndex].name} for ${turns} turn${turns===1?'':'s'}.`, true);
      break;
    }
    case 'insider_blocker': {
      const { stock } = choice;
      if(!STOCK_IDS.includes(stock)){ state.choiceError = 'Pick a valid stock to protect.'; return false; }
      const rounds = 1 + Math.floor(Math.random()*6); // 1-6 rounds
      if(!state.insiderBlockers) state.insiderBlockers = [];
      state.insiderBlockers.push({ ownerIndex: state.current, stock, roundsLeft: rounds });
      // Which stock is protected is never revealed — not even in the log.
      logEvent(`${p.name} played an Insider Info Blocker.`, true);
      break;
    }
    case 'hunter': {
      const { targetIndex, stock } = choice;
      const target = state.players[targetIndex];
      if(!target || targetIndex===state.current || target.eliminated){ state.choiceError = 'Pick a valid opponent to hunt.'; return false; }
      const idx = (target.goldenGeese||[]).indexOf(stock);
      if(idx===-1){ state.choiceError = `${target.name} doesn't have a Golden Goose on ${stock} anymore.`; return false; }
      target.goldenGeese.splice(idx, 1); // kills exactly one — if they stacked more than one on the same stock, the rest survive
      logEvent(`${p.name} hunted down ${target.name}'s Golden Goose on ${stock} — that dividend is gone for good.`, true);
      if(state.current===myPlayerIndex || targetIndex===myPlayerIndex) playSfx('hunter');
      break;
    }
    case 'espionage': {
      const targetIndex = choice.targetIndex;
      const valid = state.players.some((pl,i)=> i===targetIndex && i!==state.current && !pl.eliminated);
      if(!valid){ state.choiceError = 'Pick a valid opponent to spy on.'; return false; }
      const turns = 1 + Math.floor(Math.random()*5); // 1-5 inclusive
      if(!state.espionage) state.espionage = [];
      state.espionage.push({ spyIndex: state.current, targetIndex, turnsLeft: turns });
      logEvent(`${p.name} planted a spy on ${state.players[targetIndex].name}'s holdings — visible for ${p.name}'s next ${turns} turn${turns===1?'':'s'}.`, true);
      break;
    }
  }
  return true;
}

/* ============================= TRADING ============================= */
function tickerLabel(id){ return id==='SP' ? 'Mini SP8' : id==='SPX' ? 'SP8' : id; }

function snapshotForUndo(){
  return JSON.parse(JSON.stringify({
    stocks: state.stocks, sp: state.sp, spx: state.spx, players: state.players,
    turnUsage: state.turnUsage, turnFills: state.turnFills,
    log: state.log, gameOver: state.gameOver, winner: state.winner,
  }));
}
function pushUndoSnapshot(){
  state.turnUndoStack.push(snapshotForUndo());
}
function undoLastTrade(){
  if(!isMyTurn() || !state.turnUndoStack || state.turnUndoStack.length===0) return;
  const snap = state.turnUndoStack.pop();
  state.stocks = snap.stocks; state.sp = snap.sp; state.spx = snap.spx; state.players = snap.players;
  state.turnUsage = snap.turnUsage; state.turnFills = snap.turnFills;
  state.log = snap.log; state.gameOver = snap.gameOver; state.winner = snap.winner;
  logEvent('Last trade undone.');
  persist(); render();
}

/* Records a volume marker on the stock's price-history timeline — buys and
   covers (buy-pressure) stack as bars from the bottom; sells and shorts
   (sell-pressure) stack as bars from the top. Colored per player. */
const MAX_TRADE_MARKERS = 150;
function recordTradeMarker(id, color, side, qty){
  const obj = objFor(id);
  obj.tradeMarkers.push({ historyIdx: obj.history.length-1, color, side, qty });
  if(obj.tradeMarkers.length > MAX_TRADE_MARKERS) obj.tradeMarkers = obj.tradeMarkers.slice(-MAX_TRADE_MARKERS);
}

/* Fires after every buy/sell/short/cover — if the trading player has an
   active tip on THIS specific stock that they haven't already crossed the
   line on, checks whether this trade just crossed it: buying or shorting
   MORE than they held when they got the tip, or selling/covering away MORE
   THAN HALF of what they held at that time. Holding steady, or trimming up
   to half, stays safe. Once crossed, `actedOn` stays true for the rest of
   that tip's life — it doesn't un-cross by trading back the other way. */
function checkInsiderActedOn(playerIndex, stockId){
  const p = state.players[playerIndex];
  state.scheduled.forEach(item=>{
    if(item.ownerIndex!==playerIndex || item.stock!==stockId || !item.riskRate || item.actedOn) return;
    const curLong = p.shares[stockId]||0;
    const curShort = p.shorts[stockId]||0;
    const crossedLong = curLong > item.baselineLong || curLong < item.baselineLong*0.5;
    const crossedShort = curShort > item.baselineShort || curShort < item.baselineShort*0.5;
    if(crossedLong || crossedShort) item.actedOn = true;
  });
}

/* Rolls the dice, once per active acted-on tip this player is holding, at
   the start of their own turn — stacking risk if they've got more than one
   live at once. The first one that hits stops the check right there (only
   one violation processed per turn). Returns true if they got caught, so
   drawCard can forfeit the rest of this turn. Fine is calculated on net
   worth BEFORE anything is seized, per spec — seizing first would make the
   fine smaller than it should be. Which stock it was stays out of the
   public log; the player themselves obviously still sees it, since it's
   their own portfolio the seizure just hit. */
function checkInsiderTradingRisk(ownerIndex){
  const p = state.players[ownerIndex];
  const activeTips = state.scheduled.filter(item=>item.ownerIndex===ownerIndex && item.riskRate>0 && item.actedOn);
  for(const item of activeTips){
    if(Math.random() >= item.riskRate) continue;
    const fine = Math.round(netWorth(p) * item.fineRate);
    p.cash -= fine;
    p.shares[item.stock] = 0; p.costBasis[item.stock] = 0; p.holdStreak[item.stock] = 0;
    p.shorts[item.stock] = 0; p.shortBasis[item.stock] = 0;
    if(!p.bannedStocks) p.bannedStocks = [];
    if(!p.bannedStocks.includes(item.stock)) p.bannedStocks.push(item.stock);
    p.jailTurnsLeft = item.jailTurns;
    logEvent(`${p.name} was caught insider trading — fined $${fine.toLocaleString()}, had the position seized, and is now permanently barred from trading that stock. Serving ${item.jailTurns} turn${item.jailTurns===1?'':'s'} in jail.`, true);
    if(ownerIndex===myPlayerIndex) playSfx('jail');
    return true;
  }
  return false;
}

/* Portfolio Manager tracking — each active window on a player keeps its own
   independent list of "lots" (stock+side+qty+price) for anything bought or
   shorted while it was active. Opening a position adds a lot to EVERY
   currently-active window (so overlapping windows can independently boost
   the same trade). Closing a position walks each window's own lot list
   LIFO (most-recently-opened first) and banks 20% of any REALIZED gain
   right then — losses are never boosted, only real gains. Whatever's left
   in a window's lots when it expires gets boosted at current prices
   (unrealized) and paid out as a lump sum — see tickPortfolioManagers. */
function trackPortfolioManagerOpen(p, id, side, qty, pricePerShare){
  if(!p.portfolioManagers || p.portfolioManagers.length===0) return;
  p.portfolioManagers.forEach(pm=>{
    pm.lots.push({ stock:id, side, qty, costPerShare: pricePerShare });
  });
}
function trackPortfolioManagerClose(p, id, side, qty, closePricePerShare){
  if(!p.portfolioManagers || p.portfolioManagers.length===0) return;
  p.portfolioManagers.forEach(pm=>{
    let remaining = qty;
    for(let i=pm.lots.length-1; i>=0 && remaining>0; i--){
      const lot = pm.lots[i];
      if(lot.stock!==id || lot.side!==side) continue;
      const consume = Math.min(lot.qty, remaining);
      const gain = side==='long' ? (closePricePerShare-lot.costPerShare)*consume : (lot.costPerShare-closePricePerShare)*consume;
      if(gain>0) pm.accumulatedBoost = (pm.accumulatedBoost||0) + gain*0.20;
      lot.qty -= consume;
      remaining -= consume;
      if(lot.qty<=0) pm.lots.splice(i,1);
    }
  });
}

function buyShares(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  if(id!=='SP' && id!=='SPX' && state.stocks[id].worthless) return;
  const p = state.players[state.current];
  if((p.bannedStocks||[]).includes(id)){ logEvent(`${p.name} is permanently barred from trading ${id} after being caught insider trading.`); render(); return; }
  const qty = Math.min(qtyRequested||0, capRemaining(), capRemainingForStock(id));
  if(qty<=0){ logEvent(`No cap left this turn to buy ${tickerLabel(id)}.`); render(); return; }
  const offer = p.publicOffering;
  const offerEligible = id!=='SP' && id!=='SPX' && offer && offer.active && (offer.usedStocks.includes(id) || offer.usedStocks.length<3);
  const priorFilled = state.turnFills.up[id]||0;
  const walk = (id==='SP' || offerEligible)
    ? { total: priceOf(id)*qty, fee: 0, finalIdx: objFor(id).idx } // Mini SP8 never has its own price impact; Public Offering waives it for stocks
    : walkOrderDetailed(id, qty, +1, priorFilled);
  const totalCost = walk.total + walk.fee;
  if(totalCost > freeCash(p)){ logEvent(`${p.name} doesn't have enough free cash to buy ${qty} ${tickerLabel(id)}.`); render(); return; }
  pushUndoSnapshot();
  p.cash -= totalCost;
  addCostBasis(p, id, totalCost);
  if(id==='SP'){ p.spShares += qty; } else if(id==='SPX'){ p.spxShares += qty; } else { p.shares[id] += qty; }
  const obj = objFor(id);
  const priorIdx = obj.idx;
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  if(id==='SPX') mirrorOntoMiniSP8(walk.finalIdx - priorIdx); // SP8 and Mini SP8 always move together
  state.turnUsage.total += qty;
  state.turnUsage.perStock[id] = (state.turnUsage.perStock[id]||0) + qty;
  if(offerEligible){
    if(!offer.usedStocks.includes(id)) offer.usedStocks.push(id);
  } else if(id!=='SP') {
    state.turnFills.up[id] = priorFilled + qty;
  }
  checkInsiderActedOn(state.current, id);
  if(id!=='SP' && id!=='SPX') trackPortfolioManagerOpen(p, id, 'long', qty, totalCost/qty);
  const feeNote = walk.fee>0 ? ` (incl. $${walk.fee} fee)` : (id==='SP' ? ' (no price impact)' : offerEligible ? ' (Public Offering — no fee, no price impact)' : '');
  logEvent(`${p.name} bought ${qty} ${tickerLabel(id)} for $${totalCost}${feeNote} — now $${obj.track[obj.idx]}.`);
  if(state.current===myPlayerIndex) playSfx('buy');
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'up', qty); schedulePersist(); render();
}

function sellShares(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  const p = state.players[state.current];
  const held = id==='SP' ? p.spShares : id==='SPX' ? p.spxShares : p.shares[id];
  const qty = Math.min(qtyRequested||0, held);
  if(qty<=0){ render(); return; }
  const priorFilled = state.turnFills.down[id]||0;
  const walk = id==='SP'
    ? { total: priceOf(id)*qty, fee: 0, finalIdx: objFor(id).idx } // Mini SP8 never has its own price impact
    : walkOrderDetailed(id, qty, -1, priorFilled);
  const proceeds = walk.total - walk.fee;
  pushUndoSnapshot();
  p.cash += proceeds;
  reduceCostBasisOnSell(p, id, qty);
  if(id==='SP'){ p.spShares -= qty; } else if(id==='SPX'){ p.spxShares -= qty; } else { p.shares[id] -= qty; }
  const obj = objFor(id);
  const priorIdx = obj.idx;
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  if(id==='SPX') mirrorOntoMiniSP8(walk.finalIdx - priorIdx); // SP8 and Mini SP8 always move together
  if(id!=='SP') state.turnFills.down[id] = priorFilled + qty;
  checkInsiderActedOn(state.current, id);
  if(id!=='SP' && id!=='SPX') trackPortfolioManagerClose(p, id, 'long', qty, proceeds/qty);
  const feeNote = walk.fee>0 ? ` (after $${walk.fee} fee)` : (id==='SP' ? ' (no price impact)' : '');
  logEvent(`${p.name} sold ${qty} ${tickerLabel(id)} for $${proceeds}${feeNote} — now $${obj.track[obj.idx]}.`);
  if(state.current===myPlayerIndex) playSfx('sell');
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'down', qty); schedulePersist(); render();
}

function openShort(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || id==='SP' || id==='SPX' || state.gameOver) return; // neither index fund can be shorted
  if(state.stocks[id].worthless) return;
  const p = state.players[state.current];
  if((p.bannedStocks||[]).includes(id)){ logEvent(`${p.name} is permanently barred from trading ${id} after being caught insider trading.`); render(); return; }
  const qty = Math.min(qtyRequested||0, capRemaining(), capRemainingForStock(id));
  if(qty<=0){ logEvent(`No cap left this turn to short ${id}.`); render(); return; }
  const requiredMargin = qty*price(id);
  if(requiredMargin > freeCash(p)){ logEvent(`${p.name} doesn't have enough free cash to short ${qty} ${id}.`); render(); return; }
  const priorFilled = state.turnFills.down[id]||0;
  const walk = walkOrderDetailed(id, qty, -1, priorFilled); // shorting is sell pressure — walks down
  const proceeds = walk.total - walk.fee;
  pushUndoSnapshot();
  p.cash += proceeds;
  addShortBasis(p, id, proceeds);
  p.shorts[id] = (p.shorts[id]||0) + qty;
  const obj = state.stocks[id];
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  state.turnUsage.total += qty;
  state.turnUsage.perStock[id] = (state.turnUsage.perStock[id]||0) + qty;
  state.turnFills.down[id] = priorFilled + qty;
  checkInsiderActedOn(state.current, id);
  trackPortfolioManagerOpen(p, id, 'short', qty, proceeds/qty);
  const feeNote = walk.fee>0 ? ` (after $${walk.fee} fee)` : '';
  logEvent(`${p.name} opened a short on ${qty} ${id} for $${proceeds}${feeNote} — collateral locked, now $${obj.track[obj.idx]}.`, true);
  if(state.current===myPlayerIndex) playSfx('short');
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'down', qty); schedulePersist(); render();
}

function coverShort(id, qtyRequested, force){
  if((!force && !isMyTurn()) || !id || state.gameOver) return;
  const p = state.players[state.current];
  const held = p.shorts[id]||0;
  const qty = Math.min(qtyRequested||0, held);
  if(qty<=0){ render(); return; }
  const priorFilled = state.turnFills.up[id]||0; // covering is buy-pressure — shares the "up" channel with Buy
  const walk = walkOrderDetailed(id, qty, +1, priorFilled);
  const totalCost = walk.total + walk.fee;
  if(totalCost > p.cash){ logEvent(`${p.name} doesn't have enough cash to cover ${qty} ${id}.`); render(); return; }
  pushUndoSnapshot();
  p.cash -= totalCost;
  reduceShortBasisOnCover(p, id, qty);
  p.shorts[id] -= qty;
  const obj = state.stocks[id];
  obj.prevIdx = obj.idx; obj.idx = walk.finalIdx;
  state.turnFills.up[id] = priorFilled + qty;
  checkInsiderActedOn(state.current, id);
  trackPortfolioManagerClose(p, id, 'short', qty, totalCost/qty);
  const feeNote = walk.fee>0 ? ` (incl. $${walk.fee} fee)` : '';
  logEvent(`${p.name} covered ${qty} ${id} for $${totalCost}${feeNote} — now $${obj.track[obj.idx]}.`);
  if(state.current===myPlayerIndex) playSfx('cover');
  checkMarginCalls(); checkGameOver(); recordTradeMarker(id, p.color, 'up', qty); schedulePersist(); render();
}

function endTurn(){
  const leaving = state.players[state.current];
  if(leaving.jailTurnsLeft > 0){
    leaving.jailTurnsLeft -= 1;
    if(leaving.jailTurnsLeft===0) logEvent(`${leaving.name} is released from jail.`, true);
  }
  leaving.publicOffering = null; // this-turn-only perk — clear it as the turn ends
  recordNetWorthHistory();
  const wasLastPlayer = state.current === state.players.length-1;
  let next = state.current;
  do { next = (next+1)%state.players.length; } while(state.players[next].eliminated && next!==state.current);
  state.current = next;
  if(next===myPlayerIndex) playSfx('turn');
  state.turnStartedAt = Date.now();
  state.phase = 'draw';
  state.turnStage = 'start';
  state.tradeSelection = null;
  state.turnUsage = { total: 0, perStock: {} };
  state.turnFills = { up: {}, down: {} };
  state.turnUndoStack = [];
  state.cardsDrawnThisTurn = 0;
  if(wasLastPlayer){ paySP8Dividend(); tickRoundBoundaryEffects(); }
  persist(); render();
}

/* Both index funds pay a 4% dividend on holdings at the end of every
   round (once every player has taken a turn) — a steady reward for
   parking cash in the "safe" indexes instead of chasing individual
   stocks. Same rate for both — SP8 just moves more dollars per share. */
function paySP8Dividend(){
  state.players.forEach(pl=>{
    if(pl.spShares>0){
      const pay = Math.round(pl.spShares*spPrice()*0.04);
      pl.cash += pay;
      logEvent(`${pl.name} collected a $${pay} Mini SP8 dividend (4% of holding value).`, true);
      if(state.players.indexOf(pl)===myPlayerIndex) playSfx('dividend');
    }
    if(pl.spxShares>0){
      const pay = Math.round(pl.spxShares*spxPrice()*0.04);
      pl.cash += pay;
      logEvent(`${pl.name} collected a $${pay} SP8 dividend (4% of holding value).`, true);
      if(state.players.indexOf(pl)===myPlayerIndex) playSfx('dividend');
    }
  });
}

/* The trade-phase button means different things depending on where you are
   in the turn: after the opening draw, it kicks off the mandatory closing
   draw (you still land back in trade to react to it). After THAT draw has
   already been seen and resolved, the same button actually ends the turn. */
function requestEndTurn(){
  if(!isMyTurn()) return;
  if(!state.gameOver && capRemaining()>0){
    state.confirmEndTurn = true;
    render();
  } else {
    proceedPastTrade();
  }
}

function proceedPastTrade(){
  state.confirmEndTurn = false;
  if(state.turnStage==='start'){
    beginClosingDraw();
  } else {
    endTurn();
  }
}

function beginClosingDraw(){
  state.turnStage = 'end';
  state.phase = 'draw';
  state.cardsDrawnThisTurn = 0;
  persist(); render();
}

/* ============================= BOT (1-PLAYER MODE) ============================= */
/* A bot seat is just a regular player with `bot:true`. Whenever it becomes
   the bot's turn, the human's own browser (the only one connected in a
   1-player game) drives it — drawing cards, making reasonably sensible
   choices, trading a bit, and ending its turn — using the same underlying
   functions a human's clicks would call, just invoked directly instead of
   through the UI. Runs as a short chain of setTimeout steps so it visibly
   plays out as a turn rather than jumping to the result instantly. */
const BOT_STEP_DELAY = 450;
let botTurnRunning = false;
let botStepRetryCount = 0; // consecutive local failures within the current bot turn
let lastBotProgressAt = 0; // wall-clock time of the last runBotStep invocation, for the stall watchdog below
let myBotLockTurn = null; // turnStartedAt this browser currently owns the bot-turn lock for — lets it retry locally without re-racing the claim
const BOT_LOCK_STALE_MS = 10000; // a lock whose heartbeat is older than this is assumed dead and can be stolen by another browser
const BOT_WATCHDOG_STALL_MS = 8000; // if "running" but no progress for this long, the setTimeout chain itself has stalled (e.g. a throttled background tab)
const BOT_MAX_RETRIES = 5; // after this many consecutive in-turn errors, stop retrying and just force the turn to end

/* -1..1 — how far a stock sits from its own track's center, negative means
   cheap relative to its own range, positive means rich. Comparable across
   stocks even though they now have very different dollar centers. */
function botRelativeIdx(id){
  const s = state.stocks[id];
  const center = (s.track.length-1)/2;
  return center>0 ? (s.idx-center)/center : 0;
}
function botCheapestStock(){
  let best=null, bestScore=Infinity;
  STOCK_IDS.forEach(id=>{
    if(state.stocks[id].worthless) return;
    const score = botRelativeIdx(id);
    if(score<bestScore){ bestScore=score; best=id; }
  });
  return best;
}
function botLargestHolding(bot){
  let best=null, bestQty=0;
  STOCK_IDS.forEach(id=>{
    if((bot.shares[id]||0)>bestQty){ bestQty=bot.shares[id]; best=id; }
  });
  return best;
}
/* Mirrors botLargestHolding but for open shorts — used so choice cards like
   "Move Any Stock" can push a shorted stock DOWN instead of only ever
   thinking in terms of long positions. */
function botLargestShortHolding(bot){
  let best=null, bestQty=0;
  STOCK_IDS.forEach(id=>{
    if((bot.shorts[id]||0)>bestQty){ bestQty=bot.shorts[id]; best=id; }
  });
  return best;
}
/* Fraction of the bot's own net worth currently tied up in one stock's long
   position — the diversification guard rail below refuses to pile on more
   of a stock past this, forcing the bot to spread risk across several
   positions instead of dumping everything into whatever looks cheapest. */
function botPositionWeight(bot, id){
  const nw = netWorth(bot);
  if(!nw || nw<=0) return 0;
  return ((bot.shares[id]||0)*price(id)) / nw;
}
const BOT_MAX_POSITION_WEIGHT = 0.35; // don't let one stock exceed ~35% of net worth via fresh buys
/* Same idea as botCheapestStock but skips anything the bot is already
   overweight in (or already shorting — betting both ways on the same stock
   at once just cancels itself out while still paying fees on both legs),
   so a smarter bot actually diversifies instead of dumping its whole stack
   into a single cheap stock turn after turn. Falls back to the plain
   cheapest stock if literally everything is disqualified — still needs to
   do SOMETHING rather than freeze up. */
function botCheapestStockDiversified(bot){
  let best=null, bestScore=Infinity;
  STOCK_IDS.forEach(id=>{
    if(state.stocks[id].worthless) return;
    if((bot.shorts[id]||0)>0) return; // already shorting it — don't also go long
    if(botPositionWeight(bot,id) > BOT_MAX_POSITION_WEIGHT) return;
    const score = botRelativeIdx(id);
    if(score<bestScore){ bestScore=score; best=id; }
  });
  return best || botCheapestStock();
}
/* How much a smart bot should trust an Insider Info tip it drew itself,
   based on the tier it came from — roughly tracking each tier's real/fake
   ratio in INSIDER_TIERS (C-Suite is always real, Napkin is mostly made
   up). A bot can't see whether ITS OWN tip is the fake one any more than a
   human can — same hidden information, just a learned prior on the source. */
function botTierActionChance(tier){
  switch(tier){
    case 'csuite': return 1.0;
    case 'expert': return 0.85;
    case 'friend': return 0.65;
    case 'napkin': return 0.35;
    default: return 0.6;
  }
}
/* Checks the bot's own active Insider Info predictions and, if confident
   enough in the source, trades toward the predicted price right now —
   buying if it's predicted to rise, shorting if it's predicted to fall.
   This is exactly the "insider trading" a human player can do with their
   own tips, including the same real risk of getting caught later via
   checkInsiderTradingRisk/checkInsiderActedOn — a bot that acts on a tip
   is just as exposed as a human would be. */
function botActOnOwnTips(bot){
  const tips = (state.scheduled||[]).filter(item=>
    item.ownerIndex===state.current && item.kind==='sched_price' &&
    item.stock && !state.stocks[item.stock].worthless
  );
  for(const tip of tips){
    if(Math.random() > botTierActionChance(tip.tier)) continue; // not confident enough in this source to act
    const cur = price(tip.stock);
    if(tip.snappedPrice > cur*1.05 && (bot.shorts[tip.stock]||0)<=0 && capRemaining()>0 && capRemainingForStock(tip.stock)>0){
      const qty = Math.min(2, capRemaining(), capRemainingForStock(tip.stock));
      const buffer = freeCash(bot)*0.2;
      const priorFilled = state.turnFills.up[tip.stock]||0;
      const walk = walkOrderDetailed(tip.stock, qty, +1, priorFilled);
      if(qty>0 && (walk.total+walk.fee) <= (freeCash(bot)-buffer)){
        buyShares(tip.stock, qty, true);
        return true;
      }
    } else if(tip.snappedPrice < cur*0.95 && bot.shares[tip.stock]<=0 && capRemaining()>0 && capRemainingForStock(tip.stock)>0){
      const qty = Math.min(2, capRemaining(), capRemainingForStock(tip.stock));
      const buffer = freeCash(bot)*0.25;
      if(qty>0 && price(tip.stock)*qty <= (freeCash(bot)-buffer)){
        openShort(tip.stock, qty, true);
        return true;
      }
    }
  }
  return false;
}

/* Sells down the bot's biggest long holding, repeatedly, until its cash is
   back to $0+ — the same forced-liquidation a human faces after a margin
   call, just handled automatically. */
function botFixNegativeCash(){
  const bot = state.players[state.current];
  let guard = 0;
  while(bot.cash<0 && guard<20){
    guard++;
    const held = botLargestHolding(bot);
    if(!held) break; // nothing left to sell
    sellShares(held, bot.shares[held], true);
  }
  return bot.cash>=0;
}

/* Makes a sensible pick for whatever choice card is up, then resolves it —
   mirrors what a human would do via renderChoiceUI, just decided for them. */
function botResolveChoice(){
  const card = state.pendingCard;
  const bot = state.players[state.current];
  let choice = null;
  switch(card.type){
    case 'sched_swing':
      choice = { stock: botCheapestStock() || STOCK_IDS[0], dir: 1 };
      break;
    case 'split': {
      const held = botLargestHolding(bot);
      if(!held){ finishCardResolution(); return; } // owns nothing — same as the human "no effect" path
      choice = { stock: held };
      break;
    }
    case 'choose_stock_move': {
      // Push whichever position is bigger in dollar terms — a long stock UP,
      // or a shorted stock DOWN — instead of only ever thinking in terms of
      // longs and blindly moving things up.
      const longHeld = botLargestHolding(bot);
      const shortHeld = botLargestShortHolding(bot);
      const longVal = longHeld ? bot.shares[longHeld]*price(longHeld) : 0;
      const shortVal = shortHeld ? (bot.shorts[shortHeld]||0)*price(shortHeld) : 0;
      let stock, dir;
      if(shortHeld && shortVal>longVal){ stock = shortHeld; dir = -1; }
      else if(longHeld){ stock = longHeld; dir = 1; }
      else { stock = botCheapestStock() || STOCK_IDS[0]; dir = 1; }
      choice = { stock, dir };
      break;
    }
    case 'choose_sector_move': {
      const held = botLargestHolding(bot);
      const sectorKeys = Object.keys(SECTORS);
      const sector = held ? STOCKS[held].sector : sectorKeys[Math.floor(Math.random()*sectorKeys.length)];
      choice = { sector, dir: 1 };
      break;
    }
    case 'whale': {
      const cheap = botCheapestStock();
      const qty = 2;
      if(cheap && price(cheap)*qty <= freeCash(bot)){ choice = { stock:cheap, side:'buy', qty }; }
      else { choice = { side:'hold' }; }
      break;
    }
    case 'dividend_leach': {
      let target = null, bestNW = -Infinity;
      state.players.forEach((pl,i)=>{
        if(i===state.current || pl.eliminated) return;
        const nw = netWorth(pl);
        if(nw>bestNW){ bestNW = nw; target = i; }
      });
      if(target===null){ finishCardResolution(); return; }
      choice = { victimIndex: target };
      break;
    }
    case 'insider_blocker': {
      const held = botLargestHolding(bot);
      choice = { stock: held || botCheapestStock() || STOCK_IDS[0] };
      break;
    }
    case 'hunter': {
      // Go after whichever opponent is doing best (net worth) — their Golden
      // Goose is the one most worth killing. Never targets its own.
      const targets = huntableGeese();
      if(targets.length===0){ finishCardResolution(); return; }
      let best = targets[0], bestNW = -Infinity;
      targets.forEach(t=>{
        const nw = netWorth(state.players[t.targetIndex]);
        if(nw>bestNW){ bestNW = nw; best = t; }
      });
      choice = best;
      break;
    }
    case 'espionage': {
      // Scout whoever's currently ahead — that's the intel actually worth
      // having when deciding how aggressively to play the rest of the game.
      let target = null, bestNW = -Infinity;
      state.players.forEach((pl,i)=>{
        if(i===state.current || pl.eliminated) return;
        const nw = netWorth(pl);
        if(nw>bestNW){ bestNW = nw; target = i; }
      });
      if(target===null){ finishCardResolution(); return; }
      choice = { targetIndex: target };
      break;
    }
    default:
      finishCardResolution();
      return;
  }
  const ok = resolveChoice(card, choice);
  finishCardResolution(); // resolveChoice's picks above are always valid, so this always fires next
  void ok;
}

/* Decides whether a freshly-drawn holdable card is worth sitting on for a
   better moment rather than resolving it immediately — the same judgment
   call a sharp human makes at the Play Now/Hold prompt. Only the choice
   cards with a clear timing angle are ever worth holding; the plain
   dictated movement cards (Move a Stock/Sector, Revert) have no real
   "better later" — they do the same thing whenever played — so those
   always just get played immediately, same as before. */
function botShouldHoldCard(bot, card){
  if(card.type==='hunter') return huntableGeese().length===0; // nothing to kill yet — worth waiting for a target
  if(card.type==='dividend_leach' && card.holdable){
    let leaderNW = -Infinity;
    state.players.forEach(pl=>{ if(!pl.eliminated){ const nw=netWorth(pl); if(nw>leaderNW) leaderNW=nw; } });
    return !(leaderNW > netWorth(bot)*1.15); // no clear leader worth leaching yet
  }
  if(card.type==='choose_stock_move' || card.type==='choose_sector_move'){
    // Worth holding onto if the bot doesn't yet have a position sizable
    // enough to actually benefit from nudging a price right now.
    return !botLargestHolding(bot) && !botLargestShortHolding(bot);
  }
  return false; // insider_blocker etc. — no clear timing edge, just play it
}

/* Looks for a good moment to play whatever the bot is currently holding —
   called once per trade-phase step, before the normal buy/sell decisions,
   since playing a held card doesn't cost a buy/short action. Mirrors
   exactly the conditions botShouldHoldCard waited for. */
function botTryPlayHeldCard(){
  const bot = state.players[state.current];
  if(!bot.hand || !bot.hand.length) return false;
  for(let i=0;i<bot.hand.length;i++){
    const card = bot.hand[i];
    if(card.type==='hunter' && huntableGeese().length>0){ playCardFromHand(i, true); return true; }
    if(card.type==='dividend_leach' && card.holdable){
      let leaderNW = -Infinity;
      state.players.forEach(pl=>{ if(!pl.eliminated){ const nw=netWorth(pl); if(nw>leaderNW) leaderNW=nw; } });
      if(leaderNW > netWorth(bot)*1.15){ playCardFromHand(i, true); return true; }
    }
    if((card.type==='choose_stock_move' || card.type==='choose_sector_move') && (botLargestHolding(bot) || botLargestShortHolding(bot))){
      playCardFromHand(i, true); return true;
    }
  }
  return false;
}

/* One trading decision per call, checked in priority order: act on the
   bot's own Insider Info if it's confident enough in the source, shore up
   margin safety before it becomes an actual margin call, cover a short
   that's paid off, sell a long holding that's gotten rich, open a new
   short on something overextended, or buy into something that looks cheap
   and isn't already overweight in the portfolio — keeping a cash buffer in
   reserve throughout. Returns false once nothing more looks worth doing,
   which is the bot's signal to end its turn. */
function botTakeOneTradeAction(){
  const bot = state.players[state.current];

  // 1. Trade on the bot's own Insider Info while it's still live — the
  // single highest-conviction move available when it applies.
  if(botActOnOwnTips(bot)) return true;

  // 2. Proactive margin safety: if free cash has gotten dangerously thin
  // relative to net worth, cover the worst short now rather than waiting
  // for an actual forced margin call next turn.
  if(netWorth(bot)>0 && freeCash(bot) < netWorth(bot)*0.08){
    let worst=null, worstLiab=-1;
    STOCK_IDS.forEach(id=>{
      const liab = (bot.shorts[id]||0)*price(id);
      if(liab>worstLiab){ worstLiab=liab; worst=id; }
    });
    if(worst && bot.shorts[worst]>0){ coverShort(worst, Math.min(2, bot.shorts[worst]), true); return true; }
  }

  // 3. Cover a short that's swung back down — lock in the profit.
  const coverable = STOCK_IDS.find(id=> (bot.shorts[id]||0)>0 && botRelativeIdx(id) < -0.3 );
  if(coverable){ coverShort(coverable, Math.min(2, bot.shorts[coverable]), true); return true; }

  // 4. Sell a long holding that's gotten rich.
  const richHeld = STOCK_IDS.find(id=> bot.shares[id]>0 && botRelativeIdx(id) > 0.5 );
  if(richHeld){ sellShares(richHeld, Math.min(2, bot.shares[richHeld]), true); return true; }

  // 5. Open a short on something clearly overextended, as long as it isn't
  // also a stock the bot is long in (no point betting both ways at once).
  if(capRemaining()>0){
    const rich = STOCK_IDS.find(id=> !state.stocks[id].worthless && bot.shares[id]<=0 && botRelativeIdx(id) > 0.6 );
    if(rich && capRemainingForStock(rich)>0){
      const qty = Math.min(2, capRemaining(), capRemainingForStock(rich));
      const buffer = freeCash(bot)*0.25;
      if(qty>0 && price(rich)*qty <= (freeCash(bot)-buffer)){
        openShort(rich, qty, true);
        return true;
      }
    }
  }

  // 6. Buy a stock that looks cheap and isn't already overweight in the
  // portfolio — the diversification guard rail is what actually makes this
  // "smarter" instead of just dumping every dollar into one ticker.
  if(capRemaining()>0){
    const cheap = botCheapestStockDiversified(bot);
    if(cheap && capRemainingForStock(cheap)>0 && botRelativeIdx(cheap) < 0.15){
      const buffer = freeCash(bot)*0.25; // keep ~25% of free cash in reserve
      const qty = Math.min(2, capRemaining(), capRemainingForStock(cheap));
      if(qty>0){
        const priorFilled = state.turnFills.up[cheap]||0;
        const walk = walkOrderDetailed(cheap, qty, +1, priorFilled);
        if((walk.total+walk.fee) <= (freeCash(bot)-buffer)){
          buyShares(cheap, qty, true);
          return true;
        }
      }
    }
  }
  return false;
}

/* Any connected human's browser could be the one to drive a bot's turn —
   in real multiplayer, several might be open at once. Firebase's
   transaction API gives the same "only one wins" guarantee we already use
   for turn-timeout enforcement: everyone who notices it's a bot's turn
   races to move the lock from the previous turn's timestamp to the
   current one, but only the first to reach the server actually succeeds.
   The lock now carries a heartbeat too — if whoever won it goes silent
   (crashed tab, closed laptop, thrown exception with nobody left to retry),
   its claim goes stale and another connected browser can take over instead
   of the bot's turn being stuck forever because a lock nobody's honoring
   still technically says "claimed". */
async function claimBotTurnLock(turnStartedAt){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(botLockRef(), (current)=>{
      const now = Date.now();
      if(current && current.turnStartedAt===turnStartedAt && (now-(current.heartbeatAt||0))<BOT_LOCK_STALE_MS){
        return; // someone else is actively driving this exact turn — abort
      }
      return { turnStartedAt, heartbeatAt: now };
    });
    if(result.committed) myBotLockTurn = turnStartedAt;
    return result.committed;
  }catch(e){
    console.error('UpTrend: bot turn lock claim failed', e);
    return false;
  }
}

/* Best-effort heartbeat so other browsers know this bot step chain is still
   alive and don't mistake an in-progress turn for a stale/abandoned one.
   Fire-and-forget — a missed heartbeat only matters if this browser really
   has stalled, in which case letting someone else steal the lock is exactly
   what should happen. */
function renewBotTurnLock(turnStartedAt){
  if(!roomCode) return;
  update(rootRef, { [`${gamePath()}/botTurnLock`]: { turnStartedAt, heartbeatAt: Date.now() } }).catch(()=>{});
}

/* Kicks off the bot's turn if it isn't already running. Safe to call from
   render() on every re-render — the running flag makes it a no-op once a
   chain of steps is already in flight, and the lock claim above makes it
   safe even when multiple human browsers call this for the same bot turn
   at roughly the same time. If THIS browser already owns the lock for the
   current turn (e.g. it's retrying locally after runBotStep threw), it
   skips re-claiming — the transaction would otherwise see its own still-
   fresh heartbeat and wrongly abort, permanently stalling the retry. */
async function maybeStartBotTurn(){
  if(botTurnRunning || !state || state.gameOver || state.phase==='lobby') return;
  const cur = state.players[state.current];
  if(!cur || !cur.bot) return;
  botTurnRunning = true; // set immediately so this browser doesn't re-enter while its own claim is in flight
  lastBotProgressAt = Date.now();
  if(myBotLockTurn !== state.turnStartedAt){
    const won = await claimBotTurnLock(state.turnStartedAt);
    if(!won){ botTurnRunning = false; return; } // another connected browser is already handling this bot's turn
  }
  setTimeout(runBotStep, BOT_STEP_DELAY);
}

/* Every step is wrapped in try/catch: an uncaught exception here used to
   leave `botTurnRunning` stuck true forever (nothing else ever resets it),
   which silently froze the bot's turn with no recovery — exactly the bug
   this was written to fix. Now a failure logs, releases the flag, and
   retries the whole turn from scratch a few times before giving up and
   forcing the turn to end outright, so the game can never hang here
   indefinitely no matter what goes wrong mid-step. */
function runBotStep(){
  lastBotProgressAt = Date.now();
  if(!state || state.gameOver){ botTurnRunning = false; return; }
  const cur = state.players[state.current];
  if(!cur || !cur.bot){ botTurnRunning = false; myBotLockTurn = null; return; } // turn already moved on to a human
  try{
    renewBotTurnLock(state.turnStartedAt);
    if(cur.eliminated){ endTurn(); botTurnRunning = false; myBotLockTurn = null; botStepRetryCount = 0; return; }
    if(cur.jailTurnsLeft>0){ endTurn(); botTurnRunning = false; myBotLockTurn = null; botStepRetryCount = 0; return; }
    if(cur.cash<0){
      const fixed = botFixNegativeCash();
      if(!fixed){
        // Genuinely nothing left to sell — a real margin call from price
        // movement left cash negative with no long holdings to recover with.
        // Rather than end the turn and hit this exact same wall again next
        // time it's the bot's turn (forever), reset it as a bankruptcy so
        // the game keeps moving for everyone.
        resetBankruptPlayer(cur);
        setTimeout(runBotStep, BOT_STEP_DELAY);
        return;
      }
      setTimeout(runBotStep, BOT_STEP_DELAY);
      return;
    }
    if(state.awaitingHoldDecision){
      // Smarter than always playing immediately: sometimes the right move
      // is to sit on a card until it's actually useful (see
      // botShouldHoldCard) — exactly the judgment call a sharp human makes
      // at this same prompt.
      if(state.pendingCard.holdable && cur.hand.length<HAND_LIMIT && botShouldHoldCard(cur, state.pendingCard)){
        holdCurrentCard(true);
      } else {
        playCardNowFromDraw(true);
      }
      setTimeout(runBotStep, BOT_STEP_DELAY); return;
    }
    if(isTurnProtectedFromTimeout()){ botResolveChoice(); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
    if(state.phase==='draw'){ drawCard(true); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
    if(state.phase==='resolve'){ finishCardResolution(); setTimeout(runBotStep, BOT_STEP_DELAY); return; }
    if(state.phase==='trade'){
      if(botTryPlayHeldCard()){ setTimeout(runBotStep, 300); return; }
      if(botTakeOneTradeAction()){ setTimeout(runBotStep, 300); return; }
      proceedPastTrade();
      setTimeout(runBotStep, BOT_STEP_DELAY);
      return;
    }
    botTurnRunning = false; myBotLockTurn = null; botStepRetryCount = 0;
  }catch(e){
    console.error('UpTrend: bot step failed', e);
    botTurnRunning = false; // release so a retry (or the watchdog) can re-enter
    botStepRetryCount++;
    if(botStepRetryCount > BOT_MAX_RETRIES){
      console.error('UpTrend: bot turn failed repeatedly — forcing it to end so the game can continue');
      botStepRetryCount = 0; myBotLockTurn = null;
      try{ endTurn(); }catch(e2){ console.error('UpTrend: forced endTurn also failed', e2); }
      persist(); render();
      return;
    }
    setTimeout(maybeStartBotTurn, BOT_STEP_DELAY);
  }
}

/* Extra safety net for the step chain itself: even with the retry logic
   above, a scheduled setTimeout can simply never fire — most commonly a
   browser throttling/suspending timers in a backgrounded or minimized tab
   — without ever throwing an error to catch. If it's still supposed to be
   the bot's turn but nothing has happened in a while, treat the chain as
   stuck and restart it rather than leaving `botTurnRunning` stuck true. */
setInterval(()=>{
  if(!botTurnRunning || !state || state.gameOver || state.phase==='lobby') return;
  const cur = state.players[state.current];
  if(!cur || !cur.bot) return;
  if(Date.now()-lastBotProgressAt > BOT_WATCHDOG_STALL_MS){
    console.warn('UpTrend: bot step chain looked stuck — restarting it');
    botTurnRunning = false;
    maybeStartBotTurn();
  }
}, 3000);

/* Backgrounded/minimized tabs are exactly where the setTimeout chain above
   is most likely to stall — the moment the tab is visible again, force an
   immediate resync and give the bot chain a nudge instead of waiting for
   the slower watchdog or the 2-minute turn timeout to notice. */
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible'){
    forceSyncNow();
    maybeStartBotTurn();
  }
});

/* Sets up a fresh 1-player-vs-bot game directly, skipping the lobby
   entirely (there's nothing to wait on — only one human seat exists). */
const GAME_LENGTH_OPTIONS = {
  net250:  { mode:'networth', target:250000,     label:'$250,000' },
  net500:  { mode:'networth', target:500000,     label:'$500,000' },
  net1m:   { mode:'networth', target:1000000,    label:'$1,000,000' },
  net10m:  { mode:'networth', target:10000000,   label:'$10,000,000' },
  net100m: { mode:'networth', target:100000000,  label:'$100,000,000' },
  timer30: { mode:'timer', minutes:30, label:'30 Min Timer' },
};

/* ============================= SPEEDRUN (SOLO VS BOTS) ============================= */
/* Any game with exactly one non-bot player is treated as a speedrun — the
   whole point of playing a lobby of bots solo is racing the clock against
   your own past times, so the stopwatch and best-time tracking apply
   automatically rather than needing a separate mode toggle. */
function isSoloVsBots(){
  return !!(state && state.players && state.players.length>1 && state.players.filter(p=>!p.bot).length===1);
}
function speedrunElapsedMs(){
  if(!state || !state.createdAt) return 0;
  const end = (state.gameOver && state.gameOverAt) ? state.gameOverAt : Date.now();
  return Math.max(0, end - state.createdAt);
}
function formatElapsed(ms){
  const totalSec = Math.floor(ms/1000);
  const h = Math.floor(totalSec/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  const mm = h>0 ? String(m).padStart(2,'0') : String(m);
  const ss = String(s).padStart(2,'0');
  return h>0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}
/* Best times are purely local (localStorage, not synced) — they're a
   personal record for THIS browser, keyed by game length + bot count so a
   $500k/2-bot time never gets compared against a $10M/3-bot time. */
function speedrunLocalKey(){
  const glKey = state.gameLengthKey || (state.winCondition && state.winCondition.mode==='timer' ? 'timer' : 'custom');
  const botCount = state.players.filter(p=>p.bot).length;
  return `uptrend_besttime_${glKey}_${botCount}bots`;
}
function loadBestSpeedrunTime(){
  try{ const raw = localStorage.getItem(speedrunLocalKey()); return raw ? parseInt(raw,10) : null; }catch(e){ return null; }
}
function saveBestSpeedrunTimeIfBetter(ms){
  try{
    const prev = loadBestSpeedrunTime();
    if(prev===null || ms<prev){ localStorage.setItem(speedrunLocalKey(), String(ms)); return true; }
    return false;
  }catch(e){ return false; }
}
let lastSpeedrunRecordedAt = null; // state.gameOverAt of the last game-over event we already recorded a time for
let speedrunWasNewBest = false;
function maybeRecordSpeedrunResult(){
  if(!state || !state.gameOver || !state.gameOverAt || !isSoloVsBots()) return;
  if(lastSpeedrunRecordedAt === state.gameOverAt) return; // already handled this exact game-over
  lastSpeedrunRecordedAt = state.gameOverAt;
  speedrunWasNewBest = saveBestSpeedrunTimeIfBetter(state.gameOverAt - state.createdAt);
