function priceDeltaBadge(cur, prev){
  if(cur===prev) return `<span class="price-delta flat">—</span>`;
  return cur>prev ? `<span class="price-delta up">▲ up</span>` : `<span class="price-delta down">▼ down</span>`;
}

function renderTrack(track, curIdx, prevIdx, colorVar, id){
  const zone = id ? DIVIDEND_ZONES[id] : null;
  const zoneStartIdx = zone ? track.length - zone.dots : -1;
  let html = `<div class="track">`;
  const centerIdx = (track.length-1)/2;
  track.forEach((pr,i)=>{
    const filled = i===curIdx;
    const edge = i===0 || i===track.length-1;
    const isCenter = i===centerIdx;
    const inZone = zone && i>=zoneStartIdx;
    const zoneClasses = inZone ? ` div-zone${i===zoneStartIdx?' div-zone-start':''}${i===track.length-1?' div-zone-end':''}` : '';
    const dotRateLabel = inZone ? `${(zone.rates[i-zoneStartIdx]*100).toFixed(1).replace(/\.0$/,'')}%` : '';
    html += `<div class="dot-wrap ${filled?'active':''} ${edge?'edge':''} ${isCenter?'center':''}${zoneClasses}">
      ${inZone?`<div class="div-zone-rate">${dotRateLabel}</div>`:''}
      <div class="dot ${filled?'filled':''}" style="${filled?`background:${colorVar};color:${colorVar};`:''}"></div>
      <div class="dot-price">${pr}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

/* Small inline line chart of a stock's price history, scaled to its fixed
   track range (not just the visible history's min/max) so a stock sitting
   near its floor/ceiling visibly reads as such at a glance. */
/* Shared volume-bar builder for both chart sizes. Buys/covers (side:'up')
   stack as bars growing up from the bottom of the plot area; sells/shorts
   (side:'down') stack as bars growing down from the top. Bar height scales
   with quantity, normalized against the single biggest stack anywhere on
   this chart so one huge trade doesn't blow out the whole scale. Bars are
   colored per player and stack in trade order. Returns SVG <rect> markup,
   meant to be drawn BEHIND the price line. */
function buildVolumeBars(markers, numPoints, stepX, offsetX, topY, plotH, maxBarFrac, minBarWidth, maxBarWidth){
  const upTotals = {}, downTotals = {};
  (markers||[]).forEach(m=>{
    const idx = Math.max(0, Math.min(numPoints-1, m.historyIdx));
    const bucket = m.side==='down' ? downTotals : upTotals;
    bucket[idx] = (bucket[idx]||0) + (m.qty||1);
  });
  const allTotals = [...Object.values(upTotals), ...Object.values(downTotals)];
  const maxTotal = allTotals.length ? Math.max(...allTotals) : 1;
  const maxBarPx = plotH*maxBarFrac;
  const pxPerShare = maxTotal>0 ? maxBarPx/maxTotal : 0;
  const barWidth = Math.max(minBarWidth, Math.min(maxBarWidth, stepX*0.7));

  const upStack = {}, downStack = {};
  return (markers||[]).map(m=>{
    const idx = Math.max(0, Math.min(numPoints-1, m.historyIdx));
    const x = offsetX + idx*stepX - barWidth/2;
    const qty = m.qty||1;
    const segH = Math.max(1.2, qty*pxPerShare);
    let y;
    if(m.side==='down'){
      const prev = downStack[idx]||0;
      y = topY + prev;
      downStack[idx] = prev+segH;
    } else {
      const prev = upStack[idx]||0;
      y = topY + plotH - prev - segH;
      upStack[idx] = prev+segH;
    }
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${segH.toFixed(1)}" fill="${m.color}" opacity="0.62" rx="0.6"/>`;
  }).join('');
}

function renderSparkline(history, top, bottom, color, markers, zoneBottomPrice){
  const W = 56, H = 84;
  const pts = history.length>=2 ? history : [history[0], history[0]];
  const range = (top-bottom) || 1;
  const stepX = W/(pts.length-1);
  const coords = pts.map((v,i)=>{
    const x = i*stepX;
    const y = H - ((v-bottom)/range)*H;
    return `${x.toFixed(1)},${Math.max(1,Math.min(H-1,y)).toFixed(1)}`;
  }).join(' ');
  const lastX = (pts.length-1)*stepX;
  const lastY = H - ((pts[pts.length-1]-bottom)/range)*H;

  const bars = buildVolumeBars(markers, pts.length, stepX, 0, 0, H, 0.2, 1.4, 2.8);
  let zoneRect = '';
  if(zoneBottomPrice!=null && zoneBottomPrice<top){
    const zoneY = Math.max(0, H - ((zoneBottomPrice-bottom)/range)*H);
    zoneRect = `<rect x="0" y="0" width="${W}" height="${zoneY.toFixed(1)}" fill="var(--up)" opacity="0.10"/>`;
  }

  return `<svg class="sparkline" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${zoneRect}
    ${bars}
    <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastX.toFixed(1)}" cy="${Math.max(1,Math.min(H-1,lastY)).toFixed(1)}" r="2" fill="${color}"/>
  </svg>`;
}

/* The big, click-to-expand version: gridlines, real price labels on the
   y-axis, volume bars, and a legend mapping each bar's color back to a
   player. */
function renderExpandedChart(history, top, bottom, color, markers, zoneBottomPrice){
  const W = 640, H = 340, padL = 54, padR = 16, padT = 16, padB = 16;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const pts = history.length>=2 ? history : [history[0], history[0]];
  const range = (top-bottom) || 1;
  const stepX = plotW/(pts.length-1);
  const yFor = v => padT + plotH - ((v-bottom)/range)*plotH;

  const coords = pts.map((v,i)=> `${(padL+i*stepX).toFixed(1)},${Math.max(padT,Math.min(padT+plotH,yFor(v))).toFixed(1)}`).join(' ');
  const lastX = padL+(pts.length-1)*stepX, lastY = yFor(pts[pts.length-1]);

  // 5 horizontal gridlines with real dollar labels, evenly spaced across the range
  const GRID_LINES = 5;
  let gridSvg = '';
  for(let i=0;i<=GRID_LINES;i++){
    const val = bottom + (range*i/GRID_LINES);
    const y = yFor(val);
    gridSvg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#232A38" stroke-width="1"/>
      <text x="${padL-8}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="11" font-family="IBM Plex Mono" fill="#7C879C">$${Math.round(val)}</text>`;
  }

  const bars = buildVolumeBars(markers, pts.length, stepX, padL, padT, plotH, 0.18, 3, 10);
  let zoneRect = '';
  if(zoneBottomPrice!=null && zoneBottomPrice<top){
    const zoneY = Math.max(padT, yFor(zoneBottomPrice));
    zoneRect = `<rect x="${padL}" y="${padT}" width="${plotW}" height="${(zoneY-padT).toFixed(1)}" fill="var(--up)" opacity="0.08"/>`;
  }

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;">
    ${gridSvg}
    ${zoneRect}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#232A38" stroke-width="1"/>
    ${bars}
    <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastX.toFixed(1)}" cy="${Math.max(padT,Math.min(padT+plotH,lastY)).toFixed(1)}" r="4" fill="${color}"/>
  </svg>`;
}

    ? `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;">${legendPlayers.map(pl=>
        `<span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
          <span style="width:9px;height:9px;border-radius:50%;background:${pl.color};display:inline-block;"></span>${pl.name}
        </span>`).join('')}</div>`
    : '';

  return `<div class="overlay" id="chartOverlay">
    <div class="modal" style="max-width:700px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <h2 style="margin:0;color:${color};">${label}</h2>
        <span class="mono" style="font-size:20px;font-weight:600;">$${cur}</span>
      </div>
      <div class="sub">Full price history${(obj.tradeMarkers||[]).length ? ' — bars from the bottom are buy/cover volume, bars from the top are sell/short volume' : ''}${zone ? ` — shaded band is the dividend zone (rate ranges ${(zone.rates[0]*100).toFixed(1).replace(/\.0$/,'')}%–${(zone.rates[zone.rates.length-1]*100).toFixed(1).replace(/\.0$/,'')}%, highest at the very top)` : ''}</div>
      <div style="margin:14px 0;overflow-x:auto;">${renderExpandedChart(obj.history, top, bottom, color, obj.tradeMarkers, zoneBottomPrice)}</div>
      ${legendHtml}
      <button class="btn full" id="closeChartBtn" style="margin-top:16px;">Close</button>
    </div>
  </div>`;
}

function renderBoard(){
  let html = `<div class="board">`;
  Object.keys(SECTORS).forEach(secKey=>{
    const sec = SECTORS[secKey];
    html += `<div class="sector-panel">
      <div class="sector-head"><span class="sector-dot" style="background:${sec.color}"></span>${sec.label||secKey}</div>`;
    sec.stocks.forEach(id=>{
      const s = state.stocks[id];
      const cur = s.track[s.idx];
      const isSel = state.tradeSelection===id;
      const drip = state.recurringEffects.find(e=>e.stock===id);
      const zone = DIVIDEND_ZONES[id];
      const inZoneNow = inDividendZone(id);
      html += `<div class="stock-row ${isSel?'selected':''} ${s.worthless?'worthless':''}" data-trade-id="${id}">
        <div class="stock-row-inner">
          <div class="stock-chart-col" data-chart-id="${id}">${renderSparkline(s.history, s.track[s.track.length-1], s.track[0], sec.color, s.tradeMarkers, zone ? s.track[s.track.length-zone.dots] : null)}</div>
          <div class="stock-main-col">
            <div class="row-top">
              <span class="ticker" style="color:${sec.color}">${id}</span>
              <span class="price-now ${s.idx!==s.prevIdx?'flash':''}">$${cur}</span>
              ${priceDeltaBadge(s.idx, s.prevIdx)}
              ${s.worthless?'<span class="worthless-badge">Worthless</span>':''}
              ${s.frozen?'<span class="frozen-badge">Frozen</span>':''}
              ${inZoneNow?`<span class="frozen-badge" style="color:var(--up);background:rgba(62,207,142,0.12);">Dividend Zone ${(dividendZoneRateAt(id, s.idx)*100).toFixed(1).replace(/\.0$/,'')}%</span>`:''}
              ${drip?`<span class="frozen-badge" style="color:${drip.dir>0?'var(--up)':'var(--down)'};background:${drip.dir>0?'rgba(62,207,142,0.12)':'rgba(255,92,92,0.12)'};">Earnings ${drip.dir>0?'+':'-'}${drip.bubblesPerTurn}/turn ×${drip.turnsLeft}</span>`:''}
              <span style="margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;">${STOCKS[id].name}</span>
              ${isSel?'<span class="tap-hint">Selected</span>':'<span class="tap-hint">Tap to trade</span>'}
            </div>
            ${renderTrack(s.track, s.idx, s.prevIdx, sec.color, id)}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Index fund panels — Mini SP8 (original) and SP8 (10x price, for when
  // cash has piled up too high for anything else to meaningfully absorb).
  const sp = state.sp;
  const spSel = state.tradeSelection==='SP';
  html += `<div class="sp-panel ${spSel?'selected':''}" data-trade-id="SP" style="margin-top:12px;">
    <div class="sector-head"><span class="sector-dot" style="background:var(--sp)"></span>Mini SP8 Index</div>
    <div class="stock-row-inner">
      <div class="stock-chart-col" data-chart-id="SP">${renderSparkline(sp.history, sp.track[sp.track.length-1], sp.track[0], 'var(--sp)', sp.tradeMarkers)}</div>
      <div class="stock-main-col">
        <div class="row-top" style="margin-bottom:8px;">
          <span class="ticker" style="color:var(--sp)">Mini SP8</span>
          <span class="price-now ${sp.idx!==sp.prevIdx?'flash':''}">$${sp.track[sp.idx]}</span>
          ${priceDeltaBadge(sp.idx, sp.prevIdx)}
          <span style="margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;">Trading it never moves the price — mirrors SP8 exactly, always</span>
          ${spSel?'<span class="tap-hint">Selected</span>':'<span class="tap-hint">Tap to trade</span>'}
        </div>
        ${renderTrack(sp.track, sp.idx, sp.prevIdx, 'var(--sp)')}
      </div>
    </div>
  </div>`;

  const spx = state.spx;
  const spxSel = state.tradeSelection==='SPX';
  html += `<div class="sp-panel ${spxSel?'selected':''}" data-trade-id="SPX" style="margin-top:12px;">
    <div class="sector-head"><span class="sector-dot" style="background:var(--spx)"></span>SP8 Index</div>
    <div class="stock-row-inner">
      <div class="stock-chart-col" data-chart-id="SPX">${renderSparkline(spx.history, spx.track[spx.track.length-1], spx.track[0], 'var(--spx)', spx.tradeMarkers)}</div>
      <div class="stock-main-col">
        <div class="row-top" style="margin-bottom:8px;">
          <span class="ticker" style="color:var(--spx)">SP8</span>
          <span class="price-now ${spx.idx!==spx.prevIdx?'flash':''}">$${spx.track[spx.idx]}</span>
          ${priceDeltaBadge(spx.idx, spx.prevIdx)}
          <span style="margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;">10x Mini SP8's price — trading THIS one moves both, together</span>
          ${spxSel?'<span class="tap-hint">Selected</span>':'<span class="tap-hint">Tap to trade</span>'}
        </div>
        ${renderTrack(spx.track, spx.idx, spx.prevIdx, 'var(--spx)')}
      </div>
    </div>
  </div>`;
  return html;
}

function renderSidebar(){
  const p = state.players[state.current];
  const me = (myPlayerIndex!==null && myPlayerIndex>=0) ? state.players[myPlayerIndex] : null;
  let html = `<div class="sidebar">`;

  // players
  html += `<div class="panel"><h3>Players</h3>`;
  state.players.forEach((pl,i)=>{
    const locked = lockedCash(pl);
    html += `<div class="player-card ${i===state.current?'active':''}" style="border-left-color:${pl.color};${pl.eliminated?'opacity:0.5;':''}">
      <div class="p-top"><span class="p-name" style="color:${pl.color};">${pl.name}${pl.bot?' 🤖':''}${i===state.current?' • turn':''}${pl.eliminated?' <span class="worthless-badge">Eliminated</span>':''}</span><span class="p-cash">$${pl.cash}${locked>0?` <span style="color:var(--muted);font-weight:400;">($${locked} locked)</span>`:''}</span></div>
      <div class="p-net">Net worth: $${netWorth(pl)}</div>
    </div>`;
  });
  html += `</div>`;

  // your own active insider info — private to you, and now always visible
  // on your own screen regardless of whose turn it currently is, since it's
  // YOUR information to track, not tied to when you happen to be acting.
  const myInsider = me ? state.scheduled.filter(item=>item.ownerIndex===myPlayerIndex) : [];
  if(myInsider.length){
    html += `<div class="panel"><h3 style="color:${me.color};">${me.name}'s Insider Info</h3>`;
    myInsider.forEach(item=>{
      html += `<div class="log-entry event" style="margin-bottom:6px;">
        <div>${item.description||'A prediction is pending'}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:2px;">${item.turnsLeft} of your turn${item.turnsLeft===1?'':'s'} left</div>
      </div>`;
    });
    html += `</div>`;
  }

  // action panel
  html += `<div class="panel"><h3>Action</h3>`;
  if(!state.gameOver && !isMyTurn()){
    html += `<div style="font-size:14px;color:var(--muted);">Waiting for <b style="color:${p.color};">${p.name}</b> to play${myPlayerIndex===-1?' (you\'re spectating)':''}...</div>`;
  } else if(state.gameOver){
    html += `<div style="font-size:14px;">Game over — <b style="color:${state.winner.color};">${state.winner.name}</b> wins with $${netWorth(state.winner)} net worth!</div>
      <button class="btn full" style="margin-top:10px;" id="newGameBtn">New Game</button>`;
  } else if(p.eliminated){
    html += `<div class="choice-error" style="margin-bottom:10px;">${p.name} is eliminated — net worth went negative with no way to recover. Their turns are skipped from here on.</div>
      <button class="btn full" id="eliminatedContinueBtn">Continue</button>`;
  } else if(state.phase==='draw' && p.cash<0){
    const sel = state.tradeSelection;
    if(isBankrupt(p)){
      html += `<div class="choice-error" style="margin-bottom:10px;">${p.name}'s cash is negative ($${p.cash}) and there's nothing left to sell that could ever bring it back to $0 — no way to recover on your own.</div>
        <button class="btn full" id="bankruptcyResetBtn">Restart My Portfolio ($${BANKRUPTCY_RESET_CASH.toLocaleString()})</button>
        <div class="hint">This wipes all your positions and gives you a fresh $${BANKRUPTCY_RESET_CASH.toLocaleString()} to start over with — everyone else's game keeps going untouched.</div>`;
    } else {
      html += `<div class="choice-error" style="margin-bottom:10px;">${p.name}'s cash is negative ($${p.cash}) after a margin call. Sell or cover holdings until you're back to $0 or more before you can draw a card.</div>`;
      if(!sel){
        html += `<div class="no-selection">Tap any stock row or either S&amp;P 8 panel on the left to sell or cover it.</div>`;
      } else {
        const isIndexSel = sel==='SP' || sel==='SPX';
        const label = tickerLabel(sel);
        const pr = priceOf(sel);
        const held = sel==='SP' ? p.spShares : sel==='SPX' ? p.spxShares : p.shares[sel];
        const shortHeld = isIndexSel ? 0 : (p.shorts[sel]||0);
        html += `<div class="selected-ticker-box">
          <span class="stx">${label}</span>
          <span class="spx">$${pr} &middot; long ${held}${!isIndexSel?` &middot; short ${shortHeld}`:''}</span>
        </div>
        <div class="btn-row" style="margin-bottom:12px;">
          <button class="btn sell full" id="sellBtn" ${canSellOne(sel)?'':'disabled'}>Sell</button>
          ${!isIndexSel?`<button class="btn cover full" id="coverBtn" ${canCoverOne(sel)?'':'disabled'}>Cover</button>`:''}
        </div>`;
      }
      html += `<button class="btn full" id="drawBtn" disabled>Draw Card (raise cash to $0+ first)</button>`;
    }
  } else if(state.phase==='draw'){
    const drawMsg = state.turnStage==='end'
      ? `${p.name}, draw your closing card to end the turn.`
      : `${p.name}, draw a card to start your turn.`;
    html += `<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">${drawMsg}</div>
      <button class="btn full" id="drawBtn">Draw Card</button>`;
  } else if(state.phase==='resolve' && state.cardMinimized){
    html += `<div style="font-size:13px;color:var(--muted);">Card minimized — check your holdings below, then use the "Resume Card" button to make your choice.</div>`;
  } else if(state.phase==='trade'){
    const sel = state.tradeSelection;
    const tradeIntro = state.turnStage==='end'
      ? `Closing card resolved — react if you need to, then click End Turn.`
      : `Trading phase — tap a ticker on the board, then click Buy, Sell, Short, or Cover. Each click trades 1 share.`;
    html += `<div style="font-size:13px;color:var(--muted);margin-bottom:6px;">${tradeIntro}</div>
      <div class="cap-meter">Shares left this turn: <b>${capRemaining()}/${TURN_CAP}</b> &nbsp;(sells &amp; covers are free)</div>
      <button class="btn secondary full" id="buyInsiderBtn" style="margin:8px 0;" ${p.cash>=INSIDER_INFO_PRICE?'':'disabled'} title="Guaranteed real — never one of the fake tips">Buy Insider Info ($${INSIDER_INFO_PRICE.toLocaleString()})</button>`;
    if(!sel){
      html += `<div class="no-selection">No ticker selected. Tap any stock row or either S&amp;P 8 panel on the left to trade it.</div>`;
    } else {
      const isIndexSel = sel==='SP' || sel==='SPX';
      const label = tickerLabel(sel);
      const pr = priceOf(sel);
      const held = sel==='SP' ? p.spShares : sel==='SPX' ? p.spxShares : p.shares[sel];
      const shortHeld = isIndexSel ? 0 : (p.shorts[sel]||0);
      html += `<div class="selected-ticker-box">
        <span class="stx">${label}</span>
        <span class="spx">$${pr} &middot; long ${held}${!isIndexSel?` &middot; short ${shortHeld}`:''}</span>
      </div>
      ${!isIndexSel?`<div class="cap-meter">${label} cap this turn: <b>${Math.max(0,capRemainingForStock(sel))}/4</b> (buy + short)</div>`:''}
      <div class="btn-row" style="margin-bottom:8px;">
        <button class="btn buy full" id="buyBtn" ${canBuyOne(sel)?'':'disabled'}>Buy</button>
        <button class="btn sell full" id="sellBtn" ${canSellOne(sel)?'':'disabled'}>Sell</button>
      </div>`;
      if(!isIndexSel){
        html += `<div class="btn-row" style="margin-bottom:12px;">
          <button class="btn short full" id="shortBtn" ${canShortOne(sel)?'':'disabled'}>Short</button>
          <button class="btn cover full" id="coverBtn" ${canCoverOne(sel)?'':'disabled'}>Cover</button>
        </div>`;
      }
    }
    if(state.turnUndoStack && state.turnUndoStack.length>0){
      html += `<button class="btn secondary full" id="undoBtn" style="margin-bottom:8px;">Undo Last Trade</button>`;
    }
    html += `<button class="btn full" id="endTurnBtn">${state.turnStage==='start' ? 'Draw Closing Card' : 'End Turn'}</button>`;
  }
  html += `</div>`;

  // your own holdings — always visible on your own screen, independent of
  // whose turn it currently is. Spectators (no seat) get a simple notice
  // instead, since they have no holdings of their own to show.
  if(!me){
    html += `<div class="panel"><h3>Your Holdings</h3><div class="hint" style="margin:0;">You're spectating — no holdings of your own to show.</div></div>`;
  } else {
    const glCell = (gl)=> `<td style="color:${gl>=0?'var(--up)':'var(--down)'};">${gl>=0?'+':'-'}$${Math.abs(Math.round(gl))}</td>`;
    const holdingRows = [];
    STOCK_IDS.forEach(id=>{
      if(me.shares[id]>0){
        const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
        const value = me.shares[id]*price(id);
        const basis = Math.round(me.costBasis[id]||0);
        holdingRows.push({ value, html: `<tr><td>${id} (${sectorLabel})</td><td>${me.shares[id]}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(me,id))}</tr>` });
      }
    });
    if(me.spShares>0){
      const value = me.spShares*spPrice();
      const basis = Math.round(me.spCostBasis||0);
      holdingRows.push({ value, html: `<tr><td>Mini SP8</td><td>${me.spShares}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(me,'SP'))}</tr>` });
    }
    if(me.spxShares>0){
      const value = me.spxShares*spxPrice();
      const basis = Math.round(me.spxCostBasis||0);
      holdingRows.push({ value, html: `<tr><td>SP8</td><td>${me.spxShares}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(me,'SPX'))}</tr>` });
    }
    STOCK_IDS.forEach(id=>{
      if((me.shorts[id]||0)>0){
        const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
        const value = -(me.shorts[id]*price(id));
        const basis = Math.round(me.shortBasis[id]||0); // proceeds received when the short was opened — a short's "cost basis"
        holdingRows.push({ value, html: `<tr><td>${id} (${sectorLabel}, short)</td><td>${me.shorts[id]}</td><td>$${basis}</td><td style="color:var(--down);">-$${Math.abs(value)}</td>${glCell(shortGainLoss(me,id))}</tr>` });
      }
    });
    holdingRows.sort((a,b)=>b.value-a.value);

    html += `<div class="panel"><h3 style="color:${me.color};">Your Holdings</h3>`;
    if(holdingRows.length===0){
      html += `<div class="hint" style="margin:0;">No open positions yet.</div>`;
    } else {
      html += `<table class="holdings-table"><tr><th>Ticker</th><th>Shares</th><th>Cost Basis</th><th>Value</th><th>Gain/Loss</th></tr>`;
      holdingRows.forEach(r=>{ html += r.html; });
      html += `</table>`;
    }
    // active card-granted perks — small badges so they're not forgotten about
    const perkBadges = [];
    if((me.goldenGeese||[]).length){
      const counts = {}; me.goldenGeese.forEach(id=>counts[id]=(counts[id]||0)+1);
      Object.entries(counts).forEach(([id,n])=>perkBadges.push(`🪿 ${id} +${n*10}% forever`));
    }
    if(me.marginShield) perkBadges.push(`🛡️ Margin Call Forgiveness ready`);
    if(me.publicOffering && me.publicOffering.active){
      const left = 3-me.publicOffering.usedStocks.length;
      perkBadges.push(`🏷️ Public Offering — ${left} stock${left===1?'':'s'} left this turn`);
    }
    (state.dividendLeaches||[]).forEach(leach=>{
      if(leach.thiefIndex===myPlayerIndex) perkBadges.push(`🩸 Leaching ${state.players[leach.victimIndex].name} (${leach.turnsLeft} left)`);
      if(leach.victimIndex===myPlayerIndex) perkBadges.push(`🩸 Being leached by ${state.players[leach.thiefIndex].name} (${leach.turnsLeft} left)`);
    });
    if(perkBadges.length){
      html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">${perkBadges.map(b=>`<span class="frozen-badge">${b}</span>`).join('')}</div>`;
    }
    html += `</div>`;
  }

  // log — moved to an on-demand modal instead of always-on-screen
  html += `<button class="btn secondary full" id="openLogBtn">Market Log (${state.log.length})</button>`;
  html += `<button class="btn secondary full" id="openNetWorthBtn" style="margin-top:8px;">Net Worth Graph</button>`;

  html += `</div>`;
  return html;
}

/* Multi-line chart, one polyline per player in their own color — same
   gridline/label style as the expanded stock chart, so it feels like part
   of the same visual language rather than a bolted-on widget. Eliminated
   players' lines are dimmed rather than removed, so you can still see
   where they dropped off. */
function renderNetWorthChartSvg(){
  const W = 640, H = 340, padL = 70, padR = 16, padT = 16, padB = 16;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const hist = (state.netWorthHistory && state.netWorthHistory.length) ? state.netWorthHistory : [{ values: state.players.map(p=>netWorth(p)) }];
  const n = hist.length;
  let allVals = [];
  hist.forEach(pt=> pt.values.forEach(v=>allVals.push(v)));
  if(allVals.length===0) allVals = [0, START_CASH];
  let top = Math.max(...allVals, START_CASH);
  let bottom = Math.min(...allVals, 0);
  const pad = Math.max(1,(top-bottom))*0.08; // breathing room so lines don't hug the edges
  top += pad; bottom -= pad;
  const range = (top-bottom)||1;
  const stepX = n>1 ? plotW/(n-1) : 0;
  const yFor = v => padT + plotH - ((v-bottom)/range)*plotH;
  const xFor = i => padL + i*stepX;

  const GRID_LINES = 5;
  let gridSvg = '';
  for(let i=0;i<=GRID_LINES;i++){
    const val = bottom + (range*i/GRID_LINES);
    const y = yFor(val);
    gridSvg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#232A38" stroke-width="1"/>
      <text x="${padL-8}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="11" font-family="IBM Plex Mono" fill="#7C879C">$${Math.round(val).toLocaleString()}</text>`;
  }
  let zeroLine = '';
  if(bottom<0 && top>0){
    const y0 = yFor(0);
    zeroLine = `<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${W-padR}" y2="${y0.toFixed(1)}" stroke="#7C879C" stroke-width="1" stroke-dasharray="4,3"/>`;
  }

  let linesSvg = '';
  state.players.forEach((pl,pIdx)=>{
    const coords = hist.map((pt,i)=> `${xFor(i).toFixed(1)},${Math.max(padT,Math.min(padT+plotH,yFor(pt.values[pIdx]))).toFixed(1)}`).join(' ');
    const lastVal = hist[hist.length-1].values[pIdx];
    const lastX = xFor(n-1), lastY = Math.max(padT,Math.min(padT+plotH,yFor(lastVal)));
    linesSvg += `<polyline points="${coords}" fill="none" stroke="${pl.color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="${pl.eliminated?0.35:1}"/>
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="${pl.color}" opacity="${pl.eliminated?0.35:1}"/>`;
  });

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;">
    ${gridSvg}
    ${zeroLine}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#232A38" stroke-width="1"/>
    ${linesSvg}
  </svg>`;
}

      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;">

          <span style="width:9px;height:9px;border-radius:50%;background:${pl.color};display:inline-block;opacity:${pl.eliminated?0.35:1};"></span>${pl.name}${pl.eliminated?' (eliminated)':''}
        </span>`).join('')}

      <button class="btn full" id="closeNetWorthBtn">Close</button>

}

function renderLogModal(){
  if(!state.showLog) return '';
  return `<div class="overlay" id="logOverlay">
    <div class="modal">
      <h2>Market Log</h2>
      <div class="sub">Everything that's happened this game, most recent first.</div>
      <div class="log" style="max-height:60vh;">
        ${state.log.slice().reverse().map(l=>`<div class="log-entry ${l.event?'event':''}">${l.text}</div>`).join('')}
      </div>
      <button class="btn full" id="closeLogBtn" style="margin-top:14px;">Close</button>
    </div>
  </div>`;
}

/* "Insider Info" cards stay private to whoever drew them — everyone else
   only ever sees the generic label, never the actual stock/price/direction.
   Every other card type is public: any player can see what got drawn, even
   though only the drawer can act on it. */
function isInsiderCard(card){
  return card && (card.type==='peek' || card.type==='sched_swing' || card.type==='sched_price' || card.type==='sched_price_fake');
}

function renderCardModal(){
  if(!state.pendingCard || !isMyTurn()) return ''; // only the acting player's own device gets the popup
  const card = state.pendingCard;
  const p = state.players[state.current];

  if(state.cardMinimized) return ''; // tucked away so the player can check their holdings first

  const minimizeBtn = `<button class="btn secondary full" id="minimizeCardBtn" style="margin-top:8px;">Minimize — check my holdings</button>`;

  if(card.type==='peek' && state.pendingChoice && state.pendingChoice.kind==='info'){
    return `<div class="overlay"><div class="modal">
      <div class="card-face"><div class="card-kind">Insider Info</div><div class="card-text">${card.text}</div></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Next up in the deck:</div>
      ${state.pendingChoice.lines.map(l=>`<div class="log-entry" style="margin-bottom:6px;">${l}</div>`).join('')}
      <button class="btn full" id="ackBtn" style="margin-top:10px;">Got it</button>
      ${minimizeBtn}
    </div></div>`;
  }

  if(needsChoice(card)){
    return `<div class="overlay"><div class="modal">
      <div class="card-face"><div class="card-kind">${p.name}'s turn</div><div class="card-text">${card.text}</div></div>
      ${state.choiceError ? `<div class="choice-error">${state.choiceError}</div>` : ''}
      ${renderChoiceUI(card)}
      ${minimizeBtn}
    </div></div>`;
  }

  return `<div class="overlay"><div class="modal">
    <div class="card-face"><div class="card-kind">${p.name}'s turn</div><div class="card-text">${card.text}</div></div>
    <button class="btn full" id="ackBtn">Continue</button>
    ${minimizeBtn}
  </div></div>`;
}

/* For everyone who ISN'T the drawer — a small non-blocking banner (doesn't
   stop them checking their own holdings/charts) showing what got drawn.
   Public cards show their real text; Insider Info cards show only the
   generic label, never the actual prediction. */
function renderSpectatorCardBanner(){
  if(!state.pendingCard || isMyTurn()) return '';
  const card = state.pendingCard;
  const drawer = state.players[state.current];
  const label = isInsiderCard(card) ? 'Insider Info' : card.text;
  return `<div class="resume-card-banner" style="border-color:${drawer.color};">
    <div>
      <div class="resume-card-label" style="color:${drawer.color};">${drawer.name} drew a card</div>
      <div class="resume-card-sub">${label}</div>
    </div>
  </div>`;
}

function renderResumeCardBanner(){
  if(!state.pendingCard || !state.cardMinimized || !isMyTurn()) return '';
  const p = state.players[state.current];
  return `<div class="resume-card-banner">
    <div>
      <div class="resume-card-label">Card paused</div>
      <div class="resume-card-sub">${p.name} still needs to resolve a card</div>
    </div>
    <button class="btn" id="resumeCardBtn">Resume Card</button>
  </div>`;
}

function renderChoiceUI(card){
  const p = state.players[state.current];
  switch(card.type){
    case 'sched_swing':
      return `
        <div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Swing Up</button>
          <button class="btn secondary" id="c_down">Swing Down</button>
        </div>`;
    case 'split': {
      const owned = STOCK_IDS.filter(id=>p.shares[id]>0);
      if(owned.length===0) return `<div class="hint">You own no shares — this card has no effect.</div><button class="btn full" id="ackBtn">Continue</button>`;
      return `<div class="trade-row"><select id="c_stock">${owned.map(id=>`<option value="${id}">${id} (${p.shares[id]} shares)</option>`).join('')}</select></div>
        <button class="btn full" id="c_split">Split</button>`;
    }
    case 'choose_stock_move':
      return `
        <div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Move Up</button>
          <button class="btn secondary" id="c_down">Move Down</button>
        </div>`;
    case 'choose_sector_move':
      return `
        <div class="trade-row"><select id="c_sector">${Object.keys(SECTORS).map(s=>`<option value="${s}">${SECTORS[s].label||s}</option>`).join('')}</select></div>
        <div class="choice-grid">
          <button class="btn secondary" id="c_up">Move Up</button>
          <button class="btn secondary" id="c_down">Move Down</button>
        </div>`;
    case 'whale':
      return `
        <div class="trade-row">
          <select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id} — $${price(id)}</option>`).join('')}</select>
          <input type="number" id="c_qty" min="1" value="1">
        </div>
        <div class="choice-grid">
          <button class="btn buy" id="c_buy">Buy (pushes price up)</button>
          <button class="btn sell" id="c_sell">Sell (pushes price down)</button>
          <button class="btn short" id="c_short">Short (pushes price down)</button>
          <button class="btn secondary" id="c_hold">Hold — no trade</button>
        </div>`;
    case 'freeze':
      return `<div class="trade-row"><select id="c_stock">${STOCK_IDS.map(id=>`<option value="${id}">${id}</option>`).join('')}</select></div>
        <button class="btn full" id="c_freeze">Freeze</button>`;
    default: return '';
  }
}

function wireChoiceHandlers(card){
  const byId = x=>document.getElementById(x);
  const done = (choice)=>{
    const ok = resolveChoice(card, choice);
    if(ok===false){ render(); return; } // keep the card open so they can adjust and retry
    finishCardResolution();
  };
  switch(card.type){
    case 'sched_swing':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ stock: byId('c_stock').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ stock: byId('c_stock').value, dir:-1 });
      break;
    case 'split':
      if(byId('c_split')) byId('c_split').onclick = ()=>done({ stock: byId('c_stock').value });
      if(byId('ackBtn')) byId('ackBtn').onclick = ()=>finishCardResolution();
      break;
    case 'choose_stock_move':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ stock: byId('c_stock').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ stock: byId('c_stock').value, dir:-1 });
      break;
    case 'choose_sector_move':
      if(byId('c_up')) byId('c_up').onclick = ()=>done({ sector: byId('c_sector').value, dir:1 });
      if(byId('c_down')) byId('c_down').onclick = ()=>done({ sector: byId('c_sector').value, dir:-1 });
      break;
    case 'whale':
      if(byId('c_buy')) byId('c_buy').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'buy' });
      if(byId('c_sell')) byId('c_sell').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'sell' });
      if(byId('c_short')) byId('c_short').onclick = ()=>done({ stock: byId('c_stock').value, qty: parseInt(byId('c_qty').value)||1, side:'short' });
      if(byId('c_hold')) byId('c_hold').onclick = ()=>done({ side:'hold' });
      break;
    case 'freeze':
      if(byId('c_freeze')) byId('c_freeze').onclick = ()=>done({ stock: byId('c_stock').value });
      break;
  }
}

function render(){
  if(!state || state.phase==='lobby' || myPlayerIndex===null){ renderSetup(); return; }
  repairCollections(state); // belt-and-suspenders: guarantee these exist no matter how state got here
  const p = state.players[state.current];
  // render() fully rebuilds the DOM via innerHTML below — on many mobile
  // browsers, replacing all that content resets (or otherwise disturbs)
  // the page's scroll position, which visibly "jumps" the screen right
  // after a tap. That's dangerous specifically because it happens between
  // a click landing and the next one — a button that was under your finger
  // can end up somewhere else entirely (e.g. Buy landing on Short right
  // after). Capture where we are now so it can be restored exactly,
  // instead of leaving the jump to chance.
  const priorScrollX = window.scrollX, priorScrollY = window.scrollY;
  // render() fully rebuilds the DOM via innerHTML below — which would
  // otherwise silently reset an in-progress choice-card selection (a
  // <select> snapping back to its first option) any time something
  // triggers a re-render while you're still deciding, e.g. the periodic
  // background sync. Capture whatever's currently chosen so it can be
  // restored after rebuilding, as long as it's still the same card.
  const priorCardId = state.pendingCard ? state.pendingCard._id : null;
  const priorChoiceInputs = {};
  ['c_stock','c_sector','c_qty'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) priorChoiceInputs[id] = el.value;
  });
  app.innerHTML = `
    <div class="topbar">
      <div class="title">
        <svg class="logo-mark" width="28" height="22" viewBox="0 0 28 22" xmlns="http://www.w3.org/2000/svg" fill="none">
          <polyline points="2,19 9,12 13,15 19,6" stroke="var(--up)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14,5 L20,4.3 L20.7,10.3" stroke="var(--up)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><span class="word-up">Up</span><span class="word-trend">Trend</span></span>
      </div>
      <div class="meta">
        <div class="item" title="${isConnected?'Connected to Firebase':'Reconnecting…'}">
          <div class="label">Status</div>
          <div class="value" style="display:flex;align-items:center;gap:5px;font-size:13px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${isConnected?'var(--up)':'var(--down)'};${isConnected?'':'animation:pulseDot 1s infinite;'}"></span>
            ${isConnected?'Connected':'Reconnecting…'}
          </div>
        </div>
        <div class="item"><div class="label">Mini SP8</div><div class="value mono">$${spPrice()}</div></div>
        <div class="item"><div class="label">SP8</div><div class="value mono">$${spxPrice()}</div></div>
        <div class="item"><div class="label">Turn</div><div class="value" style="color:${p.color};">${p.name}</div></div>
        <div class="item"><div class="label">Time Left</div><div class="value mono" id="turnTimerValue" style="${turnTimerSecondsLeft()<=0?'color:var(--down);':''}">${formatTurnTimer(turnTimerSecondsLeft())}</div></div>
        <div class="item"><div class="label">${state.winCondition && state.winCondition.mode==='timer' ? 'Game Ends In' : 'Goal'}</div><div class="value mono" id="gameLengthValue" style="${gameTimeLeftSecs()<=0 && state.winCondition && state.winCondition.mode==='timer' ? 'color:var(--down);' : ''}">${state.winCondition && state.winCondition.mode==='timer' ? formatGameTimeLeft() : '$'+((state.winCondition&&state.winCondition.target)||500000).toLocaleString()}</div></div>
        <div class="item"><div class="label">Deck</div><div class="value mono">${state.deck.length} left</div></div>
        <button class="btn secondary" id="syncNowBtn" style="padding:8px 12px;font-size:12px;">Sync Now</button>
        <button class="btn secondary" id="restartBtn" style="padding:8px 12px;font-size:12px;">Restart</button>
      </div>
    </div>
    <div class="layout">
      <div>${renderBoard()}</div>
      ${renderSidebar()}
    </div>
    ${renderCardModal()}
    ${renderLogModal()}
    ${renderNetWorthModal()}
    ${renderEndTurnConfirm()}
    ${renderResumeCardBanner()}
    ${renderSpectatorCardBanner()}
    ${renderRestartConfirm()}
    ${renderExpandedChartModal()}
    ${renderSyncFailedBanner()}
  `;

  // wire buttons
  const byId = x=>document.getElementById(x);
  if(byId('drawBtn')) byId('drawBtn').onclick = ()=>drawCard();
  if(byId('bankruptcyResetBtn')) byId('bankruptcyResetBtn').onclick = humanBankruptcyReset;
  if(byId('endTurnBtn')) byId('endTurnBtn').onclick = requestEndTurn;
  if(byId('eliminatedContinueBtn')) byId('eliminatedContinueBtn').onclick = ()=>{ if(isMyTurn()) endTurn(); };
  if(byId('newGameBtn')) byId('newGameBtn').onclick = wipeGame;
  if(byId('buyBtn')) byId('buyBtn').onclick = guardedTradeClick(()=>buyShares(state.tradeSelection, 1));
  if(byId('buyInsiderBtn')) byId('buyInsiderBtn').onclick = ()=>buyInsiderInfo();
  if(byId('sellBtn')) byId('sellBtn').onclick = guardedTradeClick(()=>sellShares(state.tradeSelection, 1));
  if(byId('shortBtn')) byId('shortBtn').onclick = guardedTradeClick(()=>openShort(state.tradeSelection, 1));
  if(byId('coverBtn')) byId('coverBtn').onclick = guardedTradeClick(()=>coverShort(state.tradeSelection, 1));
  if(byId('undoBtn')) byId('undoBtn').onclick = undoLastTrade;
  if(byId('openLogBtn')) byId('openLogBtn').onclick = ()=>{ state.showLog = true; render(); };
  if(byId('openNetWorthBtn')) byId('openNetWorthBtn').onclick = ()=>{ state.showNetWorthGraph = true; render(); };
  if(byId('closeNetWorthBtn')) byId('closeNetWorthBtn').onclick = ()=>{ state.showNetWorthGraph = false; render(); };
  if(byId('closeLogBtn')) byId('closeLogBtn').onclick = ()=>{ state.showLog = false; render(); };
  if(byId('confirmEndTurnBtn')) byId('confirmEndTurnBtn').onclick = proceedPastTrade;
  if(byId('cancelEndTurnBtn')) byId('cancelEndTurnBtn').onclick = ()=>{ state.confirmEndTurn=false; render(); };
  if(byId('syncNowBtn')) byId('syncNowBtn').onclick = forceSyncNow;
  if(byId('retrySyncBtn')) byId('retrySyncBtn').onclick = forceSyncNow;
  if(byId('restartBtn')) byId('restartBtn').onclick = ()=>{ state.confirmRestart=true; render(); };
  if(byId('confirmRestartBtn')) byId('confirmRestartBtn').onclick = wipeGame;
  if(byId('cancelRestartBtn')) byId('cancelRestartBtn').onclick = ()=>{ state.confirmRestart=false; render(); };
  if(byId('minimizeCardBtn')) byId('minimizeCardBtn').onclick = ()=>{ state.cardMinimized=true; render(); };
  if(byId('resumeCardBtn')) byId('resumeCardBtn').onclick = ()=>{ state.cardMinimized=false; render(); };
  document.querySelectorAll('[data-trade-id]').forEach(el=>{
    el.onclick = ()=>{ state.tradeSelection = el.getAttribute('data-trade-id'); render(); };
  });
  document.querySelectorAll('[data-chart-id]').forEach(el=>{
    el.onclick = (ev)=>{ ev.stopPropagation(); state.expandedChart = el.getAttribute('data-chart-id'); render(); };
  });
  if(byId('closeChartBtn')) byId('closeChartBtn').onclick = ()=>{ state.expandedChart = null; render(); };
  if(byId('ackBtn')) byId('ackBtn').onclick = ()=>{
    if(state.pendingCard && state.pendingCard.type==='peek'){ finishCardResolution(); }
    else finishCardResolution();
  };
  if(state.pendingCard && needsChoice(state.pendingCard)) wireChoiceHandlers(state.pendingCard);
  // Restore whatever was selected before this rebuild, as long as we're
  // still looking at the exact same card (not a new one that replaced it).
  if(state.pendingCard && state.pendingCard._id===priorCardId){
    Object.keys(priorChoiceInputs).forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      const val = priorChoiceInputs[id];
      if(el.tagName==='SELECT'){
        if(Array.from(el.options).some(o=>o.value===val)) el.value = val;
      } else {
        el.value = val;
      }
    });
  }
  // Put the scroll position back exactly where it was — rebuilding the DOM
  // can otherwise silently reset it, which is what makes the next tap land
  // on the wrong button right after an action. Done on the next frame so
  // it applies after the browser's own layout pass, not before it.
  requestAnimationFrame(()=>{ window.scrollTo(priorScrollX, priorScrollY); });
  maybeStartBotTurn();
}

/* Entry point: a shareable ?room=CODE link wins over anything saved
   locally; otherwise fall back to the last room this browser was in;
   otherwise show the plain Create/Join landing screen. */
(function boot(){
  const params = new URLSearchParams(window.location.search);
  const urlRoom = (params.get('room')||'').replace(/\D/g,'');
  if(urlRoom.length===6){ subscribeToRoom(urlRoom); return; }
  const saved = loadLocalRoom();
  if(saved && saved.code){ subscribeToRoom(saved.code); return; }
  render();
})();
</script>
</body>
</html>
