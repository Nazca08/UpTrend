<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UpTrend</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D12;
    --panel:#12161F;
    --panel-2:#171C27;
    --line:#232A38;
    --text:#E7EAF0;
    --muted:#7C879C;
    --up:#3ECF8E;
    --down:#FF5C5C;
    --amber:#F5A623;
    --tech:#B98CFF;
    --energy:#FFB454;
    --health:#5CD6C0;
    --consumer:#6FA8FF;
    --sp:#F5A623;
    --spx:#C77DFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- layout ---------- */
  #app{max-width:1400px;margin:0 auto;padding:16px;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;background:linear-gradient(180deg,#141924,#0F131B);
    border:1px solid var(--line);border-radius:14px;margin-bottom:14px;
  }
  .topbar .title{font-size:22px;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:9px;}
  .title .logo-mark{flex-shrink:0;}
  .title .word-up{color:#FFFFFF;}
  .title .word-trend{color:var(--up);}
  .topbar .meta{display:flex;gap:22px;align-items:center;}
  .meta .item{text-align:right;}
  .meta .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .meta .value{font-size:16px;font-weight:600;}

  .layout{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start;}
  @media (max-width:980px){.layout{grid-template-columns:1fr;}}

  .board{display:flex;flex-direction:column;gap:12px;}
  .sector-panel{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  }
  .sector-head{
    padding:9px 16px;font-size:12px;text-transform:uppercase;letter-spacing:1.4px;
    font-weight:600;display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--line);
  }
  .sector-dot{width:8px;height:8px;border-radius:50%;}
  .stock-row{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;}
  .stock-row:last-child{border-bottom:none;}
  .stock-row:hover{background:rgba(255,255,255,0.02);}
  .stock-row.selected{background:rgba(245,166,35,0.07);box-shadow:inset 3px 0 0 var(--amber);}
  .tap-hint{font-size:10px;color:var(--muted);margin-left:auto;text-transform:uppercase;letter-spacing:0.5px;}
  .sparkline{display:block;flex-shrink:0;background:rgba(255,255,255,0.02);border-radius:4px;}
  .stock-row-inner{display:flex;align-items:flex-start;gap:12px;}
  .stock-chart-col{flex-shrink:0;padding-top:2px;cursor:zoom-in;border-radius:6px;transition:background .12s;}
  .stock-chart-col:hover{background:rgba(255,255,255,0.06);}
  .stock-main-col{flex:1;min-width:0;}
  .stock-row .row-top{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
  .ticker{font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:0.5px;}
  .price-now{font-family:'IBM Plex Mono';font-size:19px;font-weight:600;}
  .price-delta{font-family:'IBM Plex Mono';font-size:12px;padding:1px 6px;border-radius:5px;}
  .price-delta.up{color:var(--up);background:rgba(62,207,142,0.12);}
  .price-delta.down{color:var(--down);background:rgba(255,92,92,0.12);}
  .price-delta.flat{color:var(--muted);background:rgba(124,135,156,0.12);}
  .frozen-badge{font-size:10px;color:#8FD9FF;background:rgba(143,217,255,0.12);padding:1px 6px;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;}
  .worthless-badge{font-size:10px;color:var(--down);background:rgba(255,92,92,0.14);padding:1px 6px;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;font-weight:600;}
  .stock-row.worthless{opacity:0.5;cursor:default;}
  .stock-row.worthless:hover{background:none;}

  .track{display:flex;align-items:flex-end;gap:2px;position:relative;overflow-x:auto;padding-bottom:2px;}
  .dot-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
  .dot{width:9px;height:9px;border-radius:50%;background:#2A3242;transition:all .25s;}
  .dot.filled{width:12px;height:12px;box-shadow:0 0 7px currentColor;}
  .dot-price{font-size:8.5px;font-family:'IBM Plex Mono';color:var(--muted);margin-top:4px;white-space:nowrap;}
  .dot.filled + .dot-price, .dot-wrap.active .dot-price{color:var(--text);font-weight:600;}
  .dot-wrap.edge .dot{outline:1px solid rgba(255,255,255,0.15);outline-offset:2px;}
  .dot-wrap.center .dot{box-shadow:0 0 0 2px rgba(255,255,255,0.28);}
  .dot-wrap.center .dot-price{color:var(--text);font-weight:600;background:rgba(255,255,255,0.08);border-radius:4px;padding:0 4px;}
  .dot-wrap.div-zone{background:rgba(62,207,142,0.10);border-top:1px solid rgba(62,207,142,0.45);border-bottom:1px solid rgba(62,207,142,0.45);padding-top:1px;}
  .dot-wrap.div-zone-start{border-left:1px solid rgba(62,207,142,0.45);border-top-left-radius:6px;border-bottom-left-radius:6px;}
  .dot-wrap.div-zone-end{border-right:1px solid rgba(62,207,142,0.45);border-top-right-radius:6px;border-bottom-right-radius:6px;}
  .div-zone-rate{font-size:8px;font-family:'IBM Plex Mono';color:var(--up);font-weight:700;white-space:nowrap;margin-bottom:2px;}

  /* ---------- sidebar ---------- */
  .sidebar{display:flex;flex-direction:column;gap:12px;position:sticky;top:16px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .panel h3{margin:0 0 10px 0;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .player-card{
    padding:10px 10px 10px 12px;border-radius:10px;margin-bottom:8px;border:1px solid var(--line);
    border-left-width:4px;background:var(--panel-2);
  }
  .player-card.active{box-shadow:0 0 0 1px var(--amber) inset;}
  .player-color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}
  .player-card .p-top{display:flex;justify-content:space-between;align-items:center;}
  .p-name{font-weight:600;font-size:14px;}
  .p-cash{font-family:'IBM Plex Mono';font-size:13px;color:var(--up);}
  .p-net{font-size:11px;color:var(--muted);margin-top:2px;}

  .btn{
    background:var(--amber);color:#1A1200;border:none;border-radius:9px;
    padding:10px 14px;font-weight:600;font-size:13px;cursor:pointer;
    font-family:'Inter';transition:transform .1s, filter .1s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:scale(0.98);}
  .btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}
  .btn.full{width:100%;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-row{display:flex;gap:8px;}
  .btn.buy{background:var(--up);color:#062A1B;}
  .btn.sell{background:var(--down);color:#3A0808;}
  .btn.short{background:var(--tech);color:#1D0F3A;}
  .btn.cover{background:#4C8DFF;color:#04122E;}
  .cap-meter{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono';}
  .cap-meter b{color:var(--text);}
  .price-now.flash{ animation: tickFlash .5s ease-out; display:inline-block; }
  @keyframes tickFlash{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.22); text-shadow:0 0 12px currentColor; }
    100%{ transform:scale(1); text-shadow:none; }
  }
  @keyframes pulseDot{
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }

  .trade-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  select, input[type=number]{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:7px;padding:7px 8px;font-family:'IBM Plex Mono';font-size:12px;
  }
  select{flex:1;}
  input[type=number]{width:62px;}

  .selected-ticker-box{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:9px;background:var(--panel-2);
    border:1px solid var(--line);margin-bottom:10px;
  }
  .selected-ticker-box .stx{font-family:'Space Grotesk';font-weight:700;font-size:15px;}
  .selected-ticker-box .spx{font-family:'IBM Plex Mono';font-size:14px;color:var(--muted);}
  .no-selection{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
  .choice-error{
    background:rgba(255,92,92,0.12);border:1px solid var(--down);color:var(--down);
    border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;line-height:1.4;
  }
  .resume-card-banner{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
    background:#151A24;border:1px solid var(--amber);border-radius:12px;
    padding:12px 16px;display:flex;align-items:center;gap:16px;z-index:60;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
  .resume-card-label{font-size:12px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:0.5px;}
  .resume-card-sub{font-size:12px;color:var(--muted);margin-top:1px;}

  .holdings-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'IBM Plex Mono';}
  .holdings-table th{text-align:left;color:var(--muted);font-weight:500;padding:4px 0;border-bottom:1px solid var(--line);}
  .holdings-table td{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);}

  .log{max-height:190px;overflow-y:auto;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px;}
  .log-entry{padding:6px 8px;background:var(--panel-2);border-radius:7px;border-left:2px solid var(--line);}
  .log-entry.event{border-left-color:var(--amber);color:var(--text);}

  /* ---------- overlay modals ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,8,12,0.75);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:#151A24;border:1px solid var(--line);border-radius:16px;
    max-width:480px;width:100%;padding:24px;
  }
  .modal h2{margin:0 0 6px 0;font-size:20px;}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .card-face{
    border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;
    background:radial-gradient(circle at 30% 0%, #1D2433, #10141C);
  }
  .card-kind{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--amber);margin-bottom:6px;}
  .card-text{font-size:15px;line-height:1.5;}
  .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
  .setup-field{margin-bottom:10px;}
  .setup-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .setup-field input{width:100%;padding:9px 10px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-family:'Inter';}
  .player-count-row{display:flex;gap:8px;margin-bottom:14px;}
  .count-opt{
    flex:1;text-align:center;padding:10px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);cursor:pointer;font-family:'IBM Plex Mono';font-weight:600;
  }
  .count-opt.selected{border-color:var(--amber);color:var(--amber);}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;}
</style>

<body>
<div id="app"></div>
<div id="audioControls" style="position:fixed;bottom:14px;right:14px;z-index:500;display:flex;gap:8px;"></div>

<script type="module">
/* ============================= CONFIG ============================= */
const SECTORS = {
  Tech:      { color:'var(--tech)',     top:400, bottom:0,  stocks:['NOVA','QBIT'] },
  Energy:    { color:'var(--energy)',   top:300, bottom:0,  stocks:['PWR','OILX'] },
  Health:    { color:'var(--health)',   top:220, bottom:15, stocks:['VITA','RXCO'] },
  Consumer:  { color:'var(--consumer)', top:160, bottom:35, stocks:['LUXE','SPRE'], label:'Consumer Discretionary' },
};
const STOCKS = {
  NOVA:{ name:'Nova Systems',  sector:'Tech' },
  QBIT:{ name:'Qubit AI',      sector:'Tech' },
  PWR: { name:'Ampere Power',  sector:'Energy' },
  OILX:{ name:'OilCross',      sector:'Energy' },
  VITA:{ name:'Vitalis Health',sector:'Health' },
  RXCO:{ name:'RxCore',        sector:'Health' },
  LUXE:{ name:'Luxeway',       sector:'Consumer' },
  SPRE:{ name:'SpreeMart',     sector:'Consumer' },
};
const STOCK_IDS = Object.keys(STOCKS);
const STOCK_DOTS_PER_SIDE = 15;  // 15 left of center + center + 15 right, for every individual stock
const SP_DOTS_PER_SIDE = 15;     // SP8 gets its own, wider track: 15 left + center + 15 right
const STOCK_CENTER_IDX = STOCK_DOTS_PER_SIDE;
const SP_CENTER_IDX = SP_DOTS_PER_SIDE;
const CENTER_PRICE = 1000; // used for the S&P 8 index track only — individual stocks use STOCK_PRICE_CONFIG below
const PLAYER_COLORS = ['#F5A623', '#4C8DFF', '#3ECF8E', '#FF6FD8'];
const START_CASH = 30000;

/* Builds a price track centered on `center` (each stock passes its own
   center/top/bottom from STOCK_PRICE_CONFIG; the S&P 8 uses the shared
   CENTER_PRICE default), running from `bottom` to `top` over
   `dotsPerSide` dots on each side. Uses a mild power curve (1.6) so gaps
   grow smoothly and moderately the further out you go — no flat repeated
   segments near the edges, and no runaway exponential blowup. A sector with
   bottom=0 can reach exactly $0 (see checkWorthless); sectors with a
   positive bottom (the calmer ones) never can. */
function generateTrack(top, bottom, center, dotsPerSide){
  center = center===undefined ? CENTER_PRICE : center;
  dotsPerSide = dotsPerSide===undefined ? STOCK_DOTS_PER_SIDE : dotsPerSide;
  const POWER = 1.6;
  const left=[], right=[];
  for(let k=1;k<=dotsPerSide;k++){
    const t = Math.pow(k/dotsPerSide, POWER);
    const up = Math.round(center + (top-center)*t);
    const down = Math.max(0, Math.round(center - (center-bottom)*t));
    right.push(up);
    left.unshift(down);
  }
  return [...left, center, ...right];
}

/* Insider Info now comes in 4 tiers instead of one flat pool — better
   sources carry real legal risk, worse sources are cheap gossip that's
   more likely to be made up and never has any risk attached. `riskRate` is
   the per-turn chance of getting caught WHILE actively acting on that
   specific tip (see checkInsiderTradingRisk); `jailTurns` and `fineRate`
   (of net worth, at the instant of the catch) apply if it hits. */
const INSIDER_TIERS = {
  csuite: { label:'C-Suite',         count:7, fakeCount:0, riskRate:0.02,  jailTurns:2, fineRate:0.10 },
  expert: { label:'Industry Expert', count:7, fakeCount:1, riskRate:0.01,  jailTurns:2, fineRate:0.08 },
  friend: { label:'Friend',          count:7, fakeCount:2, riskRate:0.005, jailTurns:1, fineRate:0.05 },
  napkin: { label:'Napkin',          count:7, fakeCount:3, riskRate:0,     jailTurns:0, fineRate:0    },
};

/* ============================= DECK ============================= */
function buildDeck(){
  const deck = [];
  let uid = 0;
  const add = (n, obj) => { for(let i=0;i<n;i++) deck.push({ ...obj, _id: uid++ }); };
  // Splits a group of `n` identical cards into holdable/non-holdable using a
  // shared running carry, so a fraction like 25% lands on the EXACT total
  // across a whole group of add() calls (e.g. every stock/direction/step
  // combo for Move a Stock) instead of rounding independently per call and
  // drifting off target. `carry` is a {value} object shared across every
  // call that belongs to the same group.
  const addHoldableSplit = (carry, n, obj, fraction) => {
    carry.value += n * fraction;
    const hc = Math.floor(carry.value + 1e-9);
    carry.value -= hc;
    if(hc>0) add(hc, { ...obj, holdable:true });
    if(n-hc>0) add(n-hc, { ...obj, holdable:false });
  };

  // Stock Movement (dictated) — 6 per stock (3 up / 3 down) = 48
  // 25% of the whole Move a Stock group (112 cards) is holdable — the exact
  // move is still randomly baked into the card at deck-build time, holding
  // it just lets the player choose WHEN to spring it.
  const stockMoveHoldCarry = { value:0 };
  STOCK_IDS.forEach(id=>{
    addHoldableSplit(stockMoveHoldCarry, 3, { type:'stock_move', stock:id, dir:1,  text:`${id} moves UP 1 step.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 3, { type:'stock_move', stock:id, dir:-1, text:`${id} moves DOWN 1 step.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 2, { type:'stock_move', stock:id, dir:1,  steps:2, text:`${id} moves UP 2 steps.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 2, { type:'stock_move', stock:id, dir:-1, steps:2, text:`${id} moves DOWN 2 steps.` }, 0.25);
  });

  // Big Stock Movement (dictated) — 4 per stock: 3-up, 3-down, 4-up, 4-down = 32
  STOCK_IDS.forEach(id=>{
    addHoldableSplit(stockMoveHoldCarry, 1, { type:'stock_move', stock:id, dir:1,  steps:3, text:`${id} moves UP 3 steps.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 1, { type:'stock_move', stock:id, dir:-1, steps:3, text:`${id} moves DOWN 3 steps.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 1, { type:'stock_move', stock:id, dir:1,  steps:4, text:`${id} moves UP 4 steps.` }, 0.25);
    addHoldableSplit(stockMoveHoldCarry, 1, { type:'stock_move', stock:id, dir:-1, steps:4, text:`${id} moves DOWN 4 steps.` }, 0.25);
  });

  // Sector Movement (dictated) — 6 per sector (3 up / 3 down) = 24
  // 25% of the whole Move a Sector group (56 cards) is holdable, same idea.
  const sectorMoveHoldCarry = { value:0 };
  Object.keys(SECTORS).forEach(sec=>{
    const label = SECTORS[sec].label || sec;
    addHoldableSplit(sectorMoveHoldCarry, 3, { type:'sector_move', sector:sec, dir:1,  text:`${label} sector moves UP 1 step.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 3, { type:'sector_move', sector:sec, dir:-1, text:`${label} sector moves DOWN 1 step.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 2, { type:'sector_move', sector:sec, dir:1,  steps:2, text:`${label} sector moves UP 2 steps.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 2, { type:'sector_move', sector:sec, dir:-1, steps:2, text:`${label} sector moves DOWN 2 steps.` }, 0.25);
  });

  // Big Sector Movement (dictated) — 4 per sector: 3-up, 3-down, 4-up, 4-down = 16
  Object.keys(SECTORS).forEach(sec=>{
    const label = SECTORS[sec].label || sec;
    addHoldableSplit(sectorMoveHoldCarry, 1, { type:'sector_move', sector:sec, dir:1,  steps:3, text:`${label} sector moves UP 3 steps.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 1, { type:'sector_move', sector:sec, dir:-1, steps:3, text:`${label} sector moves DOWN 3 steps.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 1, { type:'sector_move', sector:sec, dir:1,  steps:4, text:`${label} sector moves UP 4 steps.` }, 0.25);
    addHoldableSplit(sectorMoveHoldCarry, 1, { type:'sector_move', sector:sec, dir:-1, steps:4, text:`${label} sector moves DOWN 4 steps.` }, 0.25);
  });

  // Reversion — overextended stocks/sectors pull back toward their center price = 24
  // 25% of Stock Revert (16) and Sector Revert (8) are each holdable too.
  const stockRevertHoldCarry = { value:0 };
  STOCK_IDS.forEach(id=>{
    addHoldableSplit(stockRevertHoldCarry, 1, { type:'stock_revert', stock:id, amount:1, text:`${id} reverts 1 step toward the middle.` }, 0.25);
    addHoldableSplit(stockRevertHoldCarry, 1, { type:'stock_revert', stock:id, amount:2, text:`${id} reverts 2 steps toward the middle.` }, 0.25);
  });
  const sectorRevertHoldCarry = { value:0 };
  Object.keys(SECTORS).forEach(sec=>{
    const label = SECTORS[sec].label || sec;
    addHoldableSplit(sectorRevertHoldCarry, 1, { type:'sector_revert', sector:sec, amount:1, text:`${label} sector reverts 1 step toward the middle.` }, 0.25);
    addHoldableSplit(sectorRevertHoldCarry, 1, { type:'sector_revert', sector:sec, amount:2, text:`${label} sector reverts 2 steps toward the middle.` }, 0.25);
  });

  // Insider Info
  add(3, { type:'peek', text:'Insider Info — Market Peek: reveal the next 3 cards in the deck.' });
  add(2, { type:'sched_swing', text:'Insider Info — Scheduled Swing: pick a stock. In 2 turns it swings 2 steps in a direction you choose now.' });
  // Price Target tips — fully randomized: a random stock, a random price on its own row, in a random
  // 1-12 turns. Everything is rolled at draw time, not fixed here — see resolveAuto's 'insider_tip' case.
  // Split across 4 tiers (7 cards each, 28 total) — see INSIDER_TIERS above for what each tier risks.
  Object.entries(INSIDER_TIERS).forEach(([tierKey, cfg])=>{
    const realCount = cfg.count - cfg.fakeCount;
    if(realCount>0) add(realCount, { type:'insider_tip', tier:tierKey, fake:false, text:'Insider Info: a random stock will hit a random price within 12 turns — no matter what happens in between.' });
    if(cfg.fakeCount>0) add(cfg.fakeCount, { type:'insider_tip', tier:tierKey, fake:true, text:'Insider Info: a random stock will hit a random price within 12 turns — no matter what happens in between.' });
  });
  // Earnings Report — fully randomized and public (not hidden like Insider Info): a random stock
  // beats or misses, then drifts 1-4 bubbles per turn for 1-12 of the drawer's own turns

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Fields that live only in THIS browser tab and are never written to Firebase
// or overwritten by a remote update — pure UI state, not real game state.
const LOCAL_ONLY_KEYS = ['tradeSelection','turnUndoStack','confirmEndTurn','confirmRestart','expandedChart','showLog','showNetWorthGraph','cardMinimized'];

function localDefaults(){
  return {
    tradeSelection: null, turnUndoStack: [], confirmEndTurn: false,
    confirmRestart: false, expandedChart: null, showLog: false, showNetWorthGraph: false, cardMinimized: false,
  };
}

function extractSynced(s){
  const out = {};
  Object.keys(s).forEach(k=>{ if(!LOCAL_ONLY_KEYS.includes(k)) out[k] = s[k]; });
  return out;
}

let applyingRemote = false; // guards against re-persisting a change we just received
let syncFailed = false; // true if a write ultimately failed even after retries — shown as a banner

/* A brief cooldown across Buy/Sell/Short/Cover — belt-and-suspenders
   alongside the scroll-position fix in render(): if a tap ever does land
   half a beat off target (a ghost second touch event, a slow re-render),
   this stops it from firing a second, DIFFERENT trade action immediately
   after the first one. A deliberate next click is never this fast. */
let lastTradeClickAt = 0;
const TRADE_CLICK_COOLDOWN = 220;
function guardedTradeClick(fn){
  return (...args)=>{
    const now = Date.now();
    if(now - lastTradeClickAt < TRADE_CLICK_COOLDOWN) return;
    lastTradeClickAt = now;
    fn(...args);
  };
}

/* --- 1 & 2: live connection status + auto-resync the instant we reconnect --- */
let isConnected = true;
let everConnected = false;
onValue(ref(db, '.info/connected'), (snap)=>{
  const nowConnected = snap.val()===true;
  const wasConnected = isConnected;
  isConnected = nowConnected;

  }

/* --- 3: quiet background heartbeat — cheap insurance in case the live
   listener ever silently stalls without visibly disconnecting --- */
setInterval(()=>{
  if(roomCode && state && state.phase && state.phase!=='lobby') forceSyncNow();
}, 18000);

/* --- 4: only send what actually changed, instead of the whole ~30KB game
   state on every single click. We keep a snapshot of what we last
   successfully wrote (or received) and diff against it — Firebase's
   update() then only touches the specific fields that differ, while every
   OTHER client's listener still receives the full merged state as normal,
   so nothing about how updates are received needs to change. */
let lastKnownSnapshot = {};
function snapshotFields(payload){
  const out = {};
  Object.keys(payload).forEach(k=>{ out[k] = JSON.stringify(payload[k]); });
  return out;
}

async function writeWithRetry(doWrite){
  const MAX_ATTEMPTS = 4;
  for(let attempt=1; attempt<=MAX_ATTEMPTS; attempt++){
    try{
      await doWrite();
      if(syncFailed){ syncFailed = false; render(); } // recovered — clear the warning
      return true;
    }catch(e){
      console.error(`UpTrend: sync attempt ${attempt}/${MAX_ATTEMPTS} failed`, e);
      if(attempt<MAX_ATTEMPTS) await new Promise(r=>setTimeout(r, 400*attempt));
    }
  }
  syncFailed = true;
  render();
  return false;
}

/* Normal in-game persist: diff against the last known snapshot, write only
   the changed top-level fields via update(). */
/* Last line of defense: Firebase's update()/set() both reject `undefined`
   outright (unlike `null`, which just means "delete this"). repairCollections
   already restores the fields we know can go missing after a round trip,
   but this catches ANY top-level field that ends up undefined for any
   reason, so this class of bug can't quietly reappear on some future field
   we forget to add there. */
function nullifyUndefined(value){ return value===undefined ? null : value; }

async function persist(){
  if(!state || applyingRemote) return;
  state.version = (state.version||0) + 1;
  const payload = extractSynced(state);
  const newSnapshot = snapshotFields(payload);
  const updates = {};
  let changedCount = 0;
  const gp = gamePath();
  Object.keys(newSnapshot).forEach(k=>{
    if(newSnapshot[k] !== lastKnownSnapshot[k]){ updates[`${gp}/${k}`] = nullifyUndefined(payload[k]); changedCount++; }
  });
  if(changedCount===0) return; // nothing actually changed — don't write at all
  const ok = await writeWithRetry(()=>update(rootRef, updates));
  if(ok) lastKnownSnapshot = newSnapshot;
}

/* Full replace — only for genuine structural transitions (creating a lobby,
   turning a lobby into a real game) where the whole field set changes and a
   partial update() could leave stale fields lingering behind. */
async function persistFull(){
  if(!state || applyingRemote) return;
  state.version = (state.version||0) + 1;
  const payload = {};
  Object.entries(extractSynced(state)).forEach(([k,v])=>{ payload[k] = nullifyUndefined(v); });
  const ok = await writeWithRetry(()=>set(gameRef(), payload));
  if(ok) lastKnownSnapshot = snapshotFields(payload);
}

/* --- 5: rapid clicks (spamming Buy) get batched into one eventual write
   instead of one network round-trip per click. Turn-ending actions never
   go through this — those still persist immediately. --- */
let tradeDebounceTimer = null;
function schedulePersist(){
  if(tradeDebounceTimer) clearTimeout(tradeDebounceTimer);
  tradeDebounceTimer = setTimeout(()=>{ tradeDebounceTimer=null; persist(); }, 180);
}

/* Firebase Realtime Database silently omits ANY empty array or object when
   storing data — not just null values (the lobbySeats bug), but genuinely
   empty collections like a fresh game's recurringEffects: [] or
   turnFills.up: {}. When that data comes back down, those fields are just
   missing, not empty — so we have to restore them to their proper empty
   form after every merge, or code that expects them to exist (like
   .find()/.push() calls) crashes on undefined. The same thing happens to
   ordinary nullable fields (pendingCard, choiceError, etc.) — they come
   back as `undefined` instead of `null`, which crashes the diff-based
   persist() since Firebase's update() rejects undefined values outright. */
function repairCollections(s){
  if(!s || s.phase==='lobby') return;
  if(s.discard===undefined) s.discard = [];
  if(s.scheduled===undefined) s.scheduled = [];
  if(s.recurringEffects===undefined) s.recurringEffects = [];
  if(s.dividendLeaches===undefined) s.dividendLeaches = [];
  if(s.espionage===undefined) s.espionage = [];
  if(s.insiderBlockers===undefined) s.insiderBlockers = [];
  if(s.netWorthHistory===undefined) s.netWorthHistory = [{ values: s.players ? s.players.map(p=>netWorth(p)) : [] }];
  if(s.log===undefined) s.log = [];
  if(s.turnUsage===undefined) s.turnUsage = { total:0, perStock:{} };
  if(s.turnUsage.perStock===undefined) s.turnUsage.perStock = {};
  if(s.turnFills===undefined) s.turnFills = { up:{}, down:{} };
  if(s.turnFills.up===undefined) s.turnFills.up = {};
  if(s.turnFills.down===undefined) s.turnFills.down = {};
  if(s.pendingCard===undefined) s.pendingCard = null;
  if(s.pendingChoice===undefined) s.pendingChoice = null;
  if(s.choiceError===undefined) s.choiceError = null;
  if(s.winner===undefined) s.winner = null;
  if(s.gameOverAt===undefined) s.gameOverAt = null;
  if(s.gameLengthKey===undefined) s.gameLengthKey = null;
  if(s.stocks){
    Object.keys(s.stocks).forEach(id=>{
      if(s.stocks[id].tradeMarkers===undefined) s.stocks[id].tradeMarkers = [];
    });
  }
  if(s.sp && s.sp.tradeMarkers===undefined) s.sp.tradeMarkers = [];
  if(s.spx && s.spx.tradeMarkers===undefined) s.spx.tradeMarkers = [];
  if(s.players){
    s.players.forEach(pl=>{
      if(pl.goldenGeese===undefined) pl.goldenGeese = [];
      if(pl.holdStreak===undefined) pl.holdStreak = Object.fromEntries(STOCK_IDS.map(id=>[id,0]));
      if(pl.marginShield===undefined) pl.marginShield = false;
      if(pl.publicOffering && pl.publicOffering.usedStocks===undefined) pl.publicOffering.usedStocks = [];
      if(pl.jailTurnsLeft===undefined) pl.jailTurnsLeft = 0;
      if(pl.bannedStocks===undefined) pl.bannedStocks = [];
      if(pl.hand===undefined) pl.hand = [];
      if(pl.baseSalary===undefined) pl.baseSalary = SALARY_PER_TURN;
      if(pl.firedRoundsLeft===undefined) pl.firedRoundsLeft = 0;
      if(pl.overtimeTurnsLeft===undefined) pl.overtimeTurnsLeft = 0;
      if(pl.portfolioManagers===undefined) pl.portfolioManagers = [];
    });
  }
}

function mergeRemote(remote){
  applyingRemote = true;
  const locals = state ? {} : localDefaults();
  if(state) LOCAL_ONLY_KEYS.forEach(k=>{ locals[k] = state[k]; });
  state = { ...remote, ...locals };
  repairCollections(state);
  lastKnownSnapshot = snapshotFields(extractSynced(state)); // our diff baseline is now up to date too
  applyingRemote = false;
}

let unsubscribeGame = null; // detach handle for the current room's live listener

/* Subscribes this tab to `games/{code}` — tearing down any previous room's
   listener first. Used when creating a room, joining one by code, joining
   via a shareable ?room= link, or auto-rejoining from localStorage. */
function subscribeToRoom(code){
  if(unsubscribeGame){ unsubscribeGame(); unsubscribeGame = null; }
  roomCode = code;
  state = null; myPlayerIndex = null; lastKnownSnapshot = {};
  unsubscribeGame = onValue(gameRef(), (snap)=>{
    const remote = snap.val();
    if(!remote){
      // The room is empty — either nothing's been created yet, or someone
      // (possibly THIS tab, possibly another) just wiped it. Either way, clear
      // any stale local game data so this screen actually reflects that, rather
      // than silently continuing to show old data that no longer exists.
      if(state!==null){ state = null; myPlayerIndex = null; }
      render();
      return;
    }
    // Opportunistic 24h expiry cleanup — no server-side timer, just: whoever
    // next touches a stale room clears it out instead of resurrecting it.
    if(remote.createdAt && (Date.now()-remote.createdAt) > ROOM_EXPIRY_MS){
      set(gameRef(), null).catch(e=>console.error('UpTrend: expiry cleanup failed', e));
      state = null; myPlayerIndex = null; render();
      return;
    }
    const prevVersion = state ? state.version : -1;
    mergeRemote(remote);
    if(state.version !== prevVersion) render();
    tryAutoRejoin();
  });
}

/* If this browser has a saved seat (from localStorage) for the room it's
   currently in, and that seat still matches by name, silently reclaim it —
   so refreshing the page doesn't force re-picking who you are. */
function tryAutoRejoin(){
  if(myPlayerIndex!==null || !state) return;
  const saved = loadLocalRoom();
  if(!saved || saved.code!==roomCode) return;
  if(state.phase==='lobby'){
    if(state.lobbySeats[saved.seatIdx]===saved.name){ myPlayerIndex = saved.seatIdx; render(); }
  } else if(state.players && state.players[saved.seatIdx] && state.players[saved.seatIdx].name===saved.name){
    myPlayerIndex = saved.seatIdx; render();
  }
}

/* Safety net: does a one-time direct fetch of the current game state,
   bypassing the live listener entirely. If a screen ever seems stuck
   (waiting on a turn that's already moved on), this forces it to catch up
   without needing a full page reload. */
async function forceSyncNow(){
  if(!roomCode) return;
  try{
    const prevVersion = state ? state.version : -1;
    const hadSyncFailed = syncFailed;
    const snap = await get(gameRef());
    const remote = snap.val();
    if(!remote){
      if(state!==null){ state = null; myPlayerIndex = null; render(); }
    } else {
      mergeRemote(remote);
      // Only rebuild the DOM if something actually changed — render() replaces
      // the whole screen via innerHTML, which would otherwise wipe out an
      // in-progress choice-card selection (a <select> reset back to its
      // default option) every time this fires, even when nothing changed.
      // Still render if a "Sync failed" banner was showing, so clearing the
      // flag below actually hides it instead of leaving it stuck on screen.
      if(state.version !== prevVersion || hadSyncFailed) render();
    }
    syncFailed = false;
  }catch(e){ console.error('UpTrend: manual sync failed', e); }
}

/* Shown whenever a write genuinely failed even after retries — makes sure
   the player notices immediately instead of quietly drifting out of sync
   with everyone else until something looks wrong several turns later. */
function renderSyncFailedBanner(){
  if(!syncFailed) return '';
  return `<div class="resume-card-banner" style="border-color:var(--down);bottom:auto;top:22px;">
    <div>
      <div class="resume-card-label" style="color:var(--down);">Sync failed</div>
      <div class="resume-card-sub">Your last action may not have saved. Click Sync Now, or try it again.</div>
    </div>
    <button class="btn" id="retrySyncBtn">Sync Now</button>
  </div>`;
}

async function wipeGame(){
  state = null; myPlayerIndex = null;
  lastKnownSnapshot = {};
  if(!roomCode){ render(); return; }
  try{ await set(gameRef(), null); }catch(e){ console.error('UpTrend: failed to clear game', e); }
  render();
}

/* Leaves the current room entirely and returns to the true landing screen
   (Create Game / Join Game), forgetting the saved seat for this room. */
function leaveRoom(){
  if(unsubscribeGame){ unsubscribeGame(); unsubscribeGame = null; }
  roomCode = null; state = null; myPlayerIndex = null; lastKnownSnapshot = {};
  clearLocalRoom();
  render();
}

let state = null;

/* ============================= AUDIO =============================
   Everything here is procedurally generated with the Web Audio API —
   no external files, since this is a single self-contained HTML page
   with nowhere to host assets. Two independent toggles (SFX, music),
   each remembered in localStorage. The AudioContext can't start until
   a real user gesture happens (browser autoplay policy), so it's
   created lazily on the first pointerdown/keydown anywhere on the page. */
let audioCtx = null, masterGain = null, sfxGain = null, musicGain = null;
let musicTimer = null, musicStepIdx = 0, audioUnlocked = false;

function loadAudioPrefs(){
  let sfx = true, music = true;
  try{
    const s = localStorage.getItem('uptrend_sfxEnabled');
    const m = localStorage.getItem('uptrend_musicEnabled');
    if(s !== null) sfx = s === '1';
    if(m !== null) music = m === '1';
  }catch(e){ /* localStorage unavailable — default both on */ }
  return { sfx, music };
}
let audioPrefs = loadAudioPrefs();

function saveAudioPrefs(){
  try{
    localStorage.setItem('uptrend_sfxEnabled', audioPrefs.sfx ? '1' : '0');
    localStorage.setItem('uptrend_musicEnabled', audioPrefs.music ? '1' : '0');
  }catch(e){}
}

function ensureAudioCtx(){
  if(audioCtx) return audioCtx;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 1; masterGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.35; sfxGain.connect(masterGain);
    musicGain = audioCtx.createGain(); musicGain.gain.value = 0.14; musicGain.connect(masterGain);
  }catch(e){ audioCtx = null; }
  return audioCtx;
}

function unlockAudio(){
  if(audioUnlocked) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  audioUnlocked = true;
  if(ctx.state==='suspended') ctx.resume().catch(()=>{});
  if(audioPrefs.music) startMusic();
}

// Short percussive/tonal blip used by every SFX cue below.
function playTone(freq, opts){
  opts = opts || {};
  const { duration=0.15, type='sine', gain=0.5, delay=0, attack=0.005, decayTo=0.0001 } = opts;
  if(!audioPrefs.sfx) return;
  const ctx = ensureAudioCtx();
  if(!ctx || ctx.state==='suspended') return;
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(gain, t0+attack);
  g.gain.exponentialRampToValueAtTime(decayTo, t0+duration);
  osc.connect(g); g.connect(sfxGain);
  osc.start(t0); osc.stop(t0+duration+0.02);
}

function playSfx(name){
  if(!audioPrefs.sfx) return;

// Simple generative background music: a slow pentatonic-ish arpeggio with
// an occasional soft bass note, advancing one step at a time on a timer.
// Deliberately understated — this is a stock-trading board game, not a
// rhythm game, so the goal is ambience, not a hook.
const MUSIC_SCALE = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
const MUSIC_PATTERN = [0,2,4,2,0,3,5,3,0,2,4,7,4,2,0,null,1,3,5,3,1,4,6,4];
function scheduleMusicStep(){
  if(!audioPrefs.music){ musicTimer = null; return; }
  const ctx = ensureAudioCtx();
  if(!ctx || ctx.state==='suspended'){ musicTimer = setTimeout(scheduleMusicStep, 1500); return; }
  const t = ctx.currentTime;
  const degree = MUSIC_PATTERN[musicStepIdx % MUSIC_PATTERN.length];
  musicStepIdx++;
  if(degree !== null){
    const freq = MUSIC_SCALE[degree];
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.5, t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.9);
    osc.connect(g); g.connect(musicGain);
    osc.start(t); osc.stop(t+0.95);
    if(musicStepIdx % 4 === 0){
      const bosc = ctx.createOscillator();
      bosc.type = 'triangle';
      bosc.frequency.setValueAtTime(freq/2, t);
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(0.0001, t);
      bg.gain.linearRampToValueAtTime(0.3, t+0.05);
      bg.gain.exponentialRampToValueAtTime(0.0001, t+1.6);
      bosc.connect(bg); bg.connect(musicGain);
      bosc.start(t); bosc.stop(t+1.7);
    }
  }
  musicTimer = setTimeout(scheduleMusicStep, 550);
}
function startMusic(){
  if(musicTimer || !audioPrefs.music) return;
  if(!ensureAudioCtx()) return;
  scheduleMusicStep();
}
function stopMusic(){
  if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
}

// each stock's sector had before this ladder — e.g. Health stocks always
// ranged from 2.2x center down to a floor of 0.15x center, so VITA/RXCO
// keep that same shape scaled to their new center price. Tech/Energy still
// bottom out at exactly $0 (so they can go worthless); Health/Consumer keep
// a positive floor and never can. Tops are widened ~15% and Health/Consumer
// floors lowered ~25% over the original ladder to give the 2 extra dots on
// each end (below) genuinely bigger jumps rather than finer subdivisions of
// the same old range.
const STOCK_PRICE_CONFIG = {
  NOVA: { center:5000, top:12650, bottom:0 },
  QBIT: { center:1200, top:5500,  bottom:0 },
  PWR:  { center:2800, top:9650,  bottom:0 },

/* Dividend zones: the top N bubbles of a stock's own track pay a per-turn
   dividend to whoever holds it while it's up there. Now covers all 8
   stocks, wider than the original design, with rates high enough to give a
   real reason to defend a stock at the top instead of just shorting the
   inevitable reversion — a long at the top has little upside left but a
   short has a lot, so the dividend has to outweigh that asymmetry, not
   just add a small bonus on top of gains already banked getting there.
   Smaller/tighter zones (harder to reach, easier to fall out of) pay more;
   wider zones pay less. Shorts caught in a zone pay HALF its rate as a
   penalty on top of the flat 1% per-turn short carrying fee every open
   short pays regardless of zone — mirrors Dividend Day's drawer/everyone-
   else split, and is what actually makes shorting a zone-topped stock
   costly instead of free money. */
/* Dividend zones: the top N bubbles of a stock's own track pay a per-turn
   dividend to whoever holds it while it's up there — now much wider (6-12
   dots, covering most of the upper half of a stock's range) so cash flows
   into players' hands earlier and more often, not just at the very peak.
   Each zone has its own `rates` array, one rate per dot, ordered from the
   zone's entry dot (index 0, lowest rate) up to the very top dot (last
   index, highest rate) — the gap between consecutive dots widens the
   closer you get to the top, the same power-curve shape the price track
   itself uses, so the very top dot is worth meaningfully defending instead
   of the whole zone paying a flat amount. The two widest zones (NOVA,
   SPRE) share the same low rate on their first couple of entry dots before
   the ramp kicks in. Shorts caught in a zone pay HALF that dot's rate as a
   penalty on top of the flat 1% per-turn short carrying fee every open
   short pays regardless of zone — mirrors Dividend Day's drawer/everyone-
   else split, and is what makes shorting a zone-topped stock costly. */
const DIVIDEND_ZONES = {
  QBIT: { dots:9,  rates:[0.08, 0.087, 0.103, 0.128, 0.16, 0.2, 0.247, 0.3, 0.36] },
  VITA: { dots:9,  rates:[0.07, 0.076, 0.091, 0.113, 0.142, 0.177, 0.219, 0.267, 0.32] },
  PWR:  { dots:11, rates:[0.05, 0.053, 0.06, 0.072, 0.087, 0.105, 0.126, 0.15, 0.177, 0.207, 0.24] },
  RXCO: { dots:11, rates:[0.05, 0.053, 0.059, 0.069, 0.083, 0.099, 0.118, 0.139, 0.164, 0.191, 0.22] },
  LUXE: { dots:13, rates:[0.04, 0.042, 0.046, 0.052, 0.059, 0.069, 0.08, 0.093, 0.107, 0.123, 0.141, 0.16, 0.18] },
  OILX: { dots:13, rates:[0.035, 0.036, 0.04, 0.045, 0.052, 0.061, 0.071, 0.082, 0.095, 0.109, 0.125, 0.142, 0.16] },
  NOVA: { dots:14, rates:[0.025, 0.026, 0.028, 0.032, 0.036, 0.042, 0.049, 0.056, 0.065, 0.074, 0.084, 0.095, 0.107, 0.12] },
  SPRE: { dots:14, rates:[0.025, 0.026, 0.028, 0.032, 0.036, 0.042, 0.049, 0.056, 0.065, 0.074, 0.084, 0.095, 0.107, 0.12] },
};
const SHORT_CARRY_FEE_RATE = 0.01; // 1% of a short's current liability, charged every one of your own turns

/* The dividend rate for a specific dot position on a stock's track — 0 if
   that dot isn't in the zone at all. Used both for actually paying out and
   for labeling each dot in the UI. */
function dividendZoneRateAt(id, idx){
  const zone = DIVIDEND_ZONES[id];
  if(!zone) return 0;
  const track = state.stocks[id].track;
  const zoneStartIdx = track.length - zone.dots;
  if(idx < zoneStartIdx) return 0;
  const pos = Math.min(zone.rates.length-1, idx - zoneStartIdx);
  let rate = zone.rates[pos];
  if(state.dividendRateModifier) rate *= state.dividendRateModifier.multiplier;
  return rate;
}

const TURN_TIME_LIMIT = 120; // seconds — 2 minutes; enforced by the timeout-enforcement logic below once it expires
function turnTimerSecondsLeft(){
  if(!state || !state.turnStartedAt || state.gameOver) return TURN_TIME_LIMIT;
  const elapsed = Math.floor((Date.now()-state.turnStartedAt)/1000);
  return Math.max(0, TURN_TIME_LIMIT-elapsed);
}
function formatTurnTimer(secs){

/* ============================= TURN TIMEOUT ENFORCEMENT ============================= */
/* A card that still needs a choice protects the turn from being force-ended
   regardless of the clock — an auto-resolved card just sitting in its
   "Continue" acknowledgment modal does NOT protect it, since its effect
   already happened and nothing is left to decide. */
function isTurnProtectedFromTimeout(){
  return !!(state && state.pendingCard && needsChoice(state.pendingCard));
}

/* Any connected browser can notice a stalled turn, but only one of them
   should actually act on it. Firebase's transaction API gives us that for
   free: every client tries to atomically move the lock from the previous
   turn's timestamp to the current one, but only the first to reach the
   server actually succeeds — everyone else's transaction sees the lock
   already matches state.turnStartedAt and aborts without writing. */
async function claimTimeoutLock(turnStartedAt){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(lockRef(), (current)=>{
      if(current === turnStartedAt) return; // already claimed for this turn — abort
      return turnStartedAt;
    });
    return result.committed;
  }catch(e){
    console.error('UpTrend: timeout lock claim failed', e);
    return false;
  }
}

/* Pushes a stalled player's turn forward using neutral, no-op choices —
   drawing whatever card comes up, auto-acknowledging anything that doesn't
   need a decision, and skipping trading — until either their turn actually
   ends or a real choice-needing card appears (at which point they're
   protected and enforcement backs off). Stops after a bounded number of
   steps as a safety net against ever looping forever. */
function forceAdvanceStalledTurn(){
  if(!state || state.gameOver) return;
  const stalledIndex = state.current;
  const stalledName = state.players[stalledIndex].name;
  const stalledIsBot = !!state.players[stalledIndex].bot;
  let steps = 0;
  while(steps < 12 && state.current===stalledIndex && !state.gameOver){
    steps++;
    if(isTurnProtectedFromTimeout()){
      // A pending choice card protects a HUMAN's turn from being force-ended
      // — they might genuinely be mid-decision. A bot has no UI to decide
      // with (renderCardModal only ever renders for isMyTurn(), which is
      // never true for a bot seat), so if a bot's own step chain has died
      // partway through one of these (thrown error, throttled/backgrounded
      // tab, lost lock race), "protecting" it here would freeze the game
      // forever with nobody able to resolve it. Make the choice for the bot
      // automatically instead of backing off.
      if(!stalledIsBot) break;
      try{ botResolveChoice(); }catch(e){ console.error('UpTrend: forced bot choice resolution failed', e); break; }
      continue;
    }
    if(state.players[stalledIndex].eliminated || state.players[stalledIndex].jailTurnsLeft>0){ endTurn(); break; } // nothing to play — just skip it forward
    const before = JSON.stringify({ phase:state.phase, turnStage:state.turnStage, cardsDrawnThisTurn:state.cardsDrawnThisTurn, pendingCard: state.pendingCard && state.pendingCard._id });
    if(state.awaitingHoldDecision){
      playCardNowFromDraw(true); // AFK on the Play Now/Hold prompt — force past isMyTurn() same as everything else here, since the stalled player is never the browser calling this
    } else if(state.phase==='draw'){
      drawCard(true);
    } else if(state.phase==='resolve'){
      finishCardResolution(); // only reached when the pending card doesn't need a choice
    } else if(state.phase==='trade'){
      proceedPastTrade();
    } else {
      break;
    }
    const after = JSON.stringify({ phase:state.phase, turnStage:state.turnStage, cardsDrawnThisTurn:state.cardsDrawnThisTurn, pendingCard: state.pendingCard && state.pendingCard._id });
    if(before===after) break; // no progress possible (e.g. stuck on negative cash) — stop rather than spin
  }
  if(state.current!==stalledIndex || state.gameOver){
    logEvent(`${stalledName} ran out of time — turn auto-advanced.`, true);
  }
  persist(); render();
}

/* Runs every tick alongside the visible countdown: once time's up and the
   turn isn't protected by a pending choice card, try to claim the lock and
   push the stalled player's turn forward. */
let timeoutCheckInFlight = false;
setInterval(async ()=>{
  if(timeoutCheckInFlight || !roomCode || !state || state.gameOver || state.phase==='lobby') return;
  if(turnTimerSecondsLeft() > 0) return;
  if(isTurnProtectedFromTimeout()) return;
  timeoutCheckInFlight = true;
  try{
    const won = await claimTimeoutLock(state.turnStartedAt);
    if(won) forceAdvanceStalledTurn();
  } finally {
    timeoutCheckInFlight = false;
  }
}, 1000);

/* Timer-mode games need to end right on schedule even if nobody happens to
   be mid-action when the clock runs out — checkGameOver() alone only fires
   from actual gameplay actions, so this is the fallback that catches "time
   ran out while everyone was just staring at the board." Same one-client-
   acts guarantee as the other locks above. */
let gameEndCheckInFlight = false;
async function claimGameEndLock(){
  if(!roomCode) return false;
  try{
    const result = await runTransaction(gameEndLockRef(), (current)=>{
      if(current===true) return; // already claimed — abort
      return true;
    });
    return result.committed;
  }catch(e){ console.error('UpTrend: game-end lock claim failed', e); return false; }
}
setInterval(async ()=>{
  if(gameEndCheckInFlight || !roomCode || !state || state.gameOver || state.phase==='lobby') return;
  const wc = state.winCondition;
  if(!wc || wc.mode!=='timer' || Date.now()<wc.endsAt) return;
  gameEndCheckInFlight = true;
  try{
    const won = await claimGameEndLock();
    if(won){ finalizeTimerGameOver(); persist(); render(); }
  } finally {
    gameEndCheckInFlight = false;
  }
}, 1000);

function price(stockId){ return state.stocks[stockId].track[state.stocks[stockId].idx]; }
function spPrice(){ return state.sp.track[state.sp.idx]; }
function spxPrice(){ return state.spx.track[state.spx.idx]; }
function priceOf(id){ return id==='SP' ? spPrice() : id==='SPX' ? spxPrice() : price(id); }
function objFor(id){ return id==='SP' ? state.sp : id==='SPX' ? state.spx : state.stocks[id]; }

function lockedCash(p){
  return STOCK_IDS.reduce((sum,id)=> sum + (p.shorts[id]||0)*price(id), 0);
}
function freeCash(p){ return p.cash - lockedCash(p); }

function netWorth(p){
  let v = p.cash;
  STOCK_IDS.forEach(id=>{
    v += p.shares[id]*price(id);
    v -= (p.shorts[id]||0)*price(id);
  });
  v += p.spShares*spPrice();
  v += p.spxShares*spxPrice();
  return v;
}

/* Cost-basis bookkeeping so we can show unrealized gain/loss per holding.
   Longs: costBasis[id] is the total $ currently invested in open shares
   (average-cost method — selling removes a proportional slice, not FIFO).
   Shorts: shortBasis[id] is the total $ received when the open short
   position(s) were opened; gain = basis received − current buy-back cost.
   'SP' and 'SPX' (the two index funds) keep their own dedicated fields
   instead of living in the STOCK_IDS-keyed objects, since they're not
   part of STOCK_IDS — every function below branches on the id/key to
   route to the right one. */
function addCostBasis(p, key, amount){
  if(key==='SP') p.spCostBasis = (p.spCostBasis||0) + amount;
  else if(key==='SPX') p.spxCostBasis = (p.spxCostBasis||0) + amount;
  else p.costBasis[key] = (p.costBasis[key]||0) + amount;
}
function reduceCostBasisOnSell(p, key, qty){
  const held = key==='SP' ? p.spShares : key==='SPX' ? p.spxShares : p.shares[key];
  if(held<=0) return;
  const total = key==='SP' ? (p.spCostBasis||0) : key==='SPX' ? (p.spxCostBasis||0) : (p.costBasis[key]||0);
  const avg = total/held;
  const reduceBy = avg*qty;
  if(key==='SP') p.spCostBasis = Math.max(0, total - reduceBy);
  else if(key==='SPX') p.spxCostBasis = Math.max(0, total - reduceBy);
  else p.costBasis[key] = Math.max(0, total - reduceBy);
}
function addShortBasis(p, id, amount){ p.shortBasis[id] = (p.shortBasis[id]||0) + amount; }
function reduceShortBasisOnCover(p, id, qty){
  const held = p.shorts[id]||0;
  if(held<=0) return;
  const total = p.shortBasis[id]||0;
  const avg = total/held;
  p.shortBasis[id] = Math.max(0, total - avg*qty);
}
function longGainLoss(p, key){
  const held = key==='SP' ? p.spShares : key==='SPX' ? p.spxShares : p.shares[key];
  const val = held * priceOf(key);
  const basis = key==='SP' ? (p.spCostBasis||0) : key==='SPX' ? (p.spxCostBasis||0) : (p.costBasis[key]||0);
  return val - basis;
}
function shortGainLoss(p, id){
  const held = p.shorts[id]||0;
  const buyBackCost = held * price(id);
  const basis = p.shortBasis[id]||0;
  return basis - buyBackCost;
}

/* Shared holdings-table builder — used both for "Your Holdings" and for
   rendering whatever an Espionage target's holdings look like. Returns
   {value, html} rows sorted richest-first, exactly like the original
   inline version this replaced. */
function buildHoldingRows(pl){
  const glCell = (gl)=> `<td style="color:${gl>=0?'var(--up)':'var(--down)'};">${gl>=0?'+':'-'}$${Math.abs(Math.round(gl))}</td>`;
  const rows = [];
  STOCK_IDS.forEach(id=>{
    if(pl.shares[id]>0){
      const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
      const value = pl.shares[id]*price(id);
      const basis = Math.round((pl.costBasis[id]||0) / pl.shares[id]);
      rows.push({ value, html: `<tr><td>${id} (${sectorLabel})</td><td>${pl.shares[id]}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(pl,id))}</tr>` });
    }
  });
  if(pl.spShares>0){
    const value = pl.spShares*spPrice();
    const basis = Math.round((pl.spCostBasis||0) / pl.spShares);
    rows.push({ value, html: `<tr><td>Mini SP8</td><td>${pl.spShares}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(pl,'SP'))}</tr>` });
  }
  if(pl.spxShares>0){
    const value = pl.spxShares*spxPrice();
    const basis = Math.round((pl.spxCostBasis||0) / pl.spxShares);
    rows.push({ value, html: `<tr><td>SP8</td><td>${pl.spxShares}</td><td>$${basis}</td><td>$${value}</td>${glCell(longGainLoss(pl,'SPX'))}</tr>` });
  }
  STOCK_IDS.forEach(id=>{
    if((pl.shorts[id]||0)>0){
      const sectorLabel = SECTORS[STOCKS[id].sector].label || STOCKS[id].sector;
      const value = -(pl.shorts[id]*price(id));
      const basis = Math.round((pl.shortBasis[id]||0) / pl.shorts[id]);
      rows.push({ value, html: `<tr><td>${id} (${sectorLabel}, short)</td><td>${pl.shorts[id]}</td><td>$${basis}</td><td style="color:var(--down);">-$${Math.abs(value)}</td>${glCell(shortGainLoss(pl,id))}</tr>` });
    }
  });
  rows.sort((a,b)=>b.value-a.value);
  return rows;
}
function renderHoldingsTableHtml(pl){
  const rows = buildHoldingRows(pl);
  if(rows.length===0) return `<div class="hint" style="margin:0;">No open positions.</div>`;
  return `<table class="holdings-table"><tr><th>Ticker</th><th>Shares</th><th>Avg Cost</th><th>Value</th><th>Gain/Loss</th></tr>${rows.map(r=>r.html).join('')}</table>`;
}

const TURN_CAP = 12; // total buy+short shares allowed per turn (across all stocks)
function capRemaining(){ return TURN_CAP - state.turnUsage.total; }
function capRemainingForStock(id){ return 4 - (state.turnUsage.perStock[id]||0); }

function canBuyOne(id){
  if(!id || state.gameOver) return false;
  if(id!=='SP' && id!=='SPX' && state.stocks[id].worthless) return false;
  const p = state.players[state.current];
  if((p.bannedStocks||[]).includes(id)) return false;
  if(capRemaining()<=0 || capRemainingForStock(id)<=0) return false;
  if(id==='SP') return priceOf(id) <= freeCash(p); // flat price, no walk, no fee
  const priorFilled = state.turnFills.up[id]||0;
  const walk = walkOrderDetailed(id, 1, +1, priorFilled);
  return (walk.total+walk.fee) <= freeCash(p);
}
function canSellOne(id){
  if(!id || state.gameOver) return false;
  const p = state.players[state.current];
  const held = id==='SP' ? p.spShares : id==='SPX' ? p.spxShares : p.shares[id];
  return held>0;
}
function canShortOne(id){
  if(!id || id==='SP' || id==='SPX' || state.gameOver) return false;
  if(state.stocks[id].worthless) return false;
  const p = state.players[state.current];
  if((p.bannedStocks||[]).includes(id)) return false;
  if(capRemaining()<=0 || capRemainingForStock(id)<=0) return false;
  return price(id) <= freeCash(p);
}
function canCoverOne(id){
  if(!id || state.gameOver) return false;
  const p = state.players[state.current];
  const held = p.shorts[id]||0;
  if(held<=0) return false;
  const priorFilled = state.turnFills.up[id]||0;
  const walk = walkOrderDetailed(id, 1, +1, priorFilled);
  return (walk.total+walk.fee) <= p.cash;
}

/* Walks the order book in groups of 4 shares — matching the 4-per-stock
   turn cap. `priorFilled` is how many shares have already been bought/
   sold/shorted/covered of this stock THIS TURN (across any number of
   earlier clicks), so separate 1-share clicks chain together correctly.
   1-3 shares in a group fill flat at the current price with no fee at all.
   Only when a full group of 4 completes does the price step 1 dot and a
   20% fee get charged — on that completing group only, not the whole
   order. A big enough sell/cover order (uncapped) can cross this boundary
   more than once, walking and getting fee'd once per complete group of 4. */
function walkOrderDetailed(id, qty, direction, priorFilled){
  const GROUP = 4, FEE_RATE = 0.20;
  const obj = objFor(id);
  let idx = obj.idx;
  const chunks = [];
  let curChunkIdx = -1, curPrice = 0, curQty = 0, curSubtotal = 0, curWalked = false;
  for(let i=0;i<qty;i++){
    const position = priorFilled + i;
    const chunkIdx = Math.floor(position/GROUP);
    const posInGroup = position%GROUP;
    if(chunkIdx!==curChunkIdx){
      if(curChunkIdx!==-1) chunks.push({ chunkIdx: curChunkIdx, qty: curQty, price: curPrice, subtotal: curSubtotal, walked: curWalked });
      curChunkIdx = chunkIdx; curPrice = obj.track[idx]; curQty = 0; curSubtotal = 0; curWalked = false;
    }
    const p = obj.track[idx];
    curQty += 1; curSubtotal += p;
    if(posInGroup===GROUP-1){
      idx = Math.max(0, Math.min(obj.track.length-1, idx+direction)); // group just completed — walk now
      curWalked = true; // this call is the one that completed the group, so it eats the fee
    }
  }
  if(curChunkIdx!==-1) chunks.push({ chunkIdx: curChunkIdx, qty: curQty, price: curPrice, subtotal: curSubtotal, walked: curWalked });
  const total = chunks.reduce((s,c)=>s+c.subtotal, 0);
  const fee = chunks.filter(c=>c.walked).reduce((s,c)=>s+Math.ceil(c.subtotal*FEE_RATE), 0);
  return { chunks, total, fee, finalIdx: idx };
}

const BANKRUPTCY_RESET_CASH = 20000;
const HAND_LIMIT = 3; // max cards a player can hold at once — a freshly-drawn holdable card can't be held past this, only played now

/* True if a player's cash is negative AND selling every long position they
   own — everything, all at once — still wouldn't be enough to bring it
   back to $0+. Shorts don't help here (covering spends cash, it never
   raises it — see checkMarginCalls below), so only long holdings count.
   This is the genuine, un-recoverable dead end: they can't draw, and
   there's no card-based or trade-based way out on their own. */
function isBankrupt(p){
  if(p.cash>=0) return false;
  let sellableValue = p.spShares*spPrice() + p.spxShares*spxPrice();
  STOCK_IDS.forEach(id=>{ sellableValue += (p.shares[id]||0)*price(id); });
  return sellableValue < Math.abs(p.cash);
}

/* Wipes a bankrupt player's positions and gives them a reduced fresh
   stake instead of leaving them stuck forever (or, for the bot, retrying
   forever). Everyone else's game — cash, holdings, everything — is
   completely untouched; only this one player resets. */
function resetBankruptPlayer(p){
  STOCK_IDS.forEach(id=>{
    p.shares[id]=0; p.shorts[id]=0; p.costBasis[id]=0; p.shortBasis[id]=0; p.holdStreak[id]=0;
  });
  p.spShares = 0; p.spCostBasis = 0;
  p.spxShares = 0; p.spxCostBasis = 0;
  p.cash = BANKRUPTCY_RESET_CASH;
  p.goldenGeese = [];
  p.marginShield = false;
  p.publicOffering = null;
  logEvent(`${p.name} went bankrupt — positions wiped, restarting with $${BANKRUPTCY_RESET_CASH.toLocaleString()}. Everyone else keeps playing.`, true);
}

function humanBankruptcyReset(){
  if(!isMyTurn() || state.gameOver) return;
  const p = state.players[state.current];
  if(!isBankrupt(p)) return; // button shouldn't even be visible otherwise, but don't trust the DOM
  resetBankruptPlayer(p);
  checkGameOver();
  schedulePersist(); render();
}

function checkMarginCalls(){
  state.players.forEach(p=>{
    let locked = lockedCash(p);
    if(locked > p.cash && p.marginShield){
      p.marginShield = false;
      logEvent(`${p.name}'s Margin Call Forgiveness absorbed a margin call this turn — no forced liquidation.`, true);
      return;
    }
    let guard = 0;
    while(locked > p.cash && guard < STOCK_IDS.length+1){
      guard++;
      let target = null, maxLiab = -1;
      STOCK_IDS.forEach(id=>{
        const liab = (p.shorts[id]||0)*price(id);
        if(liab>maxLiab){ maxLiab = liab; target = id; }
      });
      if(!target || maxLiab<=0) break;
      const qty = p.shorts[target];
      const cost = qty*price(target);
      p.cash -= cost;
      p.shorts[target] = 0;
      logEvent(`Margin call: ${p.name}'s ${target} short was auto-covered at $${price(target)}.`, true);
      locked = lockedCash(p);
    }
  });
}


const MAX_LOG_ENTRIES = 150;
function logEvent(text, isEvent){
  state.log.push({ text, event: !!isEvent });
  if(state.log.length > MAX_LOG_ENTRIES) state.log = state.log.slice(-MAX_LOG_ENTRIES);
}

function moveStock(id, dir, respectFreeze){
  const s = state.stocks[id];
  if(s.worthless) return; // dead stocks never move again
  if(respectFreeze && s.frozen){
    s.frozen = false;
    logEvent(`${id} was frozen — movement ignored.`, true);
    return;
  }
  s.prevIdx = s.idx;
  s.idx = Math.max(0, Math.min(s.track.length-1, s.idx + dir));
}
function moveSP(dir){
  state.sp.prevIdx = state.sp.idx;
  state.sp.idx = Math.max(0, Math.min(state.sp.track.length-1, state.sp.idx + dir));
  state.spx.prevIdx = state.spx.idx;
  state.spx.idx = Math.max(0, Math.min(state.spx.track.length-1, state.spx.idx + dir));
}

/* Trading SP8 is the only thing that can move either index's price — Mini
   SP8 never has its own price impact (see buyShares/sellShares), so
   whenever SP8 walks from a completed group-of-4, Mini SP8 has to walk the
   exact same number of steps right alongside it, or "they always move
   together" stops being true the moment anyone actually trades. */
function mirrorOntoMiniSP8(delta){
  if(!delta) return;
  state.sp.prevIdx = state.sp.idx;
  state.sp.idx = Math.max(0, Math.min(state.sp.track.length-1, state.sp.idx + delta));
}

/* Applies a dictated multi-step move to one stock, checking Freeze once for
   the whole card (not once per step) so a frozen stock ignores the entire
   card's movement rather than just its first step. */
function applyDictatedSteps(id, dir, steps){
  const s = state.stocks[id];
  if(s.frozen){
    s.frozen = false;
    logEvent(`${id} was frozen — movement ignored.`, true);
    return;
  }
  for(let i=0;i<steps;i++) moveStock(id, dir, false);
}

/* Reversion: pulls a stock back toward its own center price by up to
   `amount` steps, never overshooting the center. Stocks already at center
   are unaffected — nothing to revert. */
function revertStock(id, amount){
  const s = state.stocks[id];
  const centerIdx = (s.track.length-1)/2;
  const dist = centerIdx - s.idx;
  if(dist===0){ logEvent(`${id} is already at its center price — no reversion needed.`); return; }
  const dir = dist>0 ? 1 : -1;
  const steps = Math.min(amount, Math.abs(dist));
  applyDictatedSteps(id, dir, steps);
  logEvent(`${id} reverted ${steps} step(s) toward the middle — now $${price(id)}.`, true);
}
function revertSector(sector, amount){
  SECTORS[sector].stocks.forEach(id=>revertStock(id, amount));
}

/* A stock that hits exactly $0 (only possible for Tech/Energy, whose tracks
   bottom out at $0 — Health/Consumer never go below their floor) goes
   permanently worthless: every player's shares are erased, any open shorts
   on it are auto-covered for free (max profit — the price can't be beat),
   and it's frozen forever so it can never be bought, shorted, or moved again. */
function checkWorthless(){
  STOCK_IDS.forEach(id=>{
    const s = state.stocks[id];
    if(s.worthless || price(id)!==0) return;
    s.worthless = true;
    s.frozen = false;
    state.players.forEach(pl=>{
      if(pl.shares[id]>0){
        logEvent(`${pl.name}'s ${pl.shares[id]} shares of ${id} were wiped out — worthless.`, true);
        pl.shares[id] = 0;
        pl.costBasis[id] = 0;
      }
      if((pl.shorts[id]||0)>0){
        logEvent(`${pl.name}'s short on ${id} was auto-covered for free — max profit as it went to $0.`, true);
        pl.shorts[id] = 0;
        pl.shortBasis[id] = 0;
      }
    });
    logEvent(`${id} has crashed to $0 and is now worthless — delisted, can never be traded again.`, true);
  });
}

/* Single choke point for ending the game — sets gameOver/winner together
   with a gameOverAt timestamp every single time, no matter which of the
   several win conditions below triggered it. The timestamp is what makes
   the speedrun-vs-bots stopwatch (see isSoloVsBots() etc.) possible: without
   one shared place to stamp it, some win paths would end up without a
   reliable "when did this actually end" moment. */
function markGameOver(winner){
  state.gameOver = true;
  state.winner = winner;
  state.gameOverAt = Date.now();
  if(myPlayerIndex!==null && typeof winner==='number') playSfx(winner===myPlayerIndex ? 'win' : 'lose');
}

/* A player whose net worth is negative can never dig out — even selling
   every last share can't bring their cash back to $0, since shorts/fees
   already account for that in netWorth. Rather than soft-locking their
   turn forever, they're knocked out of the game entirely. */
function checkEliminations(){
  if(state.gameOver) return;
  state.players.forEach(p=>{
    if(!p.eliminated && p.cash<0 && netWorth(p)<0){
      p.eliminated = true;
      logEvent(`${p.name} is eliminated — net worth went negative with no way to recover.`, true);
    }
  });
  const active = state.players.filter(p=>!p.eliminated);
  if(state.players.length>1 && active.length<=1 && !state.gameOver){
    const winner = active[0] || state.players.reduce((best,p)=> (!best||netWorth(p)>netWorth(best))?p:best, null);
    markGameOver(winner);
    logEvent(active.length===1 ? `${active[0].name} is the last player standing — wins!` : 'All players were eliminated — game over.', true);
  }
}

/* Appends the current price to each stock's (and SP8's) history whenever it
   has actually changed since the last recorded point — used to draw the
   little line chart next to each price track. */
const MAX_HISTORY_POINTS = 150;
function recordHistory(){
  STOCK_IDS.forEach(id=>{
    const s = state.stocks[id];
    const cur = price(id);
    if(s.history[s.history.length-1]!==cur){
      s.history.push(cur);
      if(s.history.length > MAX_HISTORY_POINTS) s.history = s.history.slice(-MAX_HISTORY_POINTS);
    }
  });
  const spCur = spPrice();
  if(state.sp.history[state.sp.history.length-1]!==spCur){
    state.sp.history.push(spCur);
    if(state.sp.history.length > MAX_HISTORY_POINTS) state.sp.history = state.sp.history.slice(-MAX_HISTORY_POINTS);
  }
  const spxCur = spxPrice();
  if(state.spx.history[state.spx.history.length-1]!==spxCur){
    state.spx.history.push(spxCur);
    if(state.spx.history.length > MAX_HISTORY_POINTS) state.spx.history = state.spx.history.slice(-MAX_HISTORY_POINTS);
  }
}

/* One point per turn TAKEN (called from endTurn, not per-trade) — every
   player's net worth together at that moment, so the Net Worth Graph shows
   how the whole table's fortunes moved relative to each other over the
   course of the game, not noisy per-trade fluctuations. */
const MAX_NETWORTH_POINTS = 150;
function recordNetWorthHistory(){
  state.netWorthHistory.push({ values: state.players.map(p=>Math.round(netWorth(p))) });
  if(state.netWorthHistory.length > MAX_NETWORTH_POINTS) state.netWorthHistory = state.netWorthHistory.slice(-MAX_NETWORTH_POINTS);
}

function checkGameOver(){
  recordHistory();
  checkWorthless();
  checkEliminations();
  if(state.gameOver) return;

  // 1. SP8 reaches the far right bubble (its ceiling)
  if(state.sp.idx === state.sp.track.length-1){
    let best=null;
    state.players.forEach(p=>{ if(!best || netWorth(p)>netWorth(best)) best=p; });
    markGameOver(best);
    logEvent(`Mini SP8 hit its ceiling — game over!`, true);
    return;
  }

  // 2. Every Tech and Energy stock has gone worthless
  const techEnergyIds = [...SECTORS.Tech.stocks, ...SECTORS.Energy.stocks];
  if(techEnergyIds.every(id=>state.stocks[id].worthless)){
    let best=null;
    state.players.forEach(p=>{ if(!best || netWorth(p)>netWorth(best)) best=p; });
    markGameOver(best);
    logEvent(`Every Tech and Energy stock is worthless — game over!`, true);
    return;
  }

  // 3. Win condition: either a target net worth, or a fixed game-length timer
  const wc = state.winCondition || { mode:'networth', target:500000 };
  if(wc.mode==='networth'){
    const bigWinner = state.players.find(p=>!p.eliminated && netWorth(p)>=wc.target);
    if(bigWinner){
      markGameOver(bigWinner);
      logEvent(`${bigWinner.name} reached $${wc.target.toLocaleString()} net worth — game over!`, true);
      return;
    }
  } else if(wc.mode==='timer' && Date.now()>=wc.endsAt){
    finalizeTimerGameOver();
    return;
  }
}

/* Timer-mode games don't end on a specific in-game event — they just stop
   when the clock runs out, whoever's turn it happens to be. Highest net
   worth at that instant wins (eliminated players never qualify, since
   elimination requires negative net worth in the first place). */
function finalizeTimerGameOver(){
  if(state.gameOver) return;
  let best = null, bestNW = -Infinity;
  state.players.forEach(p=>{
    const nw = netWorth(p);
    if(nw>bestNW){ bestNW = nw; best = p; }
  });
  markGameOver(best);
  logEvent(`Time's up! ${best.name} wins with $${Math.round(bestNW).toLocaleString()} net worth.`, true);
}

/* ============================= CARD RESOLUTION ============================= */
/* How many draws the CURRENT stage of the turn requires. The opening stage
   draws cardsPerTurn (1, or 2 in a heads-up game); the closing stage that
   ends the turn is always exactly 1 draw, regardless of player count. */
function drawsNeededThisStage(){
  return state.turnStage==='start' ? state.cardsPerTurn : 1;
}

function drawCard(force){
  if(!force && !isMyTurn()) return;
  const p = state.players[state.current];
  if(p.eliminated) return;
  if(p.jailTurnsLeft>0) return; // serving time — see the jail Action panel/Continue button instead
  if(p.cash<0) return; // must raise cash back to $0+ first — see the forced-liquidation Action panel
  // Tick this player's own Insider Info countdowns BEFORE drawing — so "1 turn"
  // means "the next time it's my turn," not "immediately," and a card drawn
  // this turn doesn't get ticked down on the very turn it was set up. This
  // only happens once per whole turn (the very first draw), not once per
  // individual card — starting AND ending draws together are one turn.
  if(state.turnStage==='start' && state.cardsDrawnThisTurn===0){
    tickScheduled(state.current); // countdowns always tick, even for a tip that's about to get someone caught
    if(checkInsiderTradingRisk(state.current)){
      // Caught red-handed right as their turn was about to start — this
      // turn is forfeited entirely (counts as the first of their jailed
      // turns; see endTurn's own decrement for the rest).
      checkMarginCalls(); checkGameOver();
      if(!state.gameOver) endTurn();
      persist(); render();
      return;
    }
    tickRecurringEffects(state.current);
    tickHoldStreaks(state.current);
    tickShortFeesAndDividends(state.current);
    tickPortfolioManagers(state.current);
    tickDividendRateModifier();
    tickEspionage(state.current);
    checkMarginCalls(); // fees/payouts above can push cash negative — same safety net as any other cash event
    checkGameOver();
    if(state.gameOver){ persist(); render(); return; } // a scheduled prediction landing just ended the game
  }
  if(state.deck.length===0){ state.deck = shuffle(state.discard); state.discard=[]; }
  const card = state.deck.shift();
  if(state.current===myPlayerIndex) playSfx('draw');
  state.pendingCard = card;
  state.phase = 'resolve';
  state.choiceError = null;
  state.cardsDrawnThisTurn += 1;
  // Holdable cards get a Play Now / Hold prompt BEFORE anything resolves —
  // this has to happen before the auto-resolve below, not after, since an
  // instant card's effect otherwise already happens the moment it's drawn.
  if(card.holdable && p.hand.length < HAND_LIMIT){
    state.awaitingHoldDecision = true;
    persist(); render();
    return;
  }
  if(card.holdable && p.hand.length >= HAND_LIMIT){
    logEvent(`${p.name}'s hand is already full (${HAND_LIMIT}/${HAND_LIMIT}) — this card resolves immediately instead.`);
  }
  // Auto-resolving cards (anything that doesn't need a player choice) apply
  // their effect right here, exactly once. The modal that follows is purely
  // a display of what already happened — it must NEVER re-trigger the
  // effect, or minimizing/resuming the card (or any other re-render while
  // it's open) would re-apply it every single time.
  if(!needsChoice(card)){
    resolveAuto(card);
  }
  persist(); render();
}

/* Confirms playing a freshly-drawn holdable card right now instead of
   holding it — just clears the prompt and lets the normal resolution path
   (auto-resolve or choice UI) take over exactly as if it weren't holdable.
   `force` bypasses the isMyTurn() check, mirroring drawCard(force) — it's
   what lets a bot's own step chain (and the AFK/timeout fallback) push
   this decision through on someone else's behalf. Without it, this always
   silently no-ops for a bot's turn: myPlayerIndex is whichever human
   browser is driving the bot, which never equals the bot's own seat, so
   isMyTurn() can never be true — runBotStep would just call this forever,
   with no error and no state change, which is a real freeze this fixes. */
function playCardNowFromDraw(force){
  if(!state.pendingCard || !state.awaitingHoldDecision || (!force && !isMyTurn())) return;
  state.awaitingHoldDecision = false;
  if(!needsChoice(state.pendingCard)) resolveAuto(state.pendingCard);
  persist(); render();
}

/* Stashes the freshly-drawn card into hand, completely unresolved, and
   moves on as if this draw slot had been used normally — same phase
   transition as finishCardResolution, just without ever applying the
   card's effect or sending it to the discard pile. */
function holdCurrentCard(force){
  if(!state.pendingCard || !state.awaitingHoldDecision || (!force && !isMyTurn())) return;
  const p = state.players[state.current];
  if(p.hand.length >= HAND_LIMIT) return; // shouldn't be reachable (button hidden), but don't trust the DOM
  p.hand.push(state.pendingCard);
  logEvent(`${p.name} drew a card and chose to hold it for later.`);
  state.pendingCard = null;
  state.pendingChoice = null;
  state.cardMinimized = false;
  state.choiceError = null;
  state.awaitingHoldDecision = false;
  checkMarginCalls();
  checkGameOver();
  if(state.gameOver){ state.phase = 'trade'; persist(); render(); return; }
  if(state.cardsDrawnThisTurn < drawsNeededThisStage()){
    state.phase = 'draw';
  } else if(state.turnStage==='start'){
    state.phase = 'trade';
  } else {
    endTurn();
  }
  persist(); render();
}

/* Plays a card straight out of hand, during the trade phase — re-enters
   the exact same resolution pipeline a fresh draw would use (auto-resolve
   or the choice UI), just flagged so finishing it returns to trade phase
   instead of trying to advance the turn the way a real draw would. */
function playCardFromHand(handIdx, force){
  if((!force && !isMyTurn()) || state.phase!=='trade' || state.gameOver) return;
  const p = state.players[state.current];
  if(handIdx<0 || handIdx>=p.hand.length) return;
  const card = p.hand.splice(handIdx,1)[0];
  state.pendingCard = card;
  state.phase = 'resolve';
  state.awaitingHoldDecision = false;
  state.resolvingFromHand = true;
  state.choiceError = null;
  if(!needsChoice(card)) resolveAuto(card);
  persist(); render();
}

function finishCardResolution(){
  state.discard.push(state.pendingCard);
  state.pendingCard = null;
  state.pendingChoice = null;
  state.cardMinimized = false;
  state.choiceError = null;
  checkMarginCalls();
  checkGameOver();
  if(state.resolvingFromHand){
    // A card played from hand never advances the turn or counts as a draw —
    // it's a bonus action taken during the trade phase, so just go back to it.
    state.resolvingFromHand = false;
    state.phase = 'trade';
    persist(); render();
    return;
  }
  if(state.gameOver){ state.phase = 'trade'; persist(); render(); return; }
  if(state.cardsDrawnThisTurn < drawsNeededThisStage()){
    state.phase = 'draw'; // more draws needed for this stage (not currently used, but kept for flexibility)
  } else if(state.turnStage==='start'){
    state.phase = 'trade'; // opening draw is done — into the trading phase
  } else {
    endTurn(); // the closing card has been seen and resolved — the turn ends right here, no extra trading
    return;
  }
  persist(); render();
}

/* Only ticks down scheduled items belonging to `ownerIndex` — each player's
   Insider Info countdown advances only on that same player's own turns,
   so "in 1 turn" always means "the next time it comes back around to me." */
function tickScheduled(ownerIndex){
  const remaining = [];
  state.scheduled.forEach(item=>{
    if(item.ownerIndex!==ownerIndex){ remaining.push(item); return; }
    item.turnsLeft -= 1;
    if(item.turnsLeft<=0){ resolveScheduledItem(item); }
    else remaining.push(item);
  });
  state.scheduled = remaining;
}

/* Espionage counts down on the SPY's own turns (not the target's) — "see
   their holdings for your next N turns" — same convention as Scheduled
   Swing's "in N turns" ticking on the owner, not the affected stock. */
function tickEspionage(spyIndex){
  if(!state.espionage || !state.espionage.length) return;
  state.espionage.forEach(e=>{ if(e.spyIndex===spyIndex) e.turnsLeft -= 1; });
  state.espionage = state.espionage.filter(e=>e.turnsLeft>0);
}

/* Scheduled items store plain data (never functions — Firebase can't sync
   those) and get dispatched here by `kind` once their countdown hits 0. */
/* Lets a player pay cash for a tip instead of hoping to draw one — always
   genuine (never one of the fake tips a card draw might hand you), since
   you're paying a real informant, not just hearing a rumor. Same
   randomized roll and same private treatment as a drawn tip; the only
   difference is how it got set up. Counts as C-Suite-grade for the fine if
   caught, but carries an even higher risk of getting caught in the first
   place — direct access like this doesn't stay quiet as easily. */
const INSIDER_INFO_PRICE = 10000;
const BOUGHT_INSIDER_RISK_RATE = 0.04;
function buyInsiderInfo(force){
  if((!force && !isMyTurn()) || state.gameOver || state.phase!=='trade') return;
  const p = state.players[state.current];
